<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法單字教學 - 旗艦雲端版</title>
    <!-- 載入外部依賴 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Quicksand:wght@500;700&display=swap');
        
        body { 
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            overflow-x: hidden; 
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 播放按鈕脈衝效果 */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .btn-audio-pulse { animation: pulse-ring 2s infinite; }

        .word-gradient {
            background: linear-gradient(to bottom, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 滑順滾動條 */
        .no-scrollbar::-webkit-scrollbar { width: 0px; }

        /* 輸入框陰影 */
        .inner-shadow-focus:focus {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06), 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (核心規則 1) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React 邏輯 (核心規則 2) -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'toy-vocabulary-v1';
        const themeId = "grade4-phonics";

        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        // --- 組件完整性：精緻化 SVG 圖標 ---
        const Icons = {
            Volume: (p) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" {...p}>
                    <path d="M11 5L6 9H2V15H6L11 19V5Z"/><path d="M15.54 8.46C16.4774 9.39764 17.004 10.6692 17.004 12C17.004 13.3308 16.4774 14.6024 15.54 15.54"/><path d="M19.07 4.93C20.9447 6.80528 21.9979 9.34836 21.9979 12C21.9979 14.6516 20.9447 17.1947 19.07 19.07"/>
                </svg>
            ),
            Check: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>,
            Lock: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Sparkles: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 3l1.91 5.81L21 12l-7.09 3.19L12 21l-1.91-5.81L3 12l7.09-3.19L12 3z"/></svg>,
            Next: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14"/><polyline points="12 5 19 12 12 19"/></svg>,
            Back: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>,
            Award: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
        };

        const safeId = (t) => btoa(unescape(encodeURIComponent(t))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        
        const pcmToWav = (pcmB64, rate = 24000) => {
            const b = atob(pcmB64);
            const buf = new ArrayBuffer(44 + b.length);
            const v = new DataView(buf);
            const s = (o, str) => { for(let i=0; i<str.length; i++) v.setUint8(o+i, str.charCodeAt(i)); };
            s(0, 'RIFF'); v.setUint32(4, 36 + b.length, true); s(8, 'WAVE'); s(12, 'fmt ');
            v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, rate, true); v.setUint32(28, rate * 2, true); v.setUint16(32, 2, true);
            v.setUint16(34, 16, true); s(36, 'data'); v.setUint32(40, b.length, true);
            for(let i=0; i<b.length; i++) v.setUint8(44+i, b.charCodeAt(i));
            return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
        };

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [debugMsg, setDebugMsg] = useState(["✨ 初始化魔法核心..."]);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [quizStarted, setQuizStarted] = useState(false);
            const [quizFinished, setQuizFinished] = useState(false);
            const [score, setScore] = useState(0);
            const [currentQ, setCurrentQ] = useState(0);

            const [mediaState, setMediaState] = useState({ images: {}, audio: {} });
            const [hasWord, setHasWord] = useState(false);
            const [hasSent, setHasSent] = useState(false);
            const [userInput, setUserInput] = useState('');
            const [preloading, setPreloading] = useState(false);
            const [progress, setProgress] = useState(0);

            const slides = [
                { word: "yo-yos", translation: "溜溜球", sentence: "I have two colorful yo-yos.", sentenceTrans: "我有兩個五顏六色的溜溜球。", trivia: "溜溜球是世界上第二古老的玩具！", color: "from-emerald-400 to-green-600", icon: "🪀🪀", prompt: "two high-quality colorful shiny yo-yo toys on a clean table, studio lighting, 3d render" },
                { word: "kites", translation: "風箏", sentence: "The kids are flying kites in the park.", sentenceTrans: "小朋友們正在公園裡放風箏。", trivia: "風箏在兩千多年前的中國就被發明了！", color: "from-sky-400 to-blue-600", icon: "🪁🪁", prompt: "colorful kites flying in a beautiful sunny sky with white clouds" },
                { word: "dolls", translation: "娃娃", sentence: "She likes to play with her dolls.", sentenceTrans: "她喜歡玩她的娃娃。", trivia: "芭比娃娃換過超過 200 種不同的職業呢！", color: "from-rose-400 to-pink-600", icon: "🧸🧸", prompt: "cute collection of toy dolls and stuffed animals, pastel colors" },
                { word: "balls", translation: "球", sentence: "We play with different balls at school.", sentenceTrans: "我們在學校玩各種不同的球。", trivia: "最早的足球之所以有黑白格子，是為了讓黑白電視看得清楚！", color: "from-orange-400 to-amber-600", icon: "⚽🏀", prompt: "various professional sports balls arranged on grass" },
                { word: "robots", translation: "機器人", sentence: "These robots can dance and sing.", sentenceTrans: "這些機器人會跳舞也會唱歌。", trivia: "Robot 這個字來自捷克語，意思是『苦工』。", color: "from-indigo-400 to-blue-700", icon: "🤖🤖", prompt: "friendly toy robots for kids, futuristic and colorful" },
                { word: "these", translation: "這些", sentence: "These are my favorite toy cars.", sentenceTrans: "這些是我最喜歡的玩具小車。", trivia: "當東西離你『很近』且『多於一個』時，就要用 these。", color: "from-amber-300 to-yellow-600", icon: "👇🚗🚗", prompt: "a hand pointing at toy cars close to the viewer, educational style" },
                { word: "those", translation: "那些", sentence: "Those are beautiful birds in the sky.", sentenceTrans: "那些是天空中的漂亮小鳥。", trivia: "當東西離你『很遠』時，就要用 those 指著它們。", color: "from-cyan-400 to-teal-600", icon: "👉🐦🐦", prompt: "a hand pointing at birds far away in the sky" }
            ];

            const quizData = [
                { q: "哪一個玩具曾被當作「軍事訊號」？", options: ["yo-yos", "kites", "dolls", "robots"], correct: 1 },
                { q: "指著「遠方」的多個東西，要用哪一個字？", options: ["these", "this", "those", "that"], correct: 2 },
                { q: "Robot 這個單字的原意是指什麼？", options: ["朋友", "苦工", "超人", "玩具"], correct: 1 }
            ];

            const addLog = (m) => setDebugMsg(prev => [m, ...prev].slice(0, 10));

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.FB) {
                        clearInterval(check);
                        try {
                            const app = window.FB.initializeApp(firebaseConfig);
                            const auth = window.FB.getAuth(app);
                            const db = window.FB.getFirestore(app);
                            setDb(db);
                            window.FB.signInAnonymously(auth).then(r => {
                                setUser(r.user); setIsReady(true); addLog("✅ 雲端連線成功");
                            });
                        } catch(e) { addLog("❌ Firebase 錯誤: " + e.message); }
                    }
                }, 500);
                return () => clearInterval(check);
            }, []);

            const isSpelledCorrect = userInput.trim().toLowerCase() === slides[currentSlide].word.toLowerCase();
            const canNext = hasWord && hasSent && isSpelledCorrect;

            useEffect(() => {
                setHasWord(false); setHasSent(false); setUserInput('');
            }, [currentSlide]);

            const getMedia = async (slide) => {
                const wId = safeId(slide.word);
                const imgRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'images', wId);
                const imgSnap = await window.FB.getDoc(imgRef);
                let imgUrl = imgSnap.exists() ? imgSnap.data().url : null;
                if (!imgUrl) {
                    addLog(`🎨 生成 AI 圖: ${slide.word}`);
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST', body: JSON.stringify({ instances: { prompt: slide.prompt }, parameters: { sampleCount: 1 } })
                    });
                    const d = await res.json();
                    const raw = `data:image/png;base64,${d.predictions[0].bytesBase64Encoded}`;
                    imgUrl = await new Promise(res => {
                        const i = new Image(); i.src = raw; i.onload = () => {
                            const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                            c.width = 512; c.height = (i.height * 512) / i.width;
                            ctx.drawImage(i, 0, 0, c.width, c.height); res(c.toDataURL('image/jpeg', 0.7));
                        }
                    });
                    await window.FB.setDoc(imgRef, { url: imgUrl, ts: Date.now() });
                }

                const audRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'audio', wId);
                const audSnap = await window.FB.getDoc(audRef);
                let audUrl = audSnap.exists() ? audSnap.data().url : null;
                if (!audUrl) {
                    addLog(`🔊 生成語音: ${slide.word}`);
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: `Say clearly: ${slide.word}` }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } } })
                    });
                    const d = await res.json();
                    audUrl = pcmToWav(d.candidates[0].content.parts[0].inlineData.data);
                    await window.FB.setDoc(audRef, { url: audUrl, ts: Date.now() });
                }
                return { imgUrl, audUrl };
            };

            const preloadAll = async () => {
                if (!isReady || preloading) return;
                setPreloading(true); addLog("🚀 同步雲端素材...");
                for (let i = 0; i < slides.length; i++) {
                    try {
                        const m = await getMedia(slides[i]);
                        setMediaState(p => ({
                            images: { ...p.images, [slides[i].word]: m.imgUrl },
                            audio: { ...p.audio, [slides[i].word]: m.audUrl }
                        }));
                    } catch(e) { addLog(`❌ [${slides[i].word}] 失敗`); }
                    setProgress(Math.round(((i + 1) / slides.length) * 100));
                }
                setPreloading(false); addLog("✨ AI 魔法已就緒");
            };

            const speak = (text, type) => {
                const url = mediaState.audio[text];
                if (url) { new Audio(url).play(); } 
                else { const u = new SpeechSynthesisUtterance(text); u.lang='en-US'; window.speechSynthesis.speak(u); }
                if (type === 'word') setHasWord(true);
                if (type === 'sent') setHasSent(true);
            };

            useEffect(() => {
                if (quizFinished) {
                    const t = "Great job! You are an English superstar! You have completed all the tasks today!";
                    const timer = setTimeout(() => {
                        const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=0.8; window.speechSynthesis.speak(u);
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [quizFinished]);

            if (!quizStarted) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 md:p-12 pb-20">
                        <div className="w-full max-w-5xl glass-card rounded-[4rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden relative transition-all border-4 border-white/80">
                            
                            {/* Header - 精緻漸層 */}
                            <div className={`bg-gradient-to-r ${slides[currentSlide].color} p-10 text-white flex justify-between items-center shadow-lg relative`}>
                                <div className="space-y-1">
                                    <h1 className="text-4xl font-black tracking-tight drop-shadow-md flex items-center gap-3">
                                        <Icons.Sparkles className="text-yellow-300" size={32} />
                                        魔法單字教室
                                    </h1>
                                    <p className="text-sm font-bold uppercase tracking-widest opacity-90">Cloud AI Interactive Edition</p>
                                </div>
                                <div className="flex items-center gap-4">
                                    <button 
                                        onClick={preloadAll} 
                                        disabled={preloading} 
                                        className="bg-white/20 hover:bg-white/30 backdrop-blur-md text-white border border-white/30 px-6 py-3 rounded-2xl font-black text-sm transition-all flex items-center gap-2 group"
                                    >
                                        {preloading ? <span className="animate-spin">⌛</span> : "⚡"}
                                        {preloading ? `同步中 ${progress}%` : "一鍵生成素材"}
                                    </button>
                                    <div className="bg-black/10 px-5 py-2 rounded-2xl font-black text-lg border border-white/10">
                                        {currentSlide + 1} <span className="opacity-50 text-sm">/ {slides.length}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Main Content - 分欄佈局 */}
                            <div className="p-12 space-y-12">
                                <div className="flex flex-col lg:flex-row gap-16 items-start">
                                    
                                    {/* Image Box - 類畫框設計 */}
                                    <div className="w-full lg:w-1/2 aspect-square rounded-[3.5rem] bg-slate-50 flex items-center justify-center overflow-hidden shadow-[inset_0_4px_12px_rgba(0,0,0,0.05)] border-8 border-white relative group">
                                        {mediaState.images[slides[currentSlide].word] ? (
                                            <img src={mediaState.images[slides[currentSlide].word]} className="w-full h-full object-cover animate-in fade-in zoom-in duration-1000" />
                                        ) : (
                                            <div className="text-[14rem] animate-bounce-slow filter drop-shadow-2xl grayscale-[0.2]">{slides[currentSlide].icon}</div>
                                        )}
                                        <div className="absolute top-8 right-8 bg-white/60 backdrop-blur-md text-[11px] font-black px-4 py-2 rounded-full text-slate-800 shadow-sm border border-white/20">
                                            {mediaState.images[slides[currentSlide].word] ? "✨ AI 生成圖" : "🧩 預設圖示"}
                                        </div>
                                    </div>

                                    {/* Interaction Panel */}
                                    <div className="w-full lg:w-1/2 space-y-10">
                                        <div className="space-y-4">
                                            <div className="flex flex-col sm:flex-row items-center gap-8">
                                                <h2 className="text-9xl font-black word-gradient lowercase tracking-tighter italic leading-none">{slides[currentSlide].word}</h2>
                                                
                                                {/* 大型播放鈕 */}
                                                <button 
                                                    onClick={() => speak(slides[currentSlide].word, 'word')} 
                                                    className={`group relative flex flex-col items-center gap-2 p-8 rounded-[3rem] shadow-[0_15px_35px_rgba(0,0,0,0.1)] transition-all duration-500 hover:scale-105 active:scale-90 border-b-8 ${hasWord ? 'bg-green-500 border-green-700 text-white' : 'bg-blue-600 border-blue-800 text-white btn-audio-pulse'}`}
                                                >
                                                    <Icons.Volume size={56} />
                                                    <span className="text-xs font-black uppercase tracking-widest bg-black/10 px-3 py-1 rounded-full">🔊 按我發音</span>
                                                </button>
                                            </div>
                                            <p className="text-5xl text-blue-500 font-black pl-2">【 {slides[currentSlide].translation} 】</p>
                                        </div>

                                        {/* 任務狀態 - 膠囊設計 */}
                                        <div className="bg-slate-50/50 p-6 rounded-[2.5rem] grid grid-cols-3 gap-4 border border-slate-100">
                                            <div className={`flex flex-col items-center gap-2 p-4 rounded-3xl transition-all border-2 ${hasWord ? 'bg-white border-green-200 text-green-600 shadow-sm' : 'bg-transparent border-transparent text-slate-300'}`}>
                                                <div className={`p-2 rounded-full ${hasWord ? 'bg-green-500 text-white' : 'bg-slate-200'}`}><Icons.Check size={20}/></div>
                                                <span className="text-[11px] font-black uppercase tracking-tighter">聽單字</span>
                                            </div>
                                            <div className={`flex flex-col items-center gap-2 p-4 rounded-3xl transition-all border-2 ${hasSent ? 'bg-white border-green-200 text-green-600 shadow-sm' : 'bg-transparent border-transparent text-slate-300'}`}>
                                                <div className={`p-2 rounded-full ${hasSent ? 'bg-green-500 text-white' : 'bg-slate-200'}`}><Icons.Check size={20}/></div>
                                                <span className="text-[11px] font-black uppercase tracking-tighter">聽句子</span>
                                            </div>
                                            <div className={`flex flex-col items-center gap-2 p-4 rounded-3xl transition-all border-2 ${isSpelledCorrect ? 'bg-white border-green-200 text-green-600 shadow-sm' : 'bg-transparent border-transparent text-slate-300'}`}>
                                                <div className={`p-2 rounded-full ${isSpelledCorrect ? 'bg-green-500 text-white' : 'bg-slate-200'}`}><Icons.Check size={20}/></div>
                                                <span className="text-[11px] font-black uppercase tracking-tighter">拼寫對</span>
                                            </div>
                                        </div>

                                        {/* 輸入框 - 擬紙設計 */}
                                        <div className="bg-white p-8 rounded-[3.5rem] shadow-[0_10px_30px_rgba(0,0,0,0.03)] border-2 border-slate-50">
                                            <h3 className="text-lg font-black text-slate-400 mb-4 flex items-center gap-3 px-4 uppercase tracking-widest">✍️ 拼寫大挑戰</h3>
                                            <input 
                                                value={userInput} 
                                                onChange={e => setUserInput(e.target.value)} 
                                                placeholder="請用小寫輸入..." 
                                                className={`w-full p-8 text-6xl font-black text-center rounded-[2.5rem] border-4 outline-none transition-all inner-shadow-focus ${isSpelledCorrect ? 'border-green-400 bg-green-50 text-green-600' : 'border-slate-100 bg-slate-50/50 text-slate-700'}`} 
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* Bottom Info Cards */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="bg-white p-10 rounded-[4rem] border-l-[20px] border-blue-500 shadow-xl relative group overflow-hidden">
                                        <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -z-10 transition-all group-hover:scale-110"></div>
                                        <button 
                                            onClick={() => speak(slides[currentSlide].sentence, 'sent')} 
                                            className={`absolute top-8 right-10 flex items-center gap-3 px-8 py-5 rounded-[2rem] shadow-2xl transition-all transform hover:scale-105 active:scale-95 ${hasSent ? 'bg-green-500 text-white' : 'bg-blue-600 text-white btn-audio-pulse'}`}
                                        >
                                            <Icons.Volume size={28} />
                                            <span className="font-black text-sm uppercase">🔊 聽聽句子</span>
                                        </button>
                                        <span className="text-xs font-black text-slate-300 uppercase tracking-widest block mb-4">Example Sentence</span>
                                        <p className="text-4xl font-bold text-slate-800 leading-tight pr-40">{slides[currentSlide].sentence}</p>
                                        <p className="text-2xl text-slate-400 font-bold italic mt-3">{slides[currentSlide].sentenceTrans}</p>
                                    </div>

                                    <div className="bg-white p-10 rounded-[4rem] border-2 border-dashed border-amber-200 shadow-sm relative group">
                                        <div className="absolute -top-6 -left-6 bg-amber-400 text-white p-4 rounded-3xl shadow-lg rotate-[-10deg] group-hover:rotate-0 transition-all">
                                            <Icons.Sparkles size={32} />
                                        </div>
                                        <span className="text-xs font-black text-amber-400 uppercase tracking-widest block mb-4 ml-12">知識小百科 Trivia</span>
                                        <p className="text-amber-900 font-bold text-xl leading-relaxed italic pr-4">"{slides[currentSlide].trivia}"</p>
                                    </div>
                                </div>
                            </div>

                            {/* Navigation Bar */}
                            <div className="bg-slate-50/80 backdrop-blur-sm p-12 flex flex-col items-center gap-8 border-t border-slate-100">
                                {!canNext && (
                                    <div className="text-red-500 font-black text-sm animate-pulse flex items-center gap-3 bg-white px-10 py-3 rounded-full shadow-md border border-red-50">
                                        <Icons.Lock size={18} /> 小勇者，請完成所有發音與拼寫任務喔！
                                    </div>
                                )}
                                <div className="flex justify-between w-full max-w-4xl">
                                    <button 
                                        onClick={() => setCurrentSlide(s => s-1)} 
                                        disabled={currentSlide === 0} 
                                        className={`group flex items-center gap-3 px-10 py-6 rounded-[2.5rem] font-black text-2xl transition-all ${currentSlide === 0 ? 'opacity-0' : 'bg-white text-slate-400 shadow-xl border border-slate-100 hover:text-slate-800'}`}
                                    >
                                        <Icons.Back size={28} className="group-hover:-translate-x-1 transition-transform" /> 上一步
                                    </button>
                                    <button 
                                        onClick={() => currentSlide === slides.length-1 ? setQuizStarted(true) : setCurrentSlide(s => s+1)} 
                                        disabled={!canNext} 
                                        className={`px-24 py-6 rounded-[2.5rem] font-black text-4xl shadow-[0_20px_40px_rgba(37,99,235,0.3)] flex items-center gap-6 transition-all border-b-8 ${canNext ? 'bg-blue-600 border-blue-800 text-white hover:scale-105 active:scale-95' : 'bg-slate-200 border-slate-300 text-slate-400 cursor-not-allowed shadow-none'}`}
                                    >
                                        {!canNext && <Icons.Lock size={36} />}
                                        {currentSlide === slides.length-1 ? "開始測驗" : "下一關"} 
                                        <Icons.Next size={40} className="animate-bounce-x" />
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* 精簡型除錯列 */}
                        <div className="fixed bottom-0 left-0 right-0 h-10 bg-slate-900/90 text-white flex items-center px-8 gap-8 z-50 text-[11px] font-mono border-t border-white/10 backdrop-blur-md">
                            <div className={`flex items-center gap-2 font-black tracking-widest ${isReady ? 'text-green-400' : 'text-red-400'}`}>
                                <div className={`w-2 h-2 rounded-full ${isReady ? 'bg-green-400 animate-pulse' : 'bg-red-400'}`}></div>
                                CLOUD: {isReady ? 'READY' : 'CONNECTING'}
                            </div>
                            <div className="flex-1 truncate opacity-60">System Log: {debugMsg[0]}</div>
                            <div className="opacity-30 uppercase tracking-[0.2em]">v3.0 Premium Canvas Edition</div>
                        </div>
                    </div>
                );
            }

            // 測驗畫面與完成畫面保持原本的高水準並進行細微美化
            if (quizStarted && !quizFinished) {
                const q = quizData[currentQ];
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-blue-50">
                        <div className="w-full max-w-4xl bg-white rounded-[5rem] p-16 shadow-[0_30px_60px_rgba(0,0,0,0.1)] text-center space-y-16 border-[15px] border-white">
                            <h2 className="text-6xl font-black text-blue-600 flex items-center justify-center gap-6">
                                <Icons.Sparkles className="text-yellow-400" size={56} /> 知識大挑戰 <Icons.Sparkles className="text-yellow-400" size={56} />
                            </h2>
                            <div className="space-y-4">
                                <span className="text-sm font-black text-slate-300 tracking-[0.3em] uppercase">Question {currentQ + 1} / {quizData.length}</span>
                                <p className="text-5xl font-bold text-slate-800 leading-tight px-12">{q.q}</p>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
                                {q.options.map((opt, i) => (
                                    <button key={i} onClick={() => { if(i === q.correct) setScore(score + 1); if(currentQ < quizData.length - 1) setCurrentQ(currentQ + 1); else setQuizFinished(true); }} className="p-10 text-4xl font-black bg-white border-4 border-slate-50 rounded-[3rem] hover:border-blue-500 hover:bg-blue-50 hover:scale-105 active:scale-95 transition-all text-slate-700 shadow-xl group">
                                        <span className="group-hover:text-blue-600 transition-colors">{opt}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-gradient-to-br from-indigo-600 via-blue-700 to-indigo-900 text-white text-center relative overflow-hidden">
                    <Icons.Award size={500} className="absolute -bottom-20 -right-20 opacity-10 -rotate-12" />
                    <div className="relative z-10 space-y-16 animate-in zoom-in duration-1000">
                        <div className="bg-yellow-400 text-slate-900 px-16 py-6 rounded-full text-4xl font-black shadow-[0_20px_50px_rgba(253,224,71,0.4)] inline-block tracking-tighter transform -rotate-2">MISSION ACCOMPLISHED!</div>
                        <Icons.Award size={240} className="text-yellow-300 mx-auto drop-shadow-[0_0_50px_rgba(253,224,71,0.7)] animate-bounce" />
                        <div className="space-y-6">
                            <h2 className="text-9xl font-black tracking-tighter leading-none drop-shadow-2xl">🏆 WELL DONE! 🏆</h2>
                            <p className="text-5xl font-black text-blue-100 italic drop-shadow-md">"You are an English Superstar!"</p>
                        </div>
                        <div className="bg-white/10 backdrop-blur-3xl p-16 rounded-[5rem] border-4 border-white/20 inline-block shadow-inner">
                            <p className="text-2xl font-black uppercase opacity-60 mb-4 tracking-[0.4em]">Final Score</p>
                            <div className="text-[12rem] font-black text-yellow-300 leading-none">{score} <span className="text-5xl text-white opacity-50">/ {quizData.length}</span></div>
                        </div>
                        <div className="pt-10">
                            <button onClick={() => window.location.reload()} className="px-24 py-8 bg-white text-blue-900 rounded-[3rem] font-black text-4xl shadow-[0_25px_50px_rgba(0,0,0,0.3)] hover:scale-110 active:scale-95 transition-all border-b-[12px] border-slate-200">再次啟航 🔄</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
