<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Time Explorer - Grade 4</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', 'PingFang TC', sans-serif; background-color: #fff9f9; }
        .macaron-blue { background-color: #BAE1FF; }
        .macaron-pink { background-color: #FFB3BA; }
        .macaron-purple { background-color: #E0BBE4; }
        .macaron-yellow { background-color: #FFFFBA; }
        .macaron-green { background-color: #BFFCC6; }
        .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .shadow-macaron { box-shadow: 0 12px 24px -10px rgba(186, 225, 255, 0.5); }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .float-anim { animation: float 6s ease-in-out infinite; }
        .progress-bar-glow { box-shadow: 0 0 10px rgba(167, 139, 250, 0.5); }
    </style>
</head>
<body class="text-slate-700">
    <div id="root"></div>

    <!-- Firebase SDK - Must load after root and before Babel logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FB = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            getFirestore, doc, getDoc, setDoc, collection 
        };
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        // Configuration - Updated ThemeID for new generation
        const themeId = "grade4-time-space-v2";
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        // Icon Definitions
        const RocketIcon = ({ className }) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path d="M15.5 8.5c1.2 1.2 1.5 3.5 1.5 3.5s-2.3.3-3.5 1.5c-1.2 1.2-1.5 3.5-1.5 3.5s-2.3.3-3.5 1.5c-1.2 1.2-1.5 3.5-1.5 3.5s2.3.3-3.5 1.5M10 14l-4 4M21 3s-3 0-6 3M3 21s0-3 3-6M14 10l7-7" strokeLinecap="round" strokeLinejoin="round"/></svg>;
        const PlanetIcon = ({ className }) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><circle cx="12" cy="12" r="9"/><path d="M3.6 9c1.5 1.5 4.5 2 6 2s4.5-1.5 6-1.5 4.5.5 5 1.5" strokeLinecap="round"/></svg>;
        const AudioIcon = ({ className }) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 010 7.07" strokeLinecap="round" strokeLinejoin="round"/></svg>;
        const StarIcon = ({ className }) => <svg className={className} fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>;
        const ClockIcon = ({ className }) => <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3" strokeLinecap="round" strokeLinejoin="round"/></svg>;

        const App = () => {
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [debugMsg, setDebugMsg] = useState("正在準備太空梭...");
            const [currentView, setCurrentView] = useState('learn');
            const [batchLoading, setBatchLoading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [vocabData, setVocabData] = useState([]);

            // Quiz States
            const [quizIdx, setQuizIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);

            const initialWords = useMemo(() => [
                { id: "v1", word: "eleven", zh: "十一", sentence: "I have eleven colored pencils.", sentenceZh: "我有十一枝彩色筆。" },
                { id: "v2", word: "twelve", zh: "十二", sentence: "There are twelve months in a year.", sentenceZh: "一年有十二個月。" },
                { id: "v3", word: "twenty", zh: "二十", sentence: "I invited twenty friends to my party.", sentenceZh: "我邀請了二十位朋友來我的派對。" },
                { id: "v4", word: "thirty", zh: "三十", sentence: "There are thirty days in this month.", sentenceZh: "這個月有三十天。" },
                { id: "v5", word: "forty", zh: "四十", sentence: "My uncle is forty years old.", sentenceZh: "我的叔叔四十歲。" },
                { id: "v6", word: "fifty-five", zh: "五十五", sentence: "Class ends in fifty-five minutes.", sentenceZh: "這堂課將在五十五分鐘後結束。" },
                { id: "v7", word: "what time", zh: "幾點", sentence: "What time do you go to school?", sentenceZh: "你幾點去上學？" },
                { id: "v8", word: "o'clock", zh: "點鐘", sentence: "It is exactly ten o'clock now.", sentenceZh: "現在剛好是十點鐘。" }
            ], []);

            useEffect(() => {
                setVocabData(initialWords.map(v => ({ ...v, img: null, imgStatus: 'idle', audioStatus: 'idle' })));

                const checkFB = setInterval(() => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        const app = window.FB.initializeApp(firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);

                        window.FB.onAuthStateChanged(auth, async (u) => {
                            if (u) {
                                setUser(u);
                                setDebugMsg(`✅ 航線已建立 (UID: ${u.uid})`);
                            } else {
                                await window.FB.signInAnonymously(auth).catch(e => setDebugMsg(`❌ 登入失敗: ${e.message}`));
                            }
                        });
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            const getSafeId = (text) => {
                return btoa(unescape(encodeURIComponent(text))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            };

            const updateVocab = (id, fields) => {
                setVocabData(prev => prev.map(v => v.id === id ? { ...v, ...fields } : v));
            };

            // Image Pipeline with Custom Prompts for clarity
            const fetchImage = async (word, id) => {
                if (!db || !user) return;
                const safeId = getSafeId(word);
                const docRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'images', safeId);

                try {
                    const snap = await window.FB.getDoc(docRef);
                    if (snap.exists()) {
                        updateVocab(id, { img: snap.data().url, imgStatus: 'cached' });
                        return snap.data().url;
                    }

                    updateVocab(id, { imgStatus: 'generating' });
                    const apiKey = "";
                    
                    // Logic for specific visual representations
                    let customPromptPart = `the concept of ${word}`;
                    if (word === "eleven") customPromptPart = "the Arabic numeral '11' written clearly in a space style";
                    if (word === "twelve") customPromptPart = "the Arabic numeral '12' written clearly in a space style";
                    if (word === "twenty") customPromptPart = "the Arabic numeral '20' written clearly in a space style";
                    if (word === "thirty") customPromptPart = "the Arabic numeral '30' written clearly in a space style";
                    if (word === "forty") customPromptPart = "the Arabic numeral '40' written clearly in a space style";
                    if (word === "fifty-five") customPromptPart = "the Arabic numeral '55' written clearly in a space style";
                    if (word === "what time") customPromptPart = "a large wall clock with a giant question mark next to it";
                    if (word === "o'clock") customPromptPart = "a clock face showing exactly one o'clock (1:00)";

                    const prompt = `children's picture book style, whimsical, warm and cheerful, storytelling illustrations, ${customPromptPart} clearly visible in a magical space station setting, pastel macaron colors, bold outlines`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ instances: { prompt }, parameters: { sampleCount: 1 } })
                    });
                    
                    if (!res.ok) throw new Error("API Limit or Network Error");
                    const data = await res.json();
                    const rawB64 = data.predictions[0].bytesBase64Encoded;
                    
                    // Canvas Compression to JPEG 0.7
                    const compressed = await new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            canvas.width = 512;
                            canvas.height = (img.height / img.width) * 512;
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.7));
                        };
                        img.src = `data:image/png;base64,${rawB64}`;
                    });

                    await window.FB.setDoc(docRef, { url: compressed, ts: Date.now() });
                    updateVocab(id, { img: compressed, imgStatus: 'done' });
                    return compressed;
                } catch (e) {
                    setDebugMsg(`⚠️ 影像通訊故障 (${word}): ${e.message}`);
                    updateVocab(id, { imgStatus: 'error' });
                }
            };

            // Audio Pipeline
            const speakWord = async (text, id) => {
                if (!db || !user) return;
                const safeId = getSafeId(text);
                const docRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'audio', safeId);

                try {
                    updateVocab(id, { audioStatus: 'loading' });
                    const snap = await window.FB.getDoc(docRef);
                    let audioData;

                    if (snap.exists()) {
                        audioData = snap.data().audio;
                        setDebugMsg(`🔊 讀取雲端音訊: ${text}`);
                    } else {
                        const apiKey = "";
                        const fetchTTS = async (retries = 5) => {
                            for (let i = 0; i < retries; i++) {
                                try {
                                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                                        method: 'POST',
                                        body: JSON.stringify({
                                            contents: [{ parts: [{ text: `Say clearly: ${text}` }] }],
                                            generationConfig: { 
                                                responseModalities: ["AUDIO"],
                                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                                            }
                                        })
                                    });
                                    if (res.ok) return await res.json();
                                } catch (e) { if (i === retries - 1) throw e; }
                                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                            }
                        };
                        const result = await fetchTTS();
                        audioData = result.candidates[0].content.parts[0].inlineData.data;
                        if (audioData.length > 100) await window.FB.setDoc(docRef, { audio: audioData });
                    }

                    if (audioData) {
                        playWav(audioData);
                        updateVocab(id, { audioStatus: 'playing' });
                        setTimeout(() => updateVocab(id, { audioStatus: 'idle' }), 2000);
                    }
                } catch (e) {
                    setDebugMsg(`⚠️ 備援廣播啟動: ${text}`);
                    const utter = new SpeechSynthesisUtterance(text);
                    utter.lang = 'en-US';
                    window.speechSynthesis.speak(utter);
                    updateVocab(id, { audioStatus: 'idle' });
                }
            };

            const playWav = (b64) => {
                const bin = atob(b64);
                const buf = new Uint8Array(bin.length + 44);
                const view = new DataView(buf.buffer);
                const writeStr = (o, s) => { for(let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
                
                writeStr(0, 'RIFF');
                view.setUint32(4, 36 + bin.length, true);
                writeStr(8, 'WAVE');
                writeStr(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true);
                view.setUint32(28, 48000, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeStr(36, 'data');
                view.setUint32(40, bin.length, true);
                
                for(let i=0; i<bin.length; i++) buf[44+i] = bin.charCodeAt(i);
                const url = URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
                new Audio(url).play();
            };

            const handleBatchSync = async () => {
                if (batchLoading) return;
                setBatchLoading(true);
                setProgress(0);
                for (let i = 0; i < vocabData.length; i++) {
                    setDebugMsg(`🚀 同步中: ${vocabData[i].word}...`);
                    await fetchImage(vocabData[i].word, vocabData[i].id);
                    setProgress(Math.round(((i + 1) / vocabData.length) * 100));
                }
                setBatchLoading(false);
                setDebugMsg("✅ 資源已全部就位！");
            };

            const checkQuiz = (ans) => {
                const correct = vocabData[quizIdx].word;
                if (ans === correct) {
                    setScore(s => s + 1);
                    setDebugMsg("✨ 答對了！你獲得一顆星星！");
                } else {
                    setDebugMsg(`🛸 哎呀！正確答案應該是 ${correct}`);
                }

                if (quizIdx < vocabData.length - 1) {
                    setTimeout(() => setQuizIdx(i => i + 1), 1000);
                } else {
                    setTimeout(() => setIsFinished(true), 1000);
                }
            };

            const renderLearn = () => (
                <Fragment>
                    {/* Header Action */}
                    <div className="glass-card p-6 rounded-[2rem] shadow-macaron flex flex-col md:flex-row items-center justify-between mb-10 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 macaron-blue rounded-3xl flex items-center justify-center float-anim shadow-lg">
                                <RocketIcon className="w-8 h-8 text-blue-600" />
                            </div>
                            <div>
                                <h2 className="text-2xl font-black text-slate-800">星際時間站 (V2 視覺優化)</h2>
                                <p className="text-slate-500 text-sm">點擊同步，阿拉伯數字與時鐘插圖將更清晰。</p>
                            </div>
                        </div>
                        <div className="flex flex-col items-end gap-2 w-full md:w-auto">
                            <button 
                                onClick={handleBatchSync}
                                disabled={batchLoading}
                                className="w-full md:w-auto px-8 py-4 bg-purple-500 hover:bg-purple-600 text-white rounded-2xl font-black shadow-lg transition transform active:scale-95 disabled:opacity-50 flex items-center justify-center gap-3"
                            >
                                {batchLoading ? `⌛ 正在穿越時空 ${progress}%` : "🚀 一鍵合成語音與插圖"}
                            </button>
                            {batchLoading && (
                                <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden border border-slate-200">
                                    <div className="h-full bg-purple-400 transition-all duration-300 progress-bar-glow" style={{ width: `${progress}%` }}></div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Word Grid */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                        {vocabData.map(v => (
                            <div key={v.id} className="glass-card rounded-[2.5rem] overflow-hidden hover:shadow-2xl transition-all duration-500 group border-b-8 border-slate-200">
                                <div className="aspect-square bg-slate-50 relative flex items-center justify-center overflow-hidden">
                                    {v.img ? (
                                        <img src={v.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={v.word} />
                                    ) : (
                                        <div className="flex flex-col items-center opacity-20">
                                            <PlanetIcon className="w-16 h-16 mb-2" />
                                            <span className="text-xs font-bold tracking-widest">{v.imgStatus === 'generating' ? 'AI DRAWING...' : 'EMPTY SPACE'}</span>
                                        </div>
                                    )}
                                    {v.imgStatus === 'cached' && <div className="absolute top-4 right-4 bg-green-500/80 backdrop-blur-md text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-sm">✅ 已快取</div>}
                                </div>
                                <div className="p-6">
                                    <div className="flex justify-between items-start mb-2">
                                        <div>
                                            <h3 className="text-3xl font-black text-slate-800">{v.word}</h3>
                                            <span className="px-3 py-1 macaron-green text-green-700 rounded-full text-sm font-bold">{v.zh}</span>
                                        </div>
                                        <button 
                                            onClick={() => speakWord(v.word, v.id)}
                                            className={`p-4 rounded-2xl transition shadow-md ${v.audioStatus === 'playing' ? 'bg-yellow-400 text-white' : 'macaron-yellow text-yellow-700 hover:bg-yellow-200 active:scale-90'}`}
                                        >
                                            <AudioIcon className="w-6 h-6" />
                                        </button>
                                    </div>
                                    <div className="mt-4 p-4 bg-white/50 rounded-2xl border border-white">
                                        <p className="text-sm text-slate-600 font-bold italic">"{v.sentence}"</p>
                                        <p className="text-xs text-slate-400 mt-1">{v.sentenceZh}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </Fragment>
            );

            const renderQuiz = () => {
                if (isFinished) {
                    return (
                        <div className="max-w-md mx-auto glass-card rounded-[3rem] p-12 text-center shadow-2xl mt-12">
                            <div className="w-24 h-24 macaron-pink rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                <StarIcon className="w-12 h-12 text-pink-600 float-anim" />
                            </div>
                            <h2 className="text-4xl font-black text-slate-800 mb-2">冒險結束！</h2>
                            <p className="text-slate-500 mb-8">你對時間的掌握就像個老練的艦長。</p>
                            <div className="text-7xl font-black text-purple-600 mb-10">{Math.round((score / vocabData.length) * 100)}%</div>
                            <button onClick={() => { setCurrentView('learn'); setIsFinished(false); setQuizIdx(0); setScore(0); }} className="w-full py-5 bg-slate-800 text-white rounded-2xl font-bold shadow-lg hover:bg-slate-700 transition">回到訓練營</button>
                        </div>
                    );
                }

                const current = vocabData[quizIdx];
                const options = vocabData.map(v => v.word).sort(() => Math.random() - 0.5).slice(0, 3);
                if (!options.includes(current.word)) options[Math.floor(Math.random() * 3)] = current.word;

                return (
                    <div className="max-w-3xl mx-auto mt-10">
                        <div className="glass-card rounded-[3rem] p-10 shadow-2xl">
                            <div className="flex justify-between items-center mb-10 text-slate-400 font-bold tracking-tighter uppercase text-sm">
                                <span>Question {quizIdx + 1} / {vocabData.length}</span>
                                <div className="flex gap-1 text-yellow-400">
                                    {[...Array(score)].map((_, i) => <StarIcon key={i} className="w-5 h-5" />)}
                                </div>
                            </div>
                            <div className="aspect-[16/9] bg-slate-50 rounded-[2rem] overflow-hidden mb-10 shadow-inner flex items-center justify-center">
                                {current.img ? <img src={current.img} className="w-full h-full object-cover" /> : <ClockIcon className="w-20 h-20 text-slate-200" />}
                            </div>
                            <h3 className="text-2xl font-bold text-center text-slate-700 mb-10">這幅畫描述的是哪個概念？</h3>
                            <div className="grid grid-cols-2 gap-4">
                                {options.map(opt => (
                                    <button 
                                        key={opt}
                                        onClick={() => checkQuiz(opt)}
                                        className="py-6 px-8 bg-white border-4 border-slate-50 rounded-[1.5rem] font-black text-xl text-slate-600 hover:border-purple-300 hover:bg-purple-50 transition shadow-sm"
                                    >
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-24">
                    {/* Navbar */}
                    <nav className="p-8 flex justify-between items-center max-w-7xl mx-auto">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 macaron-purple rounded-2xl flex items-center justify-center shadow-lg rotate-6">
                                <ClockIcon className="w-7 h-7 text-purple-700" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 leading-none tracking-tight">SpaceTime</h1>
                                <span className="text-[10px] font-bold text-purple-400 tracking-widest uppercase">Academy G4</span>
                            </div>
                        </div>
                        <div className="flex bg-white/50 p-2 rounded-2xl shadow-inner gap-2">
                            <button onClick={() => setCurrentView('learn')} className={`px-6 py-2 rounded-xl text-sm font-bold transition ${currentView === 'learn' ? 'bg-purple-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>單字探索</button>
                            <button onClick={() => { setCurrentView('quiz'); setIsFinished(false); setQuizIdx(0); setScore(0); }} className={`px-6 py-2 rounded-xl text-sm font-bold transition ${currentView === 'quiz' ? 'bg-purple-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>任務測驗</button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-8">
                        {currentView === 'learn' ? renderLearn() : renderQuiz()}
                    </main>

                    {/* Debug Bar */}
                    <div className="fixed bottom-0 left-0 right-0 h-10 bg-slate-900/90 backdrop-blur-md text-white flex items-center px-6 justify-between text-[10px] font-mono z-[100] border-t border-white/10">
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2">
                                <span className={`w-2 h-2 rounded-full ${db ? 'bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.5)]' : 'bg-red-400 animate-pulse'}`}></span>
                                <span>COMMUNICATION: {db ? 'ONLINE' : 'LINKING...'}</span>
                            </div>
                            <span className="text-white/30">|</span>
                            <span className="text-white/70 italic truncate max-w-[400px]">{debugMsg}</span>
                        </div>
                        <div className="hidden md:flex gap-6 uppercase tracking-widest text-white/40">
                            <span>ID: {themeId}</span>
                            <span>Pilot: {user ? user.uid.slice(0, 8) : 'IDENTIFYING...'}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
