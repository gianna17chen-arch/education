<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Phonics World - Pro Enterprise Edition</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-bounce-slow { animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        .progress-bar { transition: width 0.3s ease-in-out; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-yellow-50 selection:bg-emerald-100 overflow-x-hidden">
    <div id="root"></div>

    <!-- Firebase SDK Implementation -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React Application -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, memo } = React;

        // --- Icon Components ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const BookOpen = (p) => <IconWrapper {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"/></IconWrapper>;
        const Sparkles = (p) => <IconWrapper {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
        const MessageSquare = (p) => <IconWrapper {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconWrapper>;
        const ChevronRight = (p) => <IconWrapper {...p}><path d="m9 18 6-6-6-6"/></IconWrapper>;
        const ChevronLeft = (p) => <IconWrapper {...p}><path d="m15 18-6-6 6-6"/></IconWrapper>;
        const Home = (p) => <IconWrapper {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
        const Volume2 = (p) => <IconWrapper {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconWrapper>;
        const Loader2 = (p) => <IconWrapper {...p} className={`${p.className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconWrapper>;
        const DownloadCloud = (p) => <IconWrapper {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></IconWrapper>;
        const Star = (p) => <IconWrapper {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
        const Heart = (p) => <IconWrapper {...p}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></IconWrapper>;

        // --- Optimized WordCard Component ---
        const WordCard = ({ item, db, appId, safeIdFn, onPlay, isSpeaking, textColor }) => {
            const [localImg, setLocalImg] = useState(null);

            useEffect(() => {
                const load = async () => {
                    if (!db) return;
                    const sid = safeIdFn(item.text);
                    const iRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'image_cache', sid);
                    try {
                        const iDoc = await window.FB.getDoc(iRef);
                        if (iDoc.exists()) {
                            setLocalImg(`data:image/jpeg;base64,${iDoc.data().imgBase64}`);
                        }
                    } catch (e) {
                        console.error("Image load error:", e);
                    }
                };
                load();
            }, [db, item.text]);

            return (
                <div className="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] border-4 border-emerald-50 shadow-lg group relative flex flex-col items-center hover:scale-[1.02] transition-transform duration-300">
                    <button 
                        onClick={() => onPlay(item.text, item.text)}
                        className={`absolute top-6 right-6 p-4 rounded-2xl shadow-md transition-all ${isSpeaking === item.text ? 'bg-emerald-400 text-white animate-pulse' : 'bg-emerald-50 text-emerald-400 hover:bg-emerald-100'}`}
                    >
                        {isSpeaking === item.text ? <Loader2 size={32} /> : <Volume2 size={32} />}
                    </button>
                    <div className="w-full aspect-square bg-slate-50 rounded-3xl overflow-hidden mb-6 flex items-center justify-center border-2 border-slate-100 shadow-inner">
                        {localImg ? (
                            <img src={localImg} alt={item.text} className="w-full h-full object-cover fade-in" />
                        ) : (
                            <div className="flex flex-col items-center gap-2 opacity-30">
                                <span className="text-8xl">{item.icon}</span>
                                <span className="text-xs font-bold uppercase tracking-widest italic">Default Icon</span>
                            </div>
                        )}
                    </div>
                    <div className={`text-4xl md:text-6xl font-black mb-2 ${textColor}`}>{item.text}</div>
                    <div className="text-2xl md:text-3xl text-slate-400 font-bold">{item.trans}</div>
                    {localImg && <div className="mt-4 px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-black rounded-full uppercase tracking-tighter">Cloud Asset Ready</div>}
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeGroup, setActiveGroup] = useState(null);
            const [step, setStep] = useState(0);
            const [isSpeaking, setIsSpeaking] = useState(null);
            const [debugMsg, setDebugMsg] = useState("🚀 System: Initializing Phonics Pro Engine...");
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [syncProgress, setSyncProgress] = useState(0);
            const [isSyncing, setIsSyncing] = useState(false);

            const apiKey = ""; 
            const appId = "phonics-magic-e-enterprise-pro-v3"; // Bumped version for fresh state
            
            const firebaseConfig = {
                apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
                authDomain: "education-b38d5.firebaseapp.com",
                projectId: "education-b38d5",
                storageBucket: "education-b38d5.firebasestorage.app",
                messagingSenderId: "450320441540",
                appId: "1:450320441540:web:888014b1380a473a142991",
                measurementId: "G-70DQ70W0B8"
            };

            const phonicsData = {
                short_e: {
                    title: "Short e (/ɛ/)",
                    rule: "短母音 e 發音像是 /ɛ/！嘴巴微微張開，嘴角向兩邊拉一點點，像在微笑。",
                    ruleHint: "通常出現在兩個子音中間 (CVC)，像是 Bed 或 Egg。",
                    accentColor: "bg-emerald-400",
                    textColor: "text-emerald-600",
                    words: [
                        { text: "Bed", trans: "床", icon: "🛏️", prompt: "A cozy wooden bed with a white pillow and blue blanket, 3D clay style, white background." },
                        { text: "Egg", trans: "雞蛋", icon: "🥚", prompt: "A fresh white egg in a bird nest, 3D cartoon style, isolated on white." },
                        { text: "Pen", trans: "原子筆", icon: "🖊️", prompt: "A bright blue ballpoint pen, 3D stylized art, white background." },
                        { text: "Red", trans: "紅色", icon: "🔴", prompt: "A vibrant red splash of paint, cute 3D design, white background." },
                        { text: "Net", trans: "網子", icon: "🕸️", prompt: "A simple butterfly net with a wooden handle, 3D style, white background." }
                    ],
                    comparisons: [
                        { id: 'se1', pair: "Pet vs. Pete", sentence: "Pete has a small pet dog.", trans: "皮特有一隻小寵物狗。" },
                        { id: 'se2', pair: "Them vs. Theme", sentence: "The theme park is for them.", trans: "那個主題樂園是給他們玩的。" }
                    ]
                },
                long_e_e: {
                    title: "Long e-e (/iː/)",
                    rule: "長母音 e 發字母本身的音 /iː/！就像你在說 'Easy' 的開頭一樣。",
                    ruleHint: "當字尾出現 Magic e，它會把前面的 e 變成長長的 /iː/ 喔！",
                    accentColor: "bg-violet-400",
                    textColor: "text-violet-600",
                    words: [
                        { text: "Pete", trans: "皮特(人名)", icon: "👦", prompt: "A cheerful young boy named Pete, green t-shirt, 3D clay style, white background." },
                        { text: "Eve", trans: "夏娃(人名)", icon: "👧", prompt: "A cute little girl named Eve with long hair, 3D style, white background." },
                        { text: "These", trans: "這些", icon: "👈", prompt: "A friendly hand pointing at many toys, 3D cartoon style, white background." },
                        { text: "Gene", trans: "基因", icon: "🧬", prompt: "A colorful stylized DNA double helix, 3D science art, white background." },
                        { text: "Theme", trans: "主題", icon: "🎨", prompt: "A painting palette with colorful paints and brushes, 3D style, white background." }
                    ],
                    comparisons: [
                        { id: 'le1', pair: "Pet vs. Pete", sentence: "Is that pet for Pete?", trans: "那隻寵物是給皮特的嗎？" },
                        { id: 'le2', pair: "Them vs. These", sentence: "Give these toys to them.", trans: "把這些玩具給他們。" }
                    ]
                }
            };

            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        try {
                            const app = window.FB.initializeApp(firebaseConfig);
                            const auth = window.FB.getAuth(app);
                            const firestore = window.FB.getFirestore(app);
                            await window.FB.signInAnonymously(auth);
                            window.FB.onAuthStateChanged(auth, (u) => {
                                setUser(u);
                                setDb(firestore);
                                setDebugMsg(`✅ System Ready | Auth: ${u?.uid.slice(0, 6)}`);
                            });
                        } catch (err) { setDebugMsg(`❌ FB Error: ${err.message}`); }
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            const safeId = (text) => btoa(unescape(encodeURIComponent(text.trim()))).replace(/[/+=]/g, '_');
            
            const pcmToWav = (pcmBase64) => {
                if (!pcmBase64 || pcmBase64.length < 100) {
                    console.error("Invalid PCM data length");
                    return null;
                }
                try {
                    const binary = window.atob(pcmBase64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    
                    const wavHeader = new ArrayBuffer(44 + bytes.length);
                    const view = new DataView(wavHeader);
                    const writeStr = (o, s) => { for(let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
                    
                    writeStr(0, 'RIFF');
                    view.setUint32(4, 36 + bytes.length, true);
                    writeStr(8, 'WAVE');
                    writeStr(12, 'fmt ');
                    view.setUint32(16, 16, true);
                    view.setUint16(20, 1, true);
                    view.setUint16(22, 1, true);
                    view.setUint32(24, 24000, true);
                    view.setUint32(28, 48000, true);
                    view.setUint16(32, 2, true);
                    view.setUint16(34, 16, true);
                    writeStr(36, 'data');
                    view.setUint32(40, bytes.length, true);
                    
                    new Uint8Array(wavHeader, 44).set(bytes);
                    return URL.createObjectURL(new Blob([wavHeader], { type: 'audio/wav' }));
                } catch (e) {
                    console.error("WAV conversion error:", e);
                    return null;
                }
            };

            const fetchAudio = async (text) => {
                const speechText = text.replace(/\/ɛ\//g, "short e sound").replace(/\/iː\//g, "long e sound");
                const prompt = /[\u4e00-\u9fa5]/.test(text) ? `請用台灣口音朗讀：${speechText}` : `Say clearly and naturally: ${speechText}`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                    })
                });
                const result = await response.json();
                const data = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (!data) throw new Error(`Audio synthesis failed for "${text.slice(0, 10)}"`);
                return data;
            };

            const fetchImage = async (prompt) => {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: { prompt }, parameters: { sampleCount: 1 } })
                });
                const json = await res.json();
                const data = json.predictions?.[0]?.bytesBase64Encoded;
                if (!data) throw new Error("Image generation failed");
                return data;
            };

            const compressImage = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = `data:image/png;base64,${base64}`;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const width = 512;
                        const scale = width / img.width;
                        canvas.width = width;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                    };
                });
            };

            // --- Robust Sync Pipeline ---
            const oneClickSync = async () => {
                if (!db || isSyncing) return;
                setIsSyncing(true);
                setSyncProgress(0);
                setDebugMsg("🔄 Initializing Cloud Pipeline...");

                const tasks = [];
                Object.values(phonicsData).forEach(group => {
                    tasks.push({ type: 'audio', text: group.rule });
                    group.words.forEach(w => tasks.push({ type: 'both', text: w.text, prompt: w.prompt }));
                    group.comparisons.forEach(c => tasks.push({ type: 'audio', text: c.sentence }));
                });

                let completed = 0;
                for (const task of tasks) {
                    try {
                        const sid = safeId(task.text);
                        const aRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'audio_cache', sid);
                        const aDoc = await window.FB.getDoc(aRef);
                        
                        // Check for missing or corrupted audio
                        if (!aDoc.exists() || (aDoc.data()?.audioBase64?.length || 0) < 100) {
                            setDebugMsg(`🎙️ Syncing Audio: ${task.text.slice(0, 12)}...`);
                            const base64 = await fetchAudio(task.text);
                            await window.FB.setDoc(aRef, { audioBase64: base64, text: task.text, timestamp: Date.now() });
                        }

                        if (task.type === 'both') {
                            const iRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'image_cache', sid);
                            const iDoc = await window.FB.getDoc(iRef);
                            if (!iDoc.exists()) {
                                setDebugMsg(`🎨 Syncing Image: ${task.text}...`);
                                const raw = await fetchImage(task.prompt);
                                const compressed = await compressImage(raw);
                                await window.FB.setDoc(iRef, { imgBase64: compressed, text: task.text, timestamp: Date.now() });
                            }
                        }
                        completed++;
                        setSyncProgress(Math.floor((completed / tasks.length) * 100));
                    } catch (err) { 
                        setDebugMsg(`⚠️ Skipping "${task.text.slice(0, 5)}": ${err.message}`);
                    }
                }
                setIsSyncing(false);
                setDebugMsg("✅ Cloud Sync Completed! Refresh page if needed.");
            };

            const handlePlay = async (text, id) => {
                if (!db || isSpeaking) return;
                setIsSpeaking(id);
                const sid = safeId(text);
                const aRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'audio_cache', sid);
                
                try {
                    const aDoc = await window.FB.getDoc(aRef);
                    let audioData = null;

                    if (aDoc.exists() && aDoc.data().audioBase64) {
                        setDebugMsg(`✅ Cloud Match: "${text.slice(0, 10)}..."`);
                        audioData = aDoc.data().audioBase64;
                    } else {
                        setDebugMsg("⌛ Cache Miss. Calling AI...");
                        audioData = await fetchAudio(text);
                        await window.FB.setDoc(aRef, { audioBase64: audioData, text, timestamp: Date.now() });
                    }

                    const audioUrl = pcmToWav(audioData);
                    if (!audioUrl) throw new Error("Format conversion failed");
                    
                    const audio = new Audio(audioUrl);
                    audio.onended = () => { setIsSpeaking(null); URL.revokeObjectURL(audioUrl); };
                    audio.onerror = (e) => {
                        setDebugMsg("⚠️ Source Unsupported. Using Fallback...");
                        const u = new SpeechSynthesisUtterance(text);
                        u.lang = /[\u4e00-\u9fa5]/.test(text) ? 'zh-TW' : 'en-US';
                        u.onend = () => setIsSpeaking(null);
                        window.speechSynthesis.speak(u);
                    };
                    await audio.play();
                } catch (err) { 
                    setDebugMsg(`❌ Error: ${err.message}`); 
                    setIsSpeaking(null); 
                }
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-8 space-y-12 bg-yellow-50">
                    <div className="text-center space-y-6">
                        <div className="flex justify-center gap-4 mb-2">
                            <Heart className="text-pink-400 fill-pink-400 animate-pulse" size={48} />
                            <Star className="text-yellow-400 fill-yellow-400 animate-bounce-slow" size={64} />
                            <Heart className="text-pink-400 fill-pink-400 animate-pulse" size={48} />
                        </div>
                        <h1 className="text-5xl md:text-8xl font-black tracking-tight text-emerald-600 drop-shadow-md">Magic 'e' Pro</h1>
                        <p className="text-xl md:text-3xl text-emerald-800/70 font-bold bg-white/60 py-2 px-8 rounded-full inline-block border-2 border-emerald-100 shadow-sm">
                            Enterprise Phonics Pipeline V3
                        </p>
                    </div>

                    <div className="w-full max-w-xl bg-white/80 p-6 rounded-[2rem] border-4 border-emerald-100 shadow-xl space-y-4">
                        <button 
                            onClick={oneClickSync}
                            disabled={isSyncing}
                            className={`w-full py-6 rounded-2xl flex items-center justify-center gap-4 text-2xl font-black text-white transition-all shadow-lg ${isSyncing ? 'bg-slate-400' : 'bg-gradient-to-r from-emerald-500 to-teal-600 hover:scale-105 active:scale-95'}`}
                        >
                            {isSyncing ? <Loader2 size={32} /> : <DownloadCloud size={32} />}
                            {isSyncing ? `${syncProgress}% 正在拼命下載中...` : '一鍵同步語音與插圖'}
                        </button>
                        {isSyncing && (
                            <div className="w-full h-4 bg-slate-200 rounded-full overflow-hidden">
                                <div className="h-full bg-emerald-500 progress-bar" style={{width: `${syncProgress}%`}}></div>
                            </div>
                        )}
                        <p className="text-center text-xs text-slate-400 font-bold uppercase tracking-widest">
                            Sync will check Firebase cache first to save quota.
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 w-full max-w-4xl px-4">
                        {Object.entries(phonicsData).map(([key, data]) => (
                            <button
                                key={key}
                                onClick={() => { setActiveGroup(key); setStep(0); setCurrentPage('lesson'); }}
                                className="group bg-white border-4 border-dashed border-emerald-200 hover:border-emerald-400 rounded-[3rem] p-12 transition-all duration-300 hover:scale-105 shadow-xl relative overflow-hidden"
                            >
                                <div className={`absolute -right-4 -top-4 w-24 h-24 rounded-full ${data.accentColor} opacity-20`} />
                                <div className="text-8xl mb-6">{key === 'short_e' ? '🥚' : '👦'}</div>
                                <div className={`text-4xl md:text-5xl font-black mb-2 ${data.textColor}`}>{data.title}</div>
                                <div className="text-2xl text-slate-500 font-medium italic">Start Adventure</div>
                            </button>
                        ))}
                    </div>
                </div>
            );

            const renderLesson = () => {
                const data = phonicsData[activeGroup];
                if (!data) return null;
                return (
                    <div className="flex flex-col min-h-screen pb-24">
                        <div className="flex items-center justify-between p-4 md:p-8 bg-white/80 border-b-4 border-emerald-100 backdrop-blur-sm sticky top-0 z-50">
                            <button onClick={() => setCurrentPage('home')} className="flex items-center gap-2 text-xl md:text-2xl font-bold text-emerald-600 transition-colors hover:text-emerald-500"><Home size={32} /> 回主選單</button>
                            <div className={`text-2xl md:text-4xl font-black ${data.textColor}`}>{data.title}</div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center p-4 md:p-8 overflow-y-auto">
                            <div className="w-full max-w-6xl bg-white/95 p-6 md:p-12 rounded-[2rem] md:rounded-[4rem] shadow-2xl border-4 border-white relative">
                                {step === 0 && (
                                    <div className="text-center space-y-10 animate-in zoom-in duration-500">
                                        <div className={`${data.accentColor} inline-block p-6 rounded-full text-white mb-4 shadow-lg`}><Sparkles size={64} /></div>
                                        <h2 className="text-5xl md:text-7xl font-black text-slate-700 underline decoration-emerald-100 decoration-8 underline-offset-8">發音規則</h2>
                                        <div className="space-y-6">
                                            <p className="text-3xl md:text-5xl leading-relaxed font-bold px-4 md:px-12">{data.rule}</p>
                                            <div className="bg-emerald-50 p-6 md:p-8 rounded-3xl border-2 border-emerald-100 inline-block shadow-sm">
                                                <p className="text-2xl md:text-3xl text-emerald-900/70 italic font-bold">💡 {data.ruleHint}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => handlePlay(data.rule, 'rule')}
                                            className="mt-6 flex items-center gap-4 mx-auto px-8 py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl text-xl md:text-2xl font-bold transition-all shadow-md active:translate-y-1"
                                        >
                                            {isSpeaking === 'rule' ? <Loader2 className="text-emerald-500" /> : <Volume2 className="text-emerald-500" />} 聽老師講解規則
                                        </button>
                                    </div>
                                )}

                                {step === 1 && (
                                    <div className="animate-in slide-in-from-right duration-500">
                                        <h2 className="text-4xl md:text-6xl font-black text-center mb-8 md:mb-16 flex items-center justify-center gap-6"><BookOpen size={56} className={data.textColor} /> 精選單字卡</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                                            {data.words.map((item, idx) => (
                                                <WordCard 
                                                    key={idx} 
                                                    item={item} 
                                                    db={db} 
                                                    appId={appId} 
                                                    safeIdFn={safeId}
                                                    onPlay={handlePlay}
                                                    isSpeaking={isSpeaking}
                                                    textColor={data.textColor}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="animate-in slide-in-from-bottom duration-500">
                                        <h2 className="text-4xl md:text-6xl font-black text-center mb-8 md:mb-16 flex items-center justify-center gap-6"><MessageSquare size={56} className={data.textColor} /> 混淆字對抗賽！</h2>
                                        <div className="space-y-6 md:space-y-10">
                                            {data.comparisons.map((item, idx) => (
                                                <div key={idx} className="bg-white p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] border-4 border-emerald-50 shadow-xl relative group flex flex-col md:flex-row items-center gap-6 md:gap-8 hover:border-emerald-400 transition-colors">
                                                    <div className="flex-1 text-center md:text-left">
                                                        <div className={`text-2xl md:text-3xl font-black mb-2 md:mb-4 uppercase tracking-widest ${data.textColor}`}>{item.pair}</div>
                                                        <p className="text-3xl md:text-5xl font-black leading-tight mb-2 md:mb-4 text-slate-700">
                                                            {item.sentence.split(' ').map((word, i) => {
                                                                const targets = ['bed', 'egg', 'pen', 'red', 'net', 'pete', 'eve', 'these', 'gene', 'theme', 'pet', 'them', 'met', 'mete', 'steve', 'step'];
                                                                const isTarget = targets.includes(word.toLowerCase().replace(/[^a-z-]/g, ''));
                                                                return <span key={i} className={isTarget ? "text-emerald-500 underline underline-offset-8 mx-1" : "mx-1"}>{word}</span>;
                                                            })}
                                                        </p>
                                                        <p className="text-xl md:text-3xl text-slate-400 font-bold">{item.trans}</p>
                                                    </div>
                                                    <button onClick={() => handlePlay(item.sentence, item.id)} className={`p-6 md:p-8 rounded-3xl transition-all shadow-md active:scale-95 ${isSpeaking === item.id ? 'bg-emerald-400 text-white' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'}`}>
                                                        {isSpeaking === item.id ? <Loader2 size={48} /> : <Volume2 size={48} />}
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="p-4 md:p-8 flex justify-between fixed bottom-12 w-full left-0 z-40 bg-white/50 backdrop-blur-sm border-t-2 border-white/50">
                            <button onClick={() => step > 0 ? setStep(step - 1) : setCurrentPage('home')} className="px-6 md:px-12 py-4 md:py-6 bg-white border-4 border-emerald-100 rounded-3xl text-xl md:text-3xl font-black text-emerald-400 shadow-md flex items-center gap-3 transition-all hover:bg-emerald-50 active:scale-95"><ChevronLeft size={40} /> 上一頁</button>
                            <button onClick={() => step < 2 ? setStep(step + 1) : setCurrentPage('home')} className={`px-8 md:px-16 py-4 md:py-6 ${data.accentColor} rounded-3xl text-xl md:text-3xl font-black text-white shadow-xl flex items-center gap-3 transition-all active:scale-95`}>{step === 2 ? "結束本課" : "下一頁"} <ChevronRight size={40} /></button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    {currentPage === 'home' ? renderHome() : renderLesson()}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 text-cyan-400 px-4 py-2 text-xs font-mono flex items-center justify-between z-[9999] border-t border-cyan-900/50">
                        <div className="flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                            {debugMsg}
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => window.location.reload()} className="hover:text-white underline">Refresh Engine</button>
                            <span className="opacity-50 uppercase tracking-tighter">AppID: {appId}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
