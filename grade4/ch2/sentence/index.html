<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品位置大挑戰 - Where is it? AI Edition</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f7ff; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 2rem; box-shadow: 0 10px 40px rgba(59, 130, 246, 0.1); border: 2px solid #e2e8f0; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); }
        .btn-primary:disabled { background: #94a3b8; transform: none; box-shadow: none; }
        .debug-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; color: #10b981; font-family: monospace; font-size: 12px; padding: 4px 12px; z-index: 9999; display: flex; justify-content: space-between; border-top: 1px solid #334155; }
        .sync-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .image-container { aspect-ratio: 1/1; overflow: hidden; border-radius: 1.5rem; background: #f8fafc; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        .grammar-tag { padding: 4px 12px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FB = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, doc, getDoc, setDoc, collection 
        };
    </script>

    <!-- React Application -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Configuration & Constants
        const themeId = "where-is-it-prepositions-v2";
        const apiKey = ""; 
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        const GRAMMAR_TIPS = {
            singular_be: "單數物品用 'is'，回答用 'It's'。",
            plural_be: "複數物品用 'are'，回答用 'They're'。",
            prep_in: "物品在「裡面」要用 'in'。",
            prep_on: "物品在「上面」要用 'on'。",
            prep_under: "物品在「下面」要用 'under'。",
            where: "詢問「在哪裡」開頭要用 'Where'。"
        };

        const questionsData = [
            { id: "q1", type: 'fill', q: "Where ___ the robot?", a: "is", tip: "singular_be", prompt: "A cute toy robot standing alone on a white floor, 3d render style, simple background" },
            { id: "q2", type: 'fill', q: "Where are the dolls? ___ are on the chair.", a: "They", tip: "plural_be", prompt: "Two cute dolls sitting on a wooden chair, 3d cartoon style, bright colors" },
            { id: "q3", type: 'fill', q: "The ball is ___ the box. (📥)", a: "in", tip: "prep_in", prompt: "A colorful soccer ball inside a cardboard box, top view, simple 3d style" },
            { id: "q4", type: 'fill', q: "Where ___ the kites? (🪁🪁)", a: "are", tip: "plural_be", prompt: "Two colorful kites flying in the blue sky, cartoon illustration" },
            { id: "q5", type: 'fill', q: "It's ___ the desk. (📦)", a: "on", tip: "prep_on", prompt: "A gift box placed on top of a school desk, simple classroom background" },
            { id: "q6", type: 'fill', q: "___ are the yo-yos?", a: "Where", tip: "where", prompt: "Three colorful yo-yos on a table, 3d render, simple" },
            { id: "q7", type: 'fill', q: "Where is the doll? ___ under the chair.", a: "It's", tip: "singular_be", prompt: "A doll hidden under a wooden chair, floor level view, 3d style" },
            { id: "q8", type: 'fill', q: "They're ___ the desk. (👇)", a: "under", audioText: "They are under the desk.", tip: "prep_under", prompt: "A pair of shoes under a desk, simple background" }
        ];

        // Utils: Safe ID for Firebase
        const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

        // Utils: PCM to WAV conversion
        const pcmToWav = (pcmData, sampleRate = 24000) => {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        };

        const fetchWithRetry = async (url, options, retries = 5) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        };

        const compressImage = (base64) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const targetWidth = 512;
                    const scale = targetWidth / img.width;
                    canvas.width = targetWidth;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = base64;
            });
        };

        // UI Components
        const SpeakerIcon = ({ className }) => (
            <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M12 9v6m0 0l-3-3m3 3l3-3m-3 3V9" /></svg>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [screen, setScreen] = useState('home'); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [debugMsg, setDebugMsg] = useState("Initializing...");
            const [syncProgress, setSyncProgress] = useState({ active: false, current: 0, total: 0, log: "" });
            const [userAnswer, setUserAnswer] = useState("");
            const [feedback, setFeedback] = useState(null); 
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentAssets, setCurrentAssets] = useState({ img: null });

            // Initialize Firebase
            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        try {
                            const app = window.FB.initializeApp(firebaseConfig);
                            const auth = window.FB.getAuth(app);
                            const firestore = window.FB.getFirestore(app);
                            setDb(firestore);

                            window.FB.onAuthStateChanged(auth, (u) => {
                                if (u) {
                                    setUser(u);
                                    setDebugMsg(`Ready as ${u.uid}`);
                                } else {
                                    window.FB.signInAnonymously(auth).catch(e => setDebugMsg(`Auth Error: ${e.message}`));
                                }
                            });
                        } catch (e) {
                            setDebugMsg(`Init Error: ${e.message}`);
                        }
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            // Sync Logic
            const syncAssets = async () => {
                if (!db || !user) return;
                setSyncProgress({ active: true, current: 0, total: questionsData.length * 2, log: "開始雲端同步教材..." });

                for (let i = 0; i < questionsData.length; i++) {
                    const q = questionsData[i];
                    
                    // Image Sync
                    const imgSafeId = getSafeId(q.prompt);
                    const imgDocRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'images', imgSafeId);
                    const imgSnap = await window.FB.getDoc(imgDocRef);
                    
                    if (!imgSnap.exists()) {
                        setSyncProgress(prev => ({ ...prev, log: `正在生成 AI 插圖: ${q.id}...` }));
                        try {
                            const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                                method: 'POST',
                                body: JSON.stringify({ instances: [{ prompt: q.prompt }], parameters: { sampleCount: 1 } })
                            });
                            const compressed = await compressImage(`data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`);
                            await window.FB.setDoc(imgDocRef, { base64: compressed, prompt: q.prompt, createdAt: Date.now() });
                        } catch (e) {}
                    }
                    setSyncProgress(prev => ({ ...prev, current: prev.current + 1 }));

                    // Audio Sync
                    const audioText = q.audioText || q.q.replace('___', q.a);
                    const audioSafeId = getSafeId(audioText);
                    const audioDocRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'audio', audioSafeId);
                    const audioSnap = await window.FB.getDoc(audioDocRef);

                    if (!audioSnap.exists()) {
                        setSyncProgress(prev => ({ ...prev, log: `正在合成 AI 語音: ${q.id}...` }));
                        try {
                            const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                                method: 'POST',
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: `Say clearly: ${audioText}` }] }],
                                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                                })
                            });
                            const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                            await window.FB.setDoc(audioDocRef, { base64: pcmData, text: audioText, createdAt: Date.now() });
                        } catch (e) {}
                    }
                    setSyncProgress(prev => ({ ...prev, current: prev.current + 1 }));
                }
                setSyncProgress(prev => ({ ...prev, active: false, log: "同步完成！✅" }));
            };

            const playAudio = async (text) => {
                if (isPlaying) return;
                setIsPlaying(true);
                try {
                    const audioSafeId = getSafeId(text);
                    const snap = await window.FB.getDoc(window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'audio', audioSafeId));
                    if (snap.exists()) {
                        const binaryString = atob(snap.data().base64);
                        const pcmData = new Int16Array(binaryString.length / 2);
                        for (let i = 0; i < pcmData.length; i++) {
                            pcmData[i] = binaryString.charCodeAt(i * 2) | (binaryString.charCodeAt(i * 2 + 1) << 8);
                        }
                        const wavBlob = pcmToWav(pcmData);
                        const url = URL.createObjectURL(wavBlob);
                        const audio = new Audio(url);
                        audio.onended = () => { setIsPlaying(false); URL.revokeObjectURL(url); };
                        audio.play();
                    } else { throw new Error(); }
                } catch (e) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'en-US';
                    u.onend = () => setIsPlaying(false);
                    speechSynthesis.speak(u);
                }
            };

            // Quiz Asset Loading
            useEffect(() => {
                if (screen === 'quiz' && db) {
                    const q = questionsData[currentIndex];
                    const imgSafeId = getSafeId(q.prompt);
                    window.FB.getDoc(window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'images', imgSafeId))
                        .then(snap => snap.exists() ? setCurrentAssets({ img: snap.data().base64 }) : setCurrentAssets({ img: null }));
                }
            }, [currentIndex, screen, db]);

            const handleSubmit = () => {
                if (feedback) {
                    if (currentIndex < questionsData.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                        setUserAnswer("");
                        setFeedback(null);
                    } else { setScreen('result'); }
                    return;
                }
                const q = questionsData[currentIndex];
                const isCorrect = userAnswer.trim().toLowerCase() === q.a.toLowerCase();
                if (isCorrect) setScore(prev => prev + 10);
                setFeedback({ correct: isCorrect, tip: GRAMMAR_TIPS[q.tip] });
                if (isCorrect) playAudio("Great job!");
            };

            // Views
            const HomeView = () => (
                <div className="flex flex-col items-center text-center space-y-8 animate-in fade-in duration-500">
                    <div className="text-8xl mb-4">🦊</div>
                    <h1 className="text-5xl font-bold text-blue-700">Where is it?</h1>
                    <p className="text-2xl text-slate-600 font-bold">物品位置大挑戰</p>
                    <p className="text-slate-500 italic">狐狸老師的英語任務：Let's find the toys!</p>
                    
                    <div className="w-full max-w-md space-y-4">
                        <button onClick={() => setScreen('learning')} className="w-full py-5 rounded-2xl bg-white border-2 border-blue-400 text-blue-600 text-2xl font-bold hover:bg-blue-50 transition-all flex items-center justify-center gap-4 shadow-md">
                            <span>📝</span> 1. 文法小教室 Learn
                        </button>
                        <button onClick={() => setScreen('quiz')} className="w-full py-5 rounded-2xl btn-primary text-2xl font-bold flex items-center justify-center gap-4">
                            <span>🚀</span> 2. 開始實戰挑戰 Challenge
                        </button>
                    </div>

                    <div className="p-6 bg-blue-50 rounded-3xl w-full max-w-lg border-2 border-blue-100">
                        <h3 className="font-bold text-blue-400 mb-2 uppercase text-sm tracking-widest">Admin Control 教材管理</h3>
                        <button onClick={syncAssets} disabled={syncProgress.active} className={`w-full py-3 rounded-xl font-bold transition-all ${syncProgress.active ? 'bg-slate-300 text-slate-500' : 'bg-blue-500 text-white shadow-lg active:scale-95'}`}>
                            {syncProgress.active ? '⌛ 同步中...' : '☁️ 一鍵合成語音與插圖 (AI)'}
                        </button>
                        {syncProgress.active && (
                            <div className="mt-4">
                                <div className="w-full bg-blue-200 h-3 rounded-full overflow-hidden">
                                    <div className="bg-blue-600 h-full transition-all duration-300" style={{ width: `${(syncProgress.current / syncProgress.total) * 100}%` }} />
                                </div>
                                <p className="text-xs text-blue-600 mt-2 font-bold sync-pulse">{syncProgress.log}</p>
                            </div>
                        )}
                        {!syncProgress.active && syncProgress.log.includes("完成") && <p className="text-xs text-green-600 mt-2 font-bold">✅ 雲端教材已就緒</p>}
                    </div>
                </div>
            );

            const LearningView = () => (
                <div className="w-full max-w-4xl space-y-8 animate-in slide-in-from-right duration-500">
                    <div className="flex justify-between items-center">
                        <h2 className="text-3xl font-bold text-blue-700 flex items-center gap-3"><span>📝</span> 文法重點 Grammar Focus</h2>
                        <button onClick={() => setScreen('home')} className="px-4 py-2 bg-slate-100 rounded-lg font-bold">🏠 返回首頁</button>
                    </div>

                    <div className="bg-blue-50 p-8 rounded-3xl border-l-8 border-blue-400 space-y-6">
                        <div className="flex items-center gap-2">
                            <span className="bg-blue-500 grammar-tag">重點 1</span>
                            <span className="text-blue-700 font-bold text-2xl">位置介系詞 Prepositions</span>
                        </div>
                        <div className="grid grid-cols-3 gap-6 text-center">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border-2 border-blue-100">
                                <span className="text-5xl">📥</span><br/><b className="text-3xl">in</b><br/><span className="text-gray-500">在...裡面</span>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border-2 border-blue-100">
                                <span className="text-5xl">📦</span><br/><b className="text-3xl">on</b><br/><span className="text-gray-500">在...上面</span>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border-2 border-blue-100">
                                <span className="text-5xl">👇</span><br/><b className="text-3xl">under</b><br/><span className="text-gray-500">在...下面</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-orange-50 p-8 rounded-3xl border-l-8 border-orange-400 space-y-6">
                        <div className="flex items-center gap-2">
                            <span className="bg-orange-500 grammar-tag">重點 2</span>
                            <span className="text-orange-700 font-bold text-2xl">單數 vs. 複數 Singular & Plural</span>
                        </div>
                        <div className="space-y-4">
                            <div className="bg-white p-6 rounded-2xl flex justify-between items-center border-2 border-orange-100">
                                <div>
                                    <p className="text-orange-600 font-bold">單數 (1個):</p>
                                    <p className="text-2xl font-bold">Where <span className="underline">is</span> the ball? / It's in the box.</p>
                                </div>
                                <button onClick={() => playAudio("Where is the ball? It is in the box.")} className="text-4xl">🔊</button>
                            </div>
                            <div className="bg-white p-6 rounded-2xl flex justify-between items-center border-2 border-orange-100">
                                <div>
                                    <p className="text-orange-600 font-bold">複數 (2個以上):</p>
                                    <p className="text-2xl font-bold">Where <span className="underline">are</span> the balls? / They're in the box.</p>
                                </div>
                                <button onClick={() => playAudio("Where are the balls? They are in the box.")} className="text-4xl">🔊</button>
                            </div>
                        </div>
                    </div>

                    <button onClick={() => setScreen('quiz')} className="w-full btn-primary py-5 rounded-full text-2xl font-bold shadow-lg">開始實戰挑戰！ Start Challenge 🚀</button>
                </div>
            );

            const QuizView = () => {
                const q = questionsData[currentIndex];
                return (
                    <div className="w-full max-w-3xl animate-in slide-in-from-bottom-4 duration-500">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex flex-col">
                                <span className="text-slate-400 font-bold">第 {currentIndex + 1} / {questionsData.length} 題</span>
                                <span className="text-blue-500 font-bold">Score: {score}</span>
                            </div>
                            <button onClick={() => setScreen('home')} className="text-slate-400 text-sm">🏠 離開測驗</button>
                        </div>

                        <div className="image-container mb-8">
                            {currentAssets.img ? <img src={currentAssets.img} alt="Scene" className="animate-in zoom-in duration-700" /> : <div className="text-slate-300 text-center">🖼️ 圖片載入中...</div>}
                        </div>

                        <div className="text-center space-y-6">
                            <div className="text-4xl font-bold text-slate-800 flex flex-wrap items-center justify-center gap-x-4 leading-relaxed">
                                {q.q.split('___').map((part, i, arr) => (
                                    <React.Fragment key={i}>
                                        {part}
                                        {i < arr.length - 1 && <span className="border-b-4 border-blue-400 min-w-[120px] text-blue-600">{feedback ? q.a : (userAnswer || "___")}</span>}
                                    </React.Fragment>
                                ))}
                                <button onClick={() => playAudio(q.audioText || q.q.replace('___', q.a))} className={`p-3 rounded-full transition-all ${isPlaying ? 'bg-blue-500 text-white animate-pulse' : 'bg-blue-100 text-blue-600'}`}><SpeakerIcon className="w-8 h-8" /></button>
                            </div>

                            {!feedback && <input autoFocus value={userAnswer} onChange={(e) => setUserAnswer(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && userAnswer && handleSubmit()} placeholder="在此輸入答案..." className="w-full max-w-md p-5 text-3xl text-center rounded-2xl border-4 border-slate-200 focus:border-blue-500 outline-none" />}

                            {feedback && (
                                <div className={`p-6 rounded-2xl border-l-8 text-left ${feedback.correct ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                                    <p className="text-2xl font-bold mb-2">{feedback.correct ? '🌟 答對了！ Correct!' : `❌ 答錯了，正確答案是: ${q.a}`}</p>
                                    <p className="text-slate-700 font-bold">💡 狐狸老師的小叮嚀: {feedback.tip}</p>
                                </div>
                            )}

                            <button onClick={handleSubmit} disabled={!userAnswer && !feedback} className="mt-8 btn-primary px-16 py-5 rounded-full text-2xl font-bold w-full max-w-sm">
                                {feedback ? (currentIndex < questionsData.length - 1 ? '下一題 Next →' : '看總分 Result →') : '送出 Submit'}
                            </button>
                        </div>
                    </div>
                );
            };

            const ResultView = () => (
                <div className="text-center space-y-8 py-10">
                    <div className="text-9xl">🏆</div>
                    <h2 className="text-5xl font-bold">挑戰結束！ Game Over!</h2>
                    <div className="py-10">
                        <p className="text-slate-400 uppercase tracking-widest font-bold">你的總分 Your Score</p>
                        <p className="text-9xl font-bold text-blue-600">{score}</p>
                    </div>
                    <div className="flex gap-4 justify-center">
                        <button onClick={() => setScreen('home')} className="px-10 py-5 bg-white border-2 border-slate-200 rounded-full text-xl font-bold">🏠 回首頁 Home</button>
                        <button onClick={() => { setScreen('quiz'); setCurrentIndex(0); setScore(0); }} className="btn-primary px-10 py-5 rounded-full text-xl font-bold shadow-lg">再玩一次 Replay</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 pb-24">
                    <div className="glass-card w-full max-w-4xl p-8 md:p-12 relative overflow-hidden">
                        {screen === 'home' && <HomeView />}
                        {screen === 'learning' && <LearningView />}
                        {screen === 'quiz' && <QuizView />}
                        {screen === 'result' && <ResultView />}
                    </div>
                    <div className="debug-bar">
                        <span>系統狀態: {debugMsg}</span>
                        <div className="flex gap-4">
                            <span>主題: {themeId}</span>
                            <span>連線: {user ? '✅ 已連線' : '⏳ 等待中'}</span>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
