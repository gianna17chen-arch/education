
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Career Explorer - 星際職涯探險</title>
    <!-- Scripts & Styles -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .macaron-pink { background-color: #FFB7B2; }
        .macaron-blue { background-color: #B2E2F2; }
        .macaron-green { background-color: #B2F2BB; }
        .macaron-purple { background-color: #E2B2F2; }
        .macaron-yellow { background-color: #F2E2B2; }
        
        .card-hover:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 0 20px rgba(178, 226, 242, 0.4);
        }
        .star-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            animation: move-stars 100s linear infinite;
        }
        @keyframes move-stars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 翻牌動畫 */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="star-bg"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'space-career-explorer-v1';

        const { useState, useEffect, useMemo, useCallback } = React;

        const VOCABULARY = [
            { word: "artist", icon: "🎨", sentence: "The artist painted a colorful nebula.", color: "#FFB7B2" },
            { word: "basketball player", icon: "🏀", sentence: "The basketball player jumps high in zero gravity.", color: "#B2E2F2" },
            { word: "dentist", icon: "🦷", sentence: "Even aliens need to visit the dentist.", color: "#B2F2BB" },
            { word: "bus driver", icon: "🚌", sentence: "The space bus driver takes us to Mars.", color: "#E2B2F2" },
            { word: "farmer", icon: "👩‍🌾", sentence: "The space farmer grows plants in the moon base.", color: "#F2E2B2" },
            { word: "police officer", icon: "👮", sentence: "The police officer protects the star station.", color: "#FFD1DC" },
            { word: "singer", icon: "🎤", sentence: "The singer performs on the floating stage.", color: "#C1E1C1" },
            { word: "writer", icon: "✍️", sentence: "The writer wrote a story about the stars.", color: "#B39EB5" }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState(null);
            const [activeTab, setActiveTab] = useState('learn');
            const [selectedWord, setSelectedWord] = useState(null);
            const [loadingState, setLoadingState] = useState('');
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);

            // 遊戲狀態
            const [gameCards, setGameCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [matchedPairs, setMatchedPairs] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); }
                    catch (e) { setAuthError("基地連線失敗，請檢查網路。"); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // TTS 邏輯
            const pcmToWav = (pcmBase64, sampleRate = 24000) => {
                const byteCharacters = atob(pcmBase64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) { byteNumbers[i] = byteCharacters.charCodeAt(i); }
                const pcmData = new Uint8Array(byteNumbers);
                const wavHeader = new ArrayBuffer(44);
                const view = new DataView(wavHeader);
                const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) { view.setUint8(offset + i, string.charCodeAt(i)); } };
                writeString(0, 'RIFF'); view.setUint32(4, 32 + pcmData.length, true); writeString(8, 'WAVE'); writeString(12, 'fmt ');
                view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(36, 'data');
                view.setUint32(40, pcmData.length, true);
                const combined = new Uint8Array(wavHeader.byteLength + pcmData.length);
                combined.set(new Uint8Array(wavHeader), 0); combined.set(pcmData, wavHeader.byteLength);
                return URL.createObjectURL(new Blob([combined], { type: 'audio/wav' }));
            };

            const playTTS = async (text) => {
                if (!user) return;
                setLoadingState('🔍 檢查...');
                const safeId = btoa(text).replace(/[/+=]/g, '_');
                const cacheRef = doc(db, 'artifacts', appId, 'public', 'data', 'tts_cache', safeId);
                try {
                    const cacheDoc = await getDoc(cacheRef);
                    if (cacheDoc.exists()) {
                        setLoadingState('🔊 播放');
                        new Audio(pcmToWav(cacheDoc.data().pcmData)).play().then(() => setLoadingState(''));
                    } else {
                        setLoadingState('✨ 生成...');
                        const apiKey = ""; 
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: `Say: ${text}` }] }], generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } })
                        });
                        const result = await response.json();
                        const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        if (pcmData) {
                            await setDoc(cacheRef, { pcmData, text, createdAt: new Date().toISOString() });
                            setLoadingState('🔊 播放');
                            new Audio(pcmToWav(pcmData)).play().then(() => setLoadingState(''));
                        }
                    }
                } catch (e) { setLoadingState('❌ 錯誤'); setTimeout(() => setLoadingState(''), 2000); }
            };

            // 遊戲初始化邏輯
            const initGame = useCallback(() => {
                const cards = [];
                VOCABULARY.forEach(item => {
                    cards.push({ id: `${item.word}-text`, type: 'text', value: item.word, matchKey: item.word, color: item.color });
                    cards.push({ id: `${item.word}-icon`, type: 'icon', value: item.icon, matchKey: item.word, color: item.color });
                });
                setGameCards(cards.sort(() => Math.random() - 0.5));
                setFlippedIndices([]);
                setMatchedPairs([]);
            }, []);

            useEffect(() => { if (activeTab === 'game') initGame(); }, [activeTab, initGame]);

            const handleCardClick = (index) => {
                if (flippedIndices.length === 2 || flippedIndices.includes(index) || matchedPairs.includes(gameCards[index].matchKey)) return;
                
                const newFlipped = [...flippedIndices, index];
                setFlippedIndices(newFlipped);

                if (newFlipped.length === 2) {
                    const firstCard = gameCards[newFlipped[0]];
                    const secondCard = gameCards[newFlipped[1]];
                    if (firstCard.matchKey === secondCard.matchKey) {
                        setMatchedPairs([...matchedPairs, firstCard.matchKey]);
                        setFlippedIndices([]);
                    } else {
                        setTimeout(() => setFlippedIndices([]), 1000);
                    }
                }
            };

            const quizOptions = useMemo(() => {
                if (activeTab !== 'quiz') return [];
                const current = VOCABULARY[quizIndex];
                const others = VOCABULARY.filter(v => v.word !== current.word).sort(() => 0.5 - Math.random()).slice(0, 3);
                return [current.word, ...others.map(o => o.word)].sort(() => 0.5 - Math.random());
            }, [quizIndex, activeTab]);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    <header className="text-center mb-10">
                        <h1 className="text-4xl md:text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-pink-300 via-blue-200 to-purple-300">Space Career Explorer</h1>
                        <p className="text-blue-200 text-lg">Tr. Mimi's Star Station • 星際職涯探險隊</p>
                    </header>

                    <nav className="flex justify-center gap-4 mb-8">
                        {['learn', 'quiz', 'game'].map(tab => (
                            <button key={tab} onClick={() => { setActiveTab(tab); setShowResult(false); }}
                                className={`px-6 py-2 rounded-full font-bold transition-all ${activeTab === tab ? 'bg-white text-blue-900 shadow-lg scale-110' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                                {tab === 'learn' ? '🚀 學習' : tab === 'quiz' ? '📝 挑戰' : '🎮 遊戲'}
                            </button>
                        ))}
                    </nav>

                    <main className="glass-panel p-6 md:p-8 min-h-[500px]">
                        {activeTab === 'learn' && (
                            <div className="animate-fade-in">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {VOCABULARY.map((item) => (
                                        <div key={item.word} onClick={() => { setSelectedWord(item); playTTS(item.word); }}
                                            style={{ backgroundColor: item.color }} className="card-hover cursor-pointer p-6 rounded-3xl flex flex-col items-center justify-center text-slate-800 aspect-square">
                                            <span className="text-5xl mb-3">{item.icon}</span>
                                            <span className="text-lg font-bold text-center capitalize">{item.word}</span>
                                        </div>
                                    ))}
                                </div>
                                {selectedWord && (
                                    <div className="mt-8 p-6 bg-white/5 rounded-2xl border border-white/10 animate-fade-in flex flex-col md:flex-row items-center gap-6">
                                        <div className="text-7xl">{selectedWord.icon}</div>
                                        <div className="flex-1 text-center md:text-left">
                                            <h2 className="text-3xl font-black capitalize mb-2">{selectedWord.word}</h2>
                                            <p className="text-xl text-blue-100 italic mb-4">"{selectedWord.sentence}"</p>
                                            <div className="flex gap-3 justify-center md:justify-start items-center">
                                                <button onClick={() => playTTS(selectedWord.word)} disabled={!!loadingState} className="px-4 py-2 bg-blue-400 text-white rounded-lg flex items-center gap-2"><span>🔊</span> 唸單字</button>
                                                <button onClick={() => playTTS(selectedWord.sentence)} disabled={!!loadingState} className="px-4 py-2 bg-purple-400 text-white rounded-lg flex items-center gap-2"><span>📡</span> 唸例句</button>
                                                {loadingState && <span className="text-sm text-blue-200 animate-pulse">{loadingState}</span>}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'quiz' && !showResult && (
                            <div className="flex flex-col items-center animate-fade-in">
                                <div className="mb-4 text-blue-200">問題 {quizIndex + 1} / {VOCABULARY.length}</div>
                                <div className="text-8xl mb-8 animate-bounce">{VOCABULARY[quizIndex].icon}</div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-md">
                                    {quizOptions.map((option) => (
                                        <button key={option} onClick={() => { if (option === VOCABULARY[quizIndex].word) setScore(score + 1); if (quizIndex + 1 < VOCABULARY.length) setQuizIndex(quizIndex + 1); else setShowResult(true); }}
                                            className="p-4 bg-white/10 hover:bg-white/20 rounded-xl border border-white/20 capitalize font-bold text-lg">{option}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'quiz' && showResult && (
                            <div className="text-center animate-fade-in">
                                <h2 className="text-4xl font-bold mb-4">探險完成！</h2>
                                <div className="text-6xl mb-6">🏆</div>
                                <p className="text-2xl mb-8">得分：<span className="text-pink-300 font-black">{score}</span> / {VOCABULARY.length}</p>
                                <button onClick={() => { setShowResult(false); setQuizIndex(0); setScore(0); }} className="px-8 py-3 bg-gradient-to-r from-blue-400 to-purple-400 rounded-full font-bold shadow-xl">再次挑戰</button>
                            </div>
                        )}

                        {activeTab === 'game' && (
                            <div className="animate-fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold text-blue-100">星際記憶連連看</h2>
                                    <div className="text-pink-300 font-bold">配對成功: {matchedPairs.length} / {VOCABULARY.length}</div>
                                </div>
                                
                                {matchedPairs.length === VOCABULARY.length ? (
                                    <div className="text-center py-20">
                                        <div className="text-7xl mb-6">🛰️✨</div>
                                        <h3 className="text-3xl font-bold mb-4">任務大成功！</h3>
                                        <p className="text-blue-200 mb-8">你已經成功配對所有星際職業！</p>
                                        <button onClick={initGame} className="px-8 py-3 bg-green-400 text-slate-900 rounded-full font-bold shadow-xl">重新開始任務</button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-4 gap-3">
                                        {gameCards.map((card, idx) => {
                                            const isFlipped = flippedIndices.includes(idx) || matchedPairs.includes(card.matchKey);
                                            return (
                                                <div key={card.id} onClick={() => handleCardClick(idx)} className="relative aspect-square cursor-pointer perspective-1000">
                                                    <div className={`w-full h-full transition-all duration-500 preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                                                        {/* 卡片背面 */}
                                                        <div className="absolute inset-0 bg-white/10 border border-white/20 rounded-xl flex items-center justify-center backface-hidden">
                                                            <span className="text-2xl opacity-40">⭐</span>
                                                        </div>
                                                        {/* 卡片正面 */}
                                                        <div style={{ backgroundColor: card.color }} className={`absolute inset-0 rounded-xl flex items-center justify-center text-slate-800 rotate-y-180 backface-hidden shadow-lg`}>
                                                            <span className={`font-bold text-center p-2 leading-tight ${card.type === 'icon' ? 'text-4xl' : 'text-sm md:text-base capitalize'}`}>
                                                                {card.value}
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="mt-8 flex justify-between items-center text-xs text-blue-300/60">
                        <div>Station Status: {user ? 'Connected' : 'Offline'}</div>
                        <div>Cache System: Firestore v11</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
