<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>休閒活動大挑戰 - React Firebase 版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f0fdf4; color: #2d3748; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 24px; box-shadow: 0 8px 32px rgba(72, 187, 120, 0.15); border: 2px solid #d1fae5; }
        .btn-primary { background: linear-gradient(135deg, #48bb78, #68d391); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(72, 187, 120, 0.5); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .pulse-green { animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(72, 187, 120, 0); }
            100% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0); }
        }
        .animal-icon { font-size: 3.5rem; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .possessive-table th, .possessive-table td { border: 2px solid #e2e8f0; padding: 12px; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // --- Firebase 模組載入 ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };
        const appId = 'free-time-adventure-v2';
        const apiKey = ""; // Canvas 環境會自動注入，部署時請更換為您的真實金鑰

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 工具函式：PCM 轉 WAV ---
        function pcmToWav(pcmBase64, sampleRate = 24000) {
            const binaryString = atob(pcmBase64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const wavBuffer = new ArrayBuffer(44 + bytes.length);
            const view = new DataView(wavBuffer);
            
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + bytes.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, bytes.length, true);
            
            const wavUint8 = new Uint8Array(wavBuffer);
            wavUint8.set(bytes, 44);
            
            const blob = new Blob([wavUint8], { type: 'audio/wav' });
            return URL.createObjectURL(blob);
        }

        // --- 主程式組件 ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState(null);
            const [view, setView] = useState('welcome');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [isWaitingForNext, setIsWaitingForNext] = useState(false);
            const [userInputValue, setUserInputValue] = useState("");
            const [selectedMcq, setSelectedMcq] = useState(null);
            const [ttsStatus, setTtsStatus] = useState({}); // { [text]: 'idle' | 'loading' | 'playing' }

            // 自動登入流程 
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenError) {
                                console.warn("Token 不匹配，改用匿名登入...", tokenError);
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.warn("登入失敗，將以離線/無快取模式運行:", err.message);
                        setAuthError(err.message);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, u => setUser(u));
                return () => unsubscribe();
            }, []);

            // 高容錯語音播放核心
            const handleSpeak = async (text) => {
                // 防抖保護，避免重複點擊
                if (ttsStatus[text] === 'loading' || ttsStatus[text] === 'playing') return;
                
                setTtsStatus(prev => ({ ...prev, [text]: 'loading' }));

                try {
                    let pcmData = null;
                    let cacheRef = null;

                    // 1. 嘗試從 Firestore 讀取快取 (若有登入)
                    if (user) {
                        try {
                            const safeId = btoa(encodeURIComponent(text)).replace(/[/+=]/g, '_');
                            cacheRef = doc(db, 'artifacts', appId, 'public', 'data', 'tts_cache', safeId);
                            const cacheSnap = await getDoc(cacheRef);
                            if (cacheSnap.exists()) {
                                pcmData = cacheSnap.data().base64;
                            }
                        } catch (fsErr) {
                            console.warn("無法讀取 Firestore 快取 (可能是自訂專案尚未開放讀取權限)，將直接呼叫 API", fsErr);
                        }
                    }

                    // 2. 如果沒有快取，則呼叫 Gemini TTS API
                    if (!pcmData) {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Please say clearly: ${text}` }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                                },
                                model: "gemini-2.5-flash-preview-tts"
                            })
                        });
                        const result = await response.json();
                        
                        if (!result.candidates) throw new Error(result.error?.message || "API 生成失敗");
                        pcmData = result.candidates[0].content.parts[0].inlineData.data;
                        
                        // 3. 嘗試將生成的音訊存入快取 (失敗也不阻擋播放)
                        if (user && cacheRef) {
                            try {
                                await setDoc(cacheRef, { base64: pcmData, text, createdAt: new Date().toISOString() });
                            } catch (fsErr) {
                                console.warn("無法寫入 Firestore 快取 (可能是自訂專案尚未開放寫入權限)", fsErr);
                            }
                        }
                    }

                    // 4. 播放音訊
                    const audioUrl = pcmToWav(pcmData);
                    const audio = new Audio(audioUrl);
                    setTtsStatus(prev => ({ ...prev, [text]: 'playing' }));
                    
                    audio.onended = () => {
                        setTtsStatus(prev => ({ ...prev, [text]: 'idle' }));
                        URL.revokeObjectURL(audioUrl);
                    };

                    // 關鍵修正：捕捉 audio.play() 的 Promise 拒絕，避免出現 Canvas 錯誤彈窗
                    audio.play().catch(playErr => {
                        console.error("播放音訊遭拒絕 (可能是瀏覽器自動播放限制):", playErr);
                        setTtsStatus(prev => ({ ...prev, [text]: 'idle' }));
                    });

                } catch (error) {
                    console.error("TTS 處理發生錯誤:", error);
                    setTtsStatus(prev => ({ ...prev, [text]: 'idle' }));
                }
            };

            const questions = useMemo(() => [
                { type: 'fill', q: "What ___ you like to do in your free time?", a: "do", audio: "What do you like to do in your free time?", tipEn: "Use 'do' for I, you, we, they.", tipZh: "I, you, we, they 要搭配 do。" },
                { type: 'fill', q: "He likes to go swimming in ___ free time.", a: "his", audio: "He likes to go swimming in his free time.", tipEn: "Possessive of 'he' is 'his'.", tipZh: "He 的所有格是 his (他的)。" },
                { type: 'fill', q: "What ___ Mary like to do?", a: "does", audio: "What does Mary like to do?", tipEn: "Use 'does' for singular names.", tipZh: "單數人名(Mary)要搭配 does。" },
                { type: 'fill', q: "I like to listen to music in ___ free time.", a: "my", audio: "I like to listen to music in my free time.", tipEn: "Possessive of 'I' is 'my'.", tipZh: "I 的所有格是 my (我的)。" },
                { type: 'fill', q: "What do they like to do in ___ free time?", a: "their", audio: "What do they like to do in their free time?", tipEn: "Possessive of 'they' is 'their'.", tipZh: "They 的所有格是 their (他們的)。" },
                { type: 'fill', q: "We like to go camping in ___ free time.", a: "our", audio: "We like to go camping in our free time.", tipEn: "Possessive of 'we' is 'our'.", tipZh: "We 的所有格是 our (我們的)。" },
                { type: 'fill', q: "___ Mary like to watch TV?", a: "Does", audio: "Does Mary like to watch TV?", tipEn: "Start with 'Does' for singular subjects.", tipZh: "單數主詞問句開頭用 Does。" },
                { type: 'fill', q: "Yes, I ___.", a: "do", audio: "Yes, I do.", tipEn: "Short answer for 'Do you...?'", tipZh: "Do you...? 的簡答用 do。" },
                { type: 'fill', q: "No, he ___.", a: "doesn't", audio: "No, he doesn't.", tipEn: "Negative for 'Does he...?'", tipZh: "Does he...? 的否定簡答用 doesn't。" },
                { type: 'fill', q: "Tom likes to ___ basketball. (🏀)", a: "play", audio: "Tom likes to play basketball.", tipEn: "Use 'play' for sports with balls.", tipZh: "球類運動搭配 play。" },
                { type: 'mcq', q: "What ___ Mary like to do?", options: ["do", "does"], a: 1, audio: "What does Mary like to do?", tipEn: "Mary is singular.", tipZh: "Mary 是單數，用 does。" },
                { type: 'mcq', q: "What do you like to do in ___ free time?", options: ["my", "your"], a: 1, audio: "What do you like to do in your free time?", tipEn: "Asking 'you', so answer 'your'.", tipZh: "問 you (你)，所以用 your (你的)。" },
                { type: 'mcq', q: "___ they like to go swimming?", options: ["Do", "Does"], a: 0, audio: "Do they like to go swimming?", tipEn: "They is plural.", tipZh: "They 是複數，用 do。" },
                { type: 'mcq', q: "She likes to go shopping in ___ free time.", options: ["his", "her"], a: 1, audio: "She likes to go shopping in her free time.", tipEn: "She -> her.", tipZh: "She 的所有格是 her。" },
                { type: 'mcq', q: "Does he like to go hiking?", options: ["Yes, he do.", "Yes, he does."], a: 1, audio: "Does he like to go hiking? Yes, he does.", tipEn: "Does -> does.", tipZh: "用 does 問，就用 does 回。" },
                { type: 'mcq', q: "___ your brother like to play soccer?", options: ["Do", "Does"], a: 1, audio: "Does your brother like to play soccer?", tipEn: "Brother is singular.", tipZh: "Brother 是單數，用 does。" },
                { type: 'mcq', q: "We like to watch TV in ___ free time.", options: ["our", "their"], a: 0, audio: "We like to watch TV in our free time.", tipEn: "We -> our.", tipZh: "We 的所有格是 our。" },
                { type: 'mcq', q: "What ___ your friends like to do?", options: ["do", "does"], a: 0, audio: "What do your friends like to do?", tipEn: "Friends is plural.", tipZh: "Friends 是複數，用 do。" },
                { type: 'mcq', q: "I like to go shopping in ___ free time.", options: ["my", "his"], a: 0, audio: "I like to go shopping in my free time.", tipEn: "I -> my.", tipZh: "I 的所有格是 my。" },
                { type: 'mcq', q: "Does she like to ___ to music?", options: ["listen", "listens"], a: 0, audio: "Does she like to listen to music?", tipEn: "Use base verb after 'to'.", tipZh: "to 後面接原型動詞。" }
            ], []);

            const handleSubmit = () => {
                if (isWaitingForNext) {
                    if (currentIndex < questions.length - 1) {
                        setCurrentIndex(c => c + 1);
                        setIsWaitingForNext(false);
                        setUserInputValue("");
                        setSelectedMcq(null);
                    } else {
                        setView('result');
                    }
                    return;
                }

                const currentQ = questions[currentIndex];
                let correct = false;
                if (currentQ.type === 'fill') {
                    correct = userInputValue.trim().toLowerCase() === currentQ.a.toLowerCase();
                } else {
                    correct = selectedMcq === currentQ.a;
                }

                if (correct) {
                    setScore(s => s + 5);
                }
                setIsWaitingForNext(true);
            };

            const SpeakerIcon = ({ text }) => {
                const status = ttsStatus[text] || 'idle';
                return (
                    <button 
                        onClick={() => handleSpeak(text)}
                        title={status === 'loading' ? '正在從雲端載入語音...' : '播放語音'}
                        className={`w-16 h-16 rounded-full flex items-center justify-center text-3xl transition-all shadow-md 
                            ${status === 'playing' ? 'bg-blue-200 scale-110' : 'bg-green-100 hover:bg-green-200'}
                            ${status === 'loading' ? 'animate-pulse bg-yellow-100' : ''}`}
                    >
                        {status === 'loading' ? '⌛' : status === 'playing' ? '🔊' : '🔈'}
                    </button>
                );
            };

            // --- Views ---
            if (view === 'welcome') return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] w-full max-w-2xl px-4">
                    <div className="glass-card p-12 text-center w-full">
                        <div className="animal-icon">🦊</div>
                        <h2 className="text-4xl font-bold mt-6 mb-4 text-green-700">狐狸老師的英語冒險</h2>
                        <p className="text-xl text-gray-500 mb-10">雲端整合版 (支援 AI 語音快取)</p>
                        
                        <div className="min-h-[60px] mb-6 flex flex-col items-center justify-center">
                            {!user && !authError && <p className="text-blue-500 animate-pulse font-bold">📡 正在連線至 Firebase 雲端伺服器...</p>}
                            {authError && <p className="text-orange-500 font-bold bg-orange-50 px-4 py-2 rounded-lg">⚠️ 雲端快取未連線，將改用即時生成模式</p>}
                            {user && <p className="text-green-500 font-bold bg-green-50 px-4 py-2 rounded-lg">✅ 雲端服務連線成功</p>}
                        </div>

                        {/* 修正：移除 disabled 鎖定，讓無法登入的用戶依然可以遊玩 */}
                        <button 
                            onClick={() => setView('menu')}
                            className="btn-primary w-full py-5 rounded-full text-2xl font-bold shadow-xl hover:scale-[1.02] transition-transform"
                        >
                            開始旅程 Start! ✨
                        </button>
                    </div>
                </div>
            );

            if (view === 'menu') return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] w-full max-w-2xl px-4">
                    <div className="glass-card p-10 w-full text-center">
                        <h3 className="text-3xl font-bold mb-10 text-green-700">冒險地圖 Menu</h3>
                        <div className="grid gap-6">
                            <button onClick={() => setView('learning')} className="p-8 border-4 border-green-100 rounded-3xl bg-white hover:bg-green-50 transition-all text-left flex items-center gap-6 group shadow-sm">
                                <span className="text-5xl group-hover:scale-110 transition-transform">📖</span>
                                <div>
                                    <p className="text-2xl font-bold text-green-800">1. 文法小教室</p>
                                    <p className="text-gray-500">Do/Does 與 所有格</p>
                                </div>
                            </button>
                            <button onClick={() => { setScore(0); setCurrentIndex(0); setView('quiz'); }} className="p-8 border-4 border-blue-100 rounded-3xl bg-white hover:bg-blue-50 transition-all text-left flex items-center gap-6 group shadow-sm">
                                <span className="text-5xl group-hover:scale-110 transition-transform">🎮</span>
                                <div>
                                    <p className="text-2xl font-bold text-blue-800">2. 英語大挑戰</p>
                                    <p className="text-gray-500">20 題綜合練習</p>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'learning') return (
                <div className="w-full max-w-4xl px-4 py-8 mx-auto">
                    <div className="glass-card p-8 md:p-12">
                        <div className="flex justify-between items-center mb-10 border-b-4 border-green-100 pb-6">
                            <h3 className="text-4xl font-bold text-green-700">📝 文法複習 Review</h3>
                            <button onClick={() => setView('menu')} className="bg-gray-100 hover:bg-gray-200 px-6 py-3 rounded-xl font-bold transition-colors">🏠 回目錄</button>
                        </div>

                        <div className="space-y-12">
                            <section className="bg-blue-50 p-8 rounded-3xl">
                                <h4 className="text-2xl font-bold mb-6 text-blue-800 border-b-2 border-blue-200 pb-2">1. Do 與 Does 的不同</h4>
                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm">
                                        <p className="font-bold text-xl text-blue-600 mb-2">使用 Do</p>
                                        <p className="text-3xl font-bold">I / You / We / They</p>
                                        <div className="mt-4 flex justify-between items-center border-t pt-4">
                                            <p className="text-gray-500 italic text-xl">What <span className="text-blue-600 font-bold">do</span> they like?</p>
                                            <SpeakerIcon text="What do they like to do?" />
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm">
                                        <p className="font-bold text-xl text-orange-600 mb-2">使用 Does</p>
                                        <p className="text-3xl font-bold">He / She / It / Tom</p>
                                        <div className="mt-4 flex justify-between items-center border-t pt-4">
                                            <p className="text-gray-500 italic text-xl">What <span className="text-orange-600 font-bold">does</span> she like?</p>
                                            <SpeakerIcon text="What does she like to do?" />
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="bg-purple-50 p-8 rounded-3xl">
                                <h4 className="text-2xl font-bold mb-6 text-purple-800 border-b-2 border-purple-200 pb-2">2. 所有格變化的用法</h4>
                                <div className="overflow-x-auto bg-white rounded-2xl shadow-sm">
                                    <table className="w-full text-2xl possessive-table text-left border-collapse">
                                        <thead>
                                            <tr className="bg-purple-100 text-purple-800">
                                                <th className="p-4 border">代名詞</th>
                                                <th className="p-4 border">所有格 (誰的)</th>
                                                <th className="p-4 border">範例</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr><td className="p-4 font-bold border">I / You</td><td className="p-4 text-purple-600 border">my / your</td><td className="p-4 italic border">my free time</td></tr>
                                            <tr><td className="p-4 font-bold border">He / She</td><td className="p-4 text-purple-600 border">his / her</td><td className="p-4 italic border">his free time</td></tr>
                                            <tr><td className="p-4 font-bold border">We / They</td><td className="p-4 text-purple-600 border">our / their</td><td className="p-4 italic border">our free time</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                                <div className="mt-6 flex items-center justify-between bg-white p-6 rounded-2xl shadow-sm border-2 border-purple-100">
                                    <p className="text-2xl font-bold italic text-gray-700">He likes to swim in <span className="text-purple-600 underline">his</span> free time.</p>
                                    <SpeakerIcon text="He likes to swim in his free time." />
                                </div>
                            </section>
                        </div>

                        <button onClick={() => { setScore(0); setCurrentIndex(0); setView('quiz'); }} className="btn-primary w-full py-6 rounded-full text-3xl font-bold mt-12 shadow-2xl">
                            開始大挑戰！ Start Challenge! 🎮
                        </button>
                    </div>
                </div>
            );

            if (view === 'quiz') {
                const q = questions[currentIndex];
                const isCorrect = q.type === 'fill' 
                    ? userInputValue.trim().toLowerCase() === q.a.toLowerCase()
                    : selectedMcq === q.a;

                return (
                    <div className="w-full max-w-4xl px-4 py-8 mx-auto">
                        <div className="glass-card p-10">
                            <div className="flex justify-between items-center mb-10">
                                <div className="w-2/3 bg-gray-200 rounded-full h-4 overflow-hidden">
                                    <div className="bg-green-500 h-full transition-all duration-500" style={{width: `${(currentIndex / questions.length) * 100}%`}}></div>
                                </div>
                                <div className="flex flex-col items-end">
                                    <span className="text-3xl font-bold text-green-600">{currentIndex + 1} / {questions.length}</span>
                                    <span className="text-sm font-bold text-gray-400">Score: {score}</span>
                                </div>
                            </div>

                            <div className="flex items-start gap-10 mb-10">
                                <div className="animal-icon text-7xl">{currentIndex % 2 === 0 ? '🦊' : '🐼'}</div>
                                <div className="flex-1">
                                    <p className="text-gray-400 font-bold tracking-widest uppercase text-sm mb-2">Question</p>
                                    <div className="flex items-center flex-wrap gap-6">
                                        <h4 className="text-5xl font-bold text-gray-800 leading-tight">{q.q}</h4>
                                        <SpeakerIcon text={q.audio} />
                                    </div>
                                </div>
                            </div>

                            <div className="mt-10">
                                {q.type === 'fill' ? (
                                    <input 
                                        type="text" 
                                        value={userInputValue}
                                        onChange={(e) => setUserInputValue(e.target.value)}
                                        disabled={isWaitingForNext}
                                        placeholder="在此輸入答案..."
                                        className="w-full p-8 border-4 border-green-100 rounded-3xl text-4xl font-bold shadow-inner bg-gray-50 focus:border-green-400 focus:outline-none transition-all"
                                    />
                                ) : (
                                    <div className="grid gap-4">
                                        {q.options.map((opt, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => setSelectedMcq(i)}
                                                disabled={isWaitingForNext}
                                                className={`p-8 rounded-3xl border-4 text-3xl font-bold text-left transition-all flex justify-between items-center ${
                                                    selectedMcq === i ? 'border-green-400 bg-green-50' : 'border-green-100 bg-white hover:border-green-300'
                                                } ${isWaitingForNext && i === q.a ? 'bg-green-100 border-green-500' : ''} ${isWaitingForNext && selectedMcq === i && i !== q.a ? 'bg-red-100 border-red-500' : ''}`}
                                            >
                                                <span>{opt}</span>
                                                {selectedMcq === i && <span>🎯</span>}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {isWaitingForNext && (
                                <div className={`mt-8 p-6 rounded-3xl border-l-8 ${isCorrect ? 'bg-green-50 border-green-400' : 'bg-red-50 border-red-400'}`}>
                                    <div className="flex items-start gap-4">
                                        <span className="text-4xl">{isCorrect ? '🌟' : '💡'}</span>
                                        <div>
                                            <p className={`font-bold text-2xl mb-1 ${isCorrect ? 'text-green-700' : 'text-red-700'}`}>
                                                {isCorrect ? '太棒了！答對了！' : '再接再厲！正確答案是：' + (q.type === 'fill' ? q.a : q.options[q.a])}
                                            </p>
                                            {!isCorrect && (
                                                <div className="mt-2 border-t pt-3 border-red-200">
                                                    <p className="text-gray-700 italic font-bold">{q.tipEn}</p>
                                                    <p className="text-blue-600 font-bold text-2xl mt-1">{q.tipZh}</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="mt-12">
                                <button 
                                    onClick={handleSubmit}
                                    disabled={q.type === 'fill' ? !userInputValue.trim() : selectedMcq === null}
                                    className="btn-primary w-full py-6 rounded-full text-3xl font-bold shadow-xl disabled:grayscale"
                                >
                                    {isWaitingForNext ? (currentIndex < questions.length - 1 ? '下一題 Next →' : '看分數 Result →') : '送出 Submit'}
                                </button>
                                <button onClick={() => setView('menu')} className="w-full mt-6 text-gray-400 font-bold hover:text-gray-600 transition-colors">🏠 中止挑戰回到目錄</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'result') return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] w-full max-w-2xl px-4 text-center mx-auto">
                    <div className="glass-card p-12 w-full">
                        <div className="animal-icon">{score === 100 ? '🏆' : '🦊'}</div>
                        <h2 className="text-4xl font-bold mt-6 mb-4">挑戰完成！</h2>
                        <div className="my-10">
                            <p className="text-gray-400 uppercase tracking-widest font-bold">你的最終得分</p>
                            <p className="text-9xl font-bold text-green-500">{score}</p>
                            <p className="text-gray-400 text-2xl">/ 100</p>
                        </div>
                        <div className="flex flex-col gap-4">
                            <button onClick={() => { setScore(0); setCurrentIndex(0); setView('quiz'); }} className="btn-primary py-6 rounded-full text-2xl font-bold shadow-xl hover:scale-[1.02] transition-transform">再挑戰一次 Restart</button>
                            <button onClick={() => setView('menu')} className="bg-gray-100 py-6 rounded-full text-2xl font-bold text-gray-600 hover:bg-gray-200">回冒險地圖 Menu</button>
                        </div>
                    </div>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
