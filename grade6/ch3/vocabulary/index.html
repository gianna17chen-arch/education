<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間單字大冒險 (Cloud Sync Edition)</title>
    <!-- 載入基礎庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 字體與圖標 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', 'Noto Sans TC', sans-serif; background-color: #f0fdf4; overflow-x: hidden; }
        .debug-bar { font-family: monospace; font-size: 12px; z-index: 9999; }
        .slide-transition { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-practice { text-transform: lowercase; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .progress-bar-fill { transition: width 0.3s ease; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="root"></div>

<!-- Firebase SDK 載入模組 (核心規則) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    
    // 將功能掛載到 window.FB
    window.FB = { 
        initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
        getFirestore, doc, getDoc, setDoc, collection 
    };
</script>

<!-- React 應用程式邏輯 -->
<script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 設定與常數 ---
    const themeId = "grade4-phonics";
    const apiKey = ""; // 由環境自動注入
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'education-b38d5';
    const firebaseConfig = {
        apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
        authDomain: "education-b38d5.firebaseapp.com",
        projectId: "education-b38d5",
        storageBucket: "education-b38d5.firebasestorage.app",
        messagingSenderId: "450320441540",
        appId: "1:450320441540:web:888014b1380a473a142991",
        measurementId: "G-70DQ70W0B8"
    };

    // --- 工具函式：Safe ID 編碼 ---
    const getSafeId = (text) => {
        try {
            return btoa(unescape(encodeURIComponent(text))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        } catch (e) {
            return text.replace(/[^a-z0-9]/gi, '_');
        }
    };

    // --- 工具函式：PCM 轉 WAV ---
    const pcmToWav = (pcmData, sampleRate = 24000) => {
        const header = new ArrayBuffer(44);
        const view = new DataView(header);
        const length = pcmData.byteLength;

        const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + length, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM format
        view.setUint16(22, 1, true); // Mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, length, true);

        const blob = new Blob([header, pcmData], { type: 'audio/wav' });
        return URL.createObjectURL(blob);
    };

    // --- 工具函式：API 指數退避重試 ---
    const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
        try {
            const response = await fetch(url, options);
            if (!response.ok) {
                if (response.status === 403 && !apiKey) throw new Error("AUTH_MISSING");
                throw new Error(`HTTP_${response.status}`);
            }
            return await response.json();
        } catch (err) {
            if (retries > 0 && err.message !== "AUTH_MISSING") {
                await new Promise(r => setTimeout(r, backoff));
                return fetchWithRetry(url, options, retries - 1, backoff * 2);
            }
            throw err;
        }
    };

    // --- React 元件：App ---
    const App = () => {
        const [db, setDb] = useState(null);
        const [user, setUser] = useState(null);
        const [debugMsg, setDebugMsg] = useState("正在啟動系統...");
        const [currentSlide, setCurrentSlide] = useState(0);
        const [mediaCache, setMediaCache] = useState({}); // { wordId: { image, audio } }
        const [batchProgress, setBatchProgress] = useState(null); // null or 0-100
        const [slideStatus, setSlideStatus] = useState({}); // { index: { heard, typed } }
        const [modalConfig, setModalConfig] = useState(null); // { title, text, icon }

        const wordsData = useMemo(() => [
            { word: 'day', translation: '白天 / 一天', example: 'The sun shines during the day.', exampleCn: '太陽在白天閃耀。', trivia: '地球轉一圈就是一個 Day，大約是 24 小時喔！', color: '#4ade80' },
            { word: 'night', translation: '夜晚', example: 'Stars come out at night.', exampleCn: '星星在晚上出來了。', trivia: '夜晚是貓頭鷹最活躍的時候，牠們是夜行性動物喔！', color: '#38bdf8' },
            { word: 'yesterday', translation: '昨天', example: 'I played soccer yesterday.', exampleCn: '我昨天踢了足球。', trivia: 'Yesterday 原本是指過去的那一天！', color: '#fb7185' },
            { word: 'today', translation: '今天', example: 'Today is a sunny day.', exampleCn: '今天是一個晴朗的日子。', trivia: 'Today 很久以前寫作 to-day 喔！', color: '#facc15' },
            { word: 'tonight', translation: '今晚', example: 'I will sleep early tonight.', exampleCn: '我今晚會早點睡覺。', trivia: 'Tonight 通常指太陽下山後到睡覺前的時間。', color: '#818cf8' },
            { word: 'tomorrow', translation: '明天', example: 'Tomorrow is another day.', exampleCn: '明天又是新的一天。', trivia: 'Tomorrow 意思是「到下一個早晨」。', color: '#fb923c' },
            { word: 'hour', translation: '小時', example: 'An hour has sixty minutes.', exampleCn: '一小時有六十分鐘。', trivia: '注意！"hour" 的 h 是不發音的，要從 o 開始唸！', color: '#f472b6' }
        ], []);

        const quizData = [
            { q: "哪一個單字代表「明天」？", options: ["Tomorrow", "Tonight", "Today", "Yesterday"], correct: 0 },
            { q: "哪一個單字的第一個字母 H 「不發音」？", options: ["House", "Happy", "Hour", "Hello"], correct: 2 },
            { q: "如果要說「昨天」我做了什麼，要用哪一個字？", options: ["Today", "Yesterday", "Tomorrow", "Tonight"], correct: 1 },
            { q: "「今晚」的星星很漂亮。今晚是？", options: ["Tonight", "Night", "Today", "Hour"], correct: 0 },
            { q: "太陽通常在什麼時候出來？", options: ["Night", "Hour", "Tonight", "Day"], correct: 3 }
        ];

        // --- Firebase 初始化 ---
        useEffect(() => {
            const timer = setInterval(() => {
                if (window.FB) {
                    clearInterval(timer);
                    const fbApp = window.FB.initializeApp(firebaseConfig);
                    const fbAuth = window.FB.getAuth(fbApp);
                    const fbDb = window.FB.getFirestore(fbApp);
                    setDb(fbDb);

                    const initAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.FB.signInWithCustomToken(fbAuth, __initial_auth_token);
                            } else {
                                await window.FB.signInAnonymously(fbAuth);
                            }
                        } catch (e) {
                            setDebugMsg("登入失敗: " + e.message);
                        }
                    };
                    initAuth();
                    window.FB.onAuthStateChanged(fbAuth, (u) => {
                        if (u) {
                            setUser(u);
                            setDebugMsg(`已連線：${u.uid.substring(0,8)}...`);
                        }
                    });
                }
            }, 500);
            return () => clearInterval(timer);
        }, []);

        // --- 核心邏輯：媒體快取與生成 ---
        const processMedia = async (wordObj, forceGenerate = false) => {
            if (!db || !user) {
                setDebugMsg("系統尚未就緒，請稍後再試。");
                return null;
            }
            const wordId = getSafeId(wordObj.word);
            setDebugMsg(`正在檢查 ${wordObj.word} 的雲端快取...`);

            // 1. 檢查 Firestore 快取
            const imgRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'images', wordId);
            const audRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'audio', wordId);
            
            let cachedImg = null;
            let cachedAud = null;

            try {
                const [imgSnap, audSnap] = await Promise.all([
                    window.FB.getDoc(imgRef),
                    window.FB.getDoc(audRef)
                ]);
                if (imgSnap.exists()) cachedImg = imgSnap.data().url;
                if (audSnap.exists()) cachedAud = audSnap.data().url;
            } catch (e) {
                setDebugMsg(`讀取快取錯誤: ${e.message}`);
            }

            // 2. 若無快取或強制生成 -> 呼叫 API
            let finalImg = cachedImg;
            let finalAud = cachedAud;

            if (!finalImg || forceGenerate) {
                try {
                    setDebugMsg(`正在生成插圖：${wordObj.word}...`);
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ instances: [{ prompt: `Child-friendly cartoon style, clear illustration of ${wordObj.word}, bright colors, high quality, white background` }], parameters: { sampleCount: 1 } })
                    });
                    const rawBase64 = result.predictions[0].bytesBase64Encoded;
                    finalImg = await compressImage(`data:image/png;base64,${rawBase64}`);
                    await window.FB.setDoc(imgRef, { url: finalImg, timestamp: Date.now() });
                    setDebugMsg(`✅ 插圖生成成功並已快取`);
                } catch (e) {
                    setDebugMsg(`插圖失敗: ${e.message === 'AUTH_MISSING' ? '未授權' : e.message}`);
                }
            } else {
                setDebugMsg(`✅ 插圖已從雲端讀取`);
            }

            if (!finalAud || forceGenerate) {
                try {
                    setDebugMsg(`正在生成語音：${wordObj.word}...`);
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Say clearly: ${wordObj.word}. ${wordObj.example}` }] }],
                            generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                        })
                    });
                    const pcmBase64 = result.candidates[0].content.parts[0].inlineData.data;
                    const binary = atob(pcmBase64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    finalAud = pcmToWav(bytes.buffer);
                } catch (e) {
                    setDebugMsg(`語音失敗: ${e.message === 'AUTH_MISSING' ? '未授權' : e.message}`);
                    finalAud = 'speechSynthesis';
                }
            } else {
                setDebugMsg(`✅ 語音已就緒`);
            }

            const mediaData = { image: finalImg, audio: finalAud };
            setMediaCache(prev => ({ ...prev, [wordId]: mediaData }));
            return mediaData;
        };

        const compressImage = (base64) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const scale = 512 / img.width;
                    canvas.width = 512;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = base64;
            });
        };

        // --- 批量預載 ---
        const startBatchProcess = async () => {
            if (!db || !user) {
                setDebugMsg("系統連線中，請稍後再試。");
                return;
            }
            setBatchProgress(0);
            for (let i = 0; i < wordsData.length; i++) {
                await processMedia(wordsData[i]);
                setBatchProgress(Math.round(((i + 1) / wordsData.length) * 100));
            }
            setTimeout(() => setBatchProgress(null), 1000);
            setDebugMsg("✅ 所有單字已完成雲端同步");
        };

        const playMedia = (wordObj) => {
            const wordId = getSafeId(wordObj.word);
            const media = mediaCache[wordId];
            if (!media || !media.audio) {
                processMedia(wordObj).then(m => {
                    if (m) playMediaLogic(m, wordObj, wordId);
                });
            } else {
                playMediaLogic(media, wordObj, wordId);
            }
        };

        const playMediaLogic = (media, wordObj, wordId) => {
            if (!media || !media.audio) return;
            
            if (media.audio === 'speechSynthesis') {
                const u = new SpeechSynthesisUtterance(`${wordObj.word}. ${wordObj.example}`);
                u.lang = 'en-US';
                u.onend = () => markHeard(wordId);
                window.speechSynthesis.speak(u);
            } else {
                const audio = new Audio(media.audio);
                audio.onended = () => markHeard(wordId);
                audio.play().catch(e => {
                    console.error("Playback failed", e);
                    // Fallback to TTS if blob fails
                    const u = new SpeechSynthesisUtterance(`${wordObj.word}. ${wordObj.example}`);
                    u.lang = 'en-US';
                    u.onend = () => markHeard(wordId);
                    window.speechSynthesis.speak(u);
                });
            }
        };

        const markHeard = (wordId) => {
            const idx = wordsData.findIndex(w => getSafeId(w.word) === wordId);
            if (idx !== -1) {
                setSlideStatus(prev => ({ ...prev, [idx]: { ...prev[idx], heard: true } }));
            }
        };

        const handleTyping = (idx, word, val) => {
            const isCorrect = val.toLowerCase().trim() === word.toLowerCase();
            setSlideStatus(prev => ({ ...prev, [idx]: { ...prev[idx], typed: isCorrect } }));
        };

        const showModal = (title, text, icon) => setModalConfig({ title, text, icon });
        const closeModal = () => setModalConfig(null);

        // --- UI 組件 ---
        const ProgressBar = ({ progress }) => (
            <div className="w-full bg-gray-200 rounded-full h-4 mb-4 overflow-hidden">
                <div className="bg-blue-600 h-full progress-bar-fill" style={{ width: `${progress}%` }}></div>
            </div>
        );

        const IntroSlide = () => (
            <div className="flex flex-col items-center justify-center h-full text-center p-8 bg-sky-400 text-white slide">
                <h1 className="text-7xl font-bold mb-6 animate-bounce">時間單字大冒險</h1>
                <p className="text-2xl mb-10">同步雲端資料，開啟你的博士之路！</p>
                
                {batchProgress !== null ? (
                    <div className="w-64">
                        <p className="mb-2">正在同步資源... {batchProgress}%</p>
                        <ProgressBar progress={batchProgress} />
                    </div>
                ) : (
                    <div className="flex flex-col gap-4">
                        <button onClick={startBatchProcess} className="bg-white text-sky-600 font-bold py-4 px-10 rounded-full text-xl shadow-lg hover:bg-sky-50 transition">
                             🚀 一鍵雲端預載
                        </button>
                        <button onClick={() => setCurrentSlide(1)} className="bg-yellow-400 text-yellow-900 font-bold py-4 px-10 rounded-full text-xl shadow-lg hover:bg-yellow-300 transition">
                            直接開始冒險
                        </button>
                    </div>
                )}
            </div>
        );

        const WordSlide = ({ data, index }) => {
            const wordId = getSafeId(data.word);
            const media = mediaCache[wordId] || {};
            const status = slideStatus[index] || { heard: false, typed: false };
            const canGoNext = status.heard && status.typed;

            return (
                <div className="slide flex items-center justify-center p-8" style={{ backgroundColor: `${data.color}22` }}>
                    <div className="card glass-card p-10 max-w-4xl w-full border-8 rounded-3xl" style={{ borderColor: data.color }}>
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <span className="text-sm font-bold text-gray-400 uppercase tracking-widest">單字 ${index + 1}/${wordsData.length}</span>
                                <h2 className="text-7xl font-bold mb-2" style={{ color: data.color }}>{data.word}</h2>
                                <p className="text-3xl text-gray-600">{data.translation}</p>
                            </div>
                            <button onClick={() => playMedia(data)} className="w-24 h-24 rounded-full bg-yellow-400 flex items-center justify-center text-4xl shadow-xl hover:scale-110 transition active:scale-95">
                                {status.heard ? "✅" : "🔊"}
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                            <div className="space-y-6">
                                <div className="p-4 border-l-4 border-blue-400 bg-blue-50">
                                    <p className="text-2xl font-semibold mb-1">"{data.example}"</p>
                                    <p className="text-gray-500 italic">{data.exampleCn}</p>
                                </div>
                                <div className="trivia-box">
                                    <p><strong>💡 趣味小知識：</strong> {data.trivia}</p>
                                </div>
                                <div className="flex flex-col gap-2">
                                    <p className="font-bold text-blue-600">練習輸入單字：</p>
                                    <input 
                                        type="text" 
                                        className={`input-practice text-3xl p-3 border-b-4 outline-none text-center transition ${status.typed ? 'border-green-500 text-green-500' : 'border-gray-200'}`}
                                        placeholder="Type here..."
                                        onChange={(e) => handleTyping(index, data.word, e.target.value)}
                                    />
                                    <p className={`text-sm font-bold ${canGoNext ? 'text-green-600' : 'text-orange-400'}`}>
                                        {canGoNext ? "✨ 任務完成！可以前進囉！" : "任務：聽朗讀並正確輸入 📝"}
                                    </p>
                                </div>
                            </div>
                            <div className="flex justify-center bg-gray-100 rounded-3xl overflow-hidden aspect-square relative shadow-inner">
                                {media.image ? (
                                    <img src={media.image} className="w-full h-full object-cover animate-fade-in" alt={data.word} />
                                ) : (
                                    <div className="flex flex-col items-center justify-center text-gray-400">
                                        <p className="text-4xl animate-pulse">🖼️</p>
                                        <p className="text-xs">雲端生成中...</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex justify-end mt-8">
                            <button 
                                onClick={() => setCurrentSlide(currentSlide + 1)}
                                disabled={!canGoNext}
                                className={`py-4 px-12 rounded-full font-bold text-xl shadow-lg transition ${canGoNext ? 'bg-blue-600 text-white hover:scale-105 active:scale-95' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                            >
                                下一頁 ➔
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const QuizSlide = ({ data, qIdx }) => {
            const [answered, setAnswered] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);

            const handleAnswer = (idx) => {
                if (answered) return;
                const correct = idx === data.correct;
                setAnswered(true);
                setIsCorrect(correct);
                if (correct) {
                    setDebugMsg("✅ 答對了！");
                    showModal("太棒了！", "答對囉！你真優秀！", "🎉");
                } else {
                    setDebugMsg("❌ 再試一次！");
                    showModal("再試一次！", "別灰心，再想一下下！", "💪");
                    setTimeout(() => { setAnswered(false); setIsCorrect(null); }, 1500);
                }
            };

            return (
                <div className="slide bg-yellow-50 flex items-center justify-center p-8">
                    <div className="card glass-card p-10 max-w-4xl w-full border-8 border-yellow-400 rounded-3xl">
                        <h2 className="text-2xl font-bold text-gray-500 mb-2">終極挑戰 第 {qIdx + 1}/5 題</h2>
                        <p className="text-4xl font-bold text-gray-800 mb-10">{data.q}</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {data.options.map((opt, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => handleAnswer(i)}
                                    className={`p-6 border-4 rounded-3xl text-2xl font-bold transition shadow-md ${answered && i === data.correct ? 'bg-green-500 text-white border-green-600' : (answered && i !== data.correct && isCorrect === false ? 'bg-red-200 border-red-400' : 'bg-white border-gray-100 hover:border-yellow-400 hover:bg-yellow-50')}`}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                        <div className="flex justify-end mt-10">
                            <button 
                                onClick={() => setCurrentSlide(currentSlide + 1)}
                                disabled={!isCorrect}
                                className={`py-4 px-12 rounded-full font-bold text-xl transition ${isCorrect ? 'bg-orange-500 text-white shadow-lg active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                            >
                                下一題 ➔
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const FinalSlide = () => (
            <div className="slide bg-green-500 text-white flex flex-col items-center justify-center text-center p-8">
                <h2 className="text-9xl mb-8 animate-bounce">🏆</h2>
                <h1 className="text-7xl font-bold mb-4">大功告成！</h1>
                <p className="text-3xl mb-12">你現在是貨真價實的時間單字博士了！</p>
                <button onClick={() => location.reload()} className="bg-white text-green-600 font-bold py-5 px-16 rounded-full text-3xl shadow-2xl hover:scale-110 transition active:scale-95">
                    再次挑戰
                </button>
            </div>
        );

        // --- Render ---
        return (
            <div className="w-screen h-screen overflow-hidden">
                <div className="canvas-container w-full h-full slide-transition" style={{ transform: `translateY(-${currentSlide * 100}%)` }}>
                    {/* Slide 0: Intro */}
                    <IntroSlide />

                    {/* Slides 1-7: Words */}
                    {wordsData.map((w, i) => <WordSlide key={i} data={w} index={i} />)}

                    {/* Slide 8: Quiz Intro */}
                    <div className="slide bg-orange-400 text-white flex flex-col items-center justify-center text-center">
                        <h2 className="text-7xl font-bold mb-6">🏆 測驗時間</h2>
                        <p className="text-2xl mb-12">看看你吸收了多少知識吧！</p>
                        <button onClick={() => setCurrentSlide(currentSlide + 1)} className="bg-white text-orange-600 font-bold py-4 px-12 rounded-full text-2xl shadow-xl hover:scale-105 transition">
                            進入挑戰
                        </button>
                    </div>

                    {/* Slides 9-13: Quiz */}
                    {quizData.map((q, i) => <QuizSlide key={i} data={q} qIdx={i} />)}

                    {/* Slide 14: Final */}
                    <FinalSlide />
                </div>

                {/* Debug Bar */}
                <div className="fixed bottom-0 left-0 right-0 bg-black/80 text-white px-4 py-1 flex justify-between items-center debug-bar">
                    <div className="flex gap-4">
                        <span>[APP_ID: {appId}]</span>
                        <span>[THEME: {themeId}]</span>
                        <span>[STATUS: {debugMsg}]</span>
                    </div>
                    <div className="flex gap-2 items-center">
                        <span className={db ? "text-green-400" : "text-red-400"}>{db ? "● DB ONLINE" : "● DB OFFLINE"}</span>
                        <span className={user ? "text-green-400" : "text-red-400"}>{user ? "● AUTH READY" : "● AUTH PENDING"}</span>
                    </div>
                </div>

                {/* Modal Feedback */}
                {modalConfig && (
                    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] animate-fade-in">
                         <div className="bg-white p-10 rounded-3xl text-center shadow-2xl max-w-sm">
                            <div className="text-6xl mb-4">{modalConfig.icon}</div>
                            <h2 className="text-2xl font-bold mb-4">{modalConfig.title}</h2>
                            <p className="text-gray-600 mb-6">{modalConfig.text}</p>
                            <button onClick={closeModal} className="bg-blue-500 text-white px-8 py-2 rounded-full font-bold shadow-lg active:scale-95 transition">繼續</button>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // --- 初始化 Render ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
