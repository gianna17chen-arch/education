<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coincidence in Friendship - Interactive Storybook</title>
    <!-- 載入 CDN 依賴 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .font-serif-manga { font-family: 'Noto Serif TC', serif; }
        .manga-shadow { filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1)); }
        .debug-bar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-[#fafafc] text-slate-900 selection:bg-indigo-100 overflow-x-hidden">

    <div id="root"></div>

    <!-- 1. Firebase SDK 載入核心規則 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, setDoc };
    </script>

    <!-- 2. React 邏輯實作 (Babel) -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- 設定與常數 ---
        const themeId = "grade4-manga-story";
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        // --- 自定義圖標組件 (Component Integrity Audit) ---
        const Icons = {
            BookOpen: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,
            HelpCircle: () => <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Volume2: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>,
            Home: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
            ChevronRight: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>,
            ChevronLeft: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" /></svg>,
            RefreshCw: ({ className }) => <svg className={`w-10 h-10 ${className}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
            Star: () => <svg className="w-24 h-24 text-yellow-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" /></svg>,
            Play: () => <svg className="w-16 h-16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>,
            MessageSquare: ({ className }) => <svg className={`w-4 h-4 ${className}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
            Check: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>,
            AlertCircle: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Cloud: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>
        };

        const App = () => {
            const [view, setView] = useState('menu');
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [debugMsg, setDebugMsg] = useState("正在啟動系統...");
            const [currentPage, setCurrentPage] = useState(0);
            const [images, setImages] = useState({});
            const [audios, setAudios] = useState({});
            const [batchStatus, setBatchStatus] = useState({ active: false, progress: 0, currentAction: "" });
            const [isReading, setIsReading] = useState(false);
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const audioRef = useRef(null);

            // 故事腳本
            const storyPages = useMemo(() => [
                { id: "p0", text: "Amy: Camping is fun.\nAmy: Hi, I’m Amy. I like this song.", prompt: "High-quality anime style. Amy, a 10-year-old girl with brown ponytail and orange cap, sitting on a log at a forest campsite with headphones, singing happily. Bright sunny day.", audio: "Say cheerfully: Amy says: Camping is fun! Hi, I’m Amy. I like this song." },
                { id: "p1", text: "Emma: Hello, I’m Emma.\nAmy: Do you like to listen to music?\nEmma: Yes, I do.", prompt: "Anime style. Amy and Emma sitting together by a campfire at night. Amy sharing headphones with Emma. Sparkly stars.", audio: "Emma says: Hello, I’m Emma. Amy asks: Do you like to listen to music? Emma replies: Yes, I do." },
                { id: "p2", text: "Amy and Emma have a great time at the campsite.\nAmy: Goodbye, Emma!\nEmma: Bye! Hope to see you again.", prompt: "Anime style. Amy and Emma waving goodbye at forest exit with backpacks. Scenic mountains.", audio: "Amy and Emma have a great time at the campsite. Amy says: Goodbye, Emma! Emma replies warmly: Bye! Hope to see you again." },
                { id: "p3", text: "Two days later...\nTeacher: Hello, class. This is Emma.\nEmma: Hi! I’m Emma. I’m from India.", prompt: "Anime style. Modern classroom. Teacher introducing Emma. Amy sitting at desk looking very surprised.", audio: "Two days later. The Teacher says: Hello, class. This is Emma. Emma says: Hi! I’m Emma. I’m from India." },
                { id: "p4", text: "Teacher: What do you like to do in your free time, Emma?\nEmma: I like to go camping and listen to music.\nAmy: Me too! Nice to see you again.", prompt: "Anime style. Classroom. Amy waving excitedly at Emma. Both smiling brightly. Happy reunion.", audio: "The Teacher asks: What do you like to do in your free time, Emma? Emma answers: I like to go camping and listen to music. Amy shouts excitedly: Me too! Nice to see you again!" }
            ], []);

            const quizQuestions = [
                { q: "Where did Amy and Emma first meet?", a: ["At school", "At a forest campsite", "In India", "At a concert"], correct: 1 },
                { q: "What are Emma's hobbies?", a: ["Drawing and sports", "Reading and cooking", "Camping and music", "Dancing and singing"], correct: 2 },
                { q: "How did Amy feel when she saw Emma in class?", a: ["Scared", "Angry", "Bored", "Surprised and happy"], correct: 3 }
            ];

            // --- 輔助函式 ---
            const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

            const compressImage = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 512;
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                });
            };

            const pcmToWav = (pcmBase64) => {
                try {
                    const binaryString = window.atob(pcmBase64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                    // L16 Big-Endian to Little-Endian
                    for (let i = 0; i < bytes.length - 1; i += 2) {
                        const temp = bytes[i]; bytes[i] = bytes[i+1]; bytes[i+1] = temp;
                    }
                    const wavHeader = new ArrayBuffer(44);
                    const view = new DataView(wavHeader);
                    const writeString = (off, s) => { for(let i=0; i<s.length; i++) view.setUint8(off+i, s.charCodeAt(i)); };
                    writeString(0, 'RIFF');
                    view.setUint32(4, 36 + bytes.length, true);
                    writeString(8, 'WAVE');
                    writeString(12, 'fmt ');
                    view.setUint32(16, 16, true);
                    view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                    view.setUint32(24, 24000, true); view.setUint32(28, 48000, true);
                    view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                    writeString(36, 'data');
                    view.setUint32(40, bytes.length, true);
                    return new Blob([wavHeader, bytes], { type: 'audio/wav' });
                } catch (e) { return null; }
            };

            const fetchWithRetry = async (url, options, retries = 5) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const res = await fetch(url, options);
                        if (res.ok) return res;
                        if (res.status === 403 && !apiKey) {
                            setDebugMsg("❌ 快取不存在且無法取得 API 授權，請確認金鑰設定");
                            throw new Error("403 Forbidden");
                        }
                    } catch (e) { if (i === retries - 1) throw e; }
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            };

            // --- 核心媒體管線 ---
            const getOrGenerateMedia = async (type, text, prompt) => {
                if (!db) return null;
                const safeId = getSafeId(text);
                const cacheDoc = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', type, safeId);
                
                try {
                    const snap = await window.FB.getDoc(cacheDoc);
                    if (snap.exists()) {
                        setDebugMsg(`✅ 已從雲端讀取 ${type}`);
                        return snap.data().content;
                    }

                    setDebugMsg(`⌛ 正在 AI 合成 ${type}...`);
                    let content;
                    if (type === 'image') {
                        const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                            method: 'POST', body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1 } })
                        });
                        const data = await res.json();
                        const rawBase64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                        content = await compressImage(rawBase64);
                    } else {
                        const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST', body: JSON.stringify({ 
                                contents: [{ parts: [{ text }] }],
                                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } },
                                model: "gemini-2.5-flash-preview-tts"
                            })
                        });
                        const data = await res.json();
                        content = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    }

                    if (content) {
                        await window.FB.setDoc(cacheDoc, { content, createdAt: Date.now() });
                        return content;
                    }
                } catch (e) { setDebugMsg(`❌ ${type} 生成失敗: ${e.message}`); return null; }
            };

            // --- Firebase 初始化 ---
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.FB) {
                        clearInterval(interval);
                        const app = window.FB.initializeApp(firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        window.FB.signInAnonymously(auth);
                        window.FB.onAuthStateChanged(auth, setUser);
                        setDebugMsg("✅ Firebase 連線成功");
                    }
                }, 500);
                return () => clearInterval(interval);
            }, []);

            // --- 自動同步全繪本 ---
            const syncAll = async () => {
                if (batchStatus.active || !db || !user) return;
                setBatchStatus({ active: true, progress: 0, currentAction: "準備同步..." });
                
                const totalSteps = storyPages.length * 2;
                let currentStep = 0;

                for (let i = 0; i < storyPages.length; i++) {
                    const page = storyPages[i];
                    
                    setBatchStatus(prev => ({ ...prev, currentAction: `處理第 ${i+1} 頁插圖...` }));
                    const img = await getOrGenerateMedia('image', page.text, page.prompt);
                    setImages(prev => ({ ...prev, [page.id]: img }));
                    currentStep++;
                    setBatchStatus(prev => ({ ...prev, progress: (currentStep / totalSteps) * 100 }));

                    setBatchStatus(prev => ({ ...prev, currentAction: `處理第 ${i+1} 頁語音...` }));
                    const aud = await getOrGenerateMedia('audio', page.audio);
                    setAudios(prev => ({ ...prev, [page.id]: aud }));
                    currentStep++;
                    setBatchStatus(prev => ({ ...prev, progress: (currentStep / totalSteps) * 100 }));
                }

                setBatchStatus({ active: false, progress: 100, currentAction: "同步完成！" });
                setDebugMsg("✨ 全繪本媒體同步已完成");
            };

            const handlePlayAudio = async (pageId, text) => {
                if (isReading) return;
                setIsReading(true);
                let base64 = audios[pageId];
                if (!base64) {
                    base64 = await getOrGenerateMedia('audio', text);
                    if (base64) setAudios(prev => ({ ...prev, [pageId]: base64 }));
                }

                if (base64 && base64.length > 100) {
                    const blob = pcmToWav(base64);
                    const url = URL.createObjectURL(blob);
                    audioRef.current = new Audio(url);
                    audioRef.current.onended = () => { setIsReading(false); URL.revokeObjectURL(url); };
                    audioRef.current.play();
                } else {
                    // Fallback to SpeechSynthesis
                    const ut = new SpeechSynthesisUtterance(text.replace(/Amy says:|Emma says:|The Teacher asks:|Teacher says:|shouts excitedly:|replies warmly:/g, ""));
                    ut.lang = "en-US";
                    ut.onend = () => setIsReading(false);
                    window.speechSynthesis.speak(ut);
                }
            };

            // --- 渲染組件 ---
            const Dialogue = ({ line }) => {
                const parts = line.split(':');
                if (parts.length < 2) return <p className="text-slate-500 italic py-3 text-center font-serif-manga leading-relaxed">{line}</p>;
                const speaker = parts[0].trim();
                const content = parts[1].trim();
                const configs = {
                    "Amy": "text-orange-600 bg-orange-50/70 border-orange-200",
                    "Emma": "text-indigo-600 bg-indigo-50/70 border-indigo-200",
                    "Teacher": "text-emerald-600 bg-emerald-50/70 border-emerald-200"
                };
                return (
                    <div className={`group flex flex-col mb-4 p-5 rounded-[1.5rem] border-l-4 transition-all hover:shadow-md ${configs[speaker] || "bg-slate-50 border-slate-200"}`}>
                        <div className="flex items-center gap-2 mb-1">
                            <Icons.MessageSquare className={configs[speaker]?.split(' ')[0]} />
                            <span className="text-[0.7rem] font-black uppercase tracking-[0.2em]">{speaker}</span>
                        </div>
                        <p className="text-xl md:text-2xl font-medium leading-relaxed text-slate-800 font-serif-manga">「{content}」</p>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
                        <div className="flex items-center gap-2 text-indigo-600">
                            <Icons.BookOpen />
                            <h1 className="text-xl font-black tracking-tight uppercase">Coincidence</h1>
                        </div>
                        {view !== 'menu' && (
                            <button onClick={() => { setView('menu'); window.speechSynthesis.cancel(); if(audioRef.current) audioRef.current.pause(); setIsReading(false); }} className="flex items-center gap-1 font-bold text-slate-400 hover:text-indigo-600 transition-all">
                                <Icons.Home /> <span className="text-xs uppercase tracking-widest">MENU</span>
                            </button>
                        )}
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 md:p-10">
                        {view === 'menu' && (
                            <div className="flex flex-col items-center py-12 space-y-12 animate-in fade-in duration-1000">
                                <div className="text-center space-y-5">
                                    <div className="inline-block px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-[0.7rem] font-black uppercase tracking-[0.3em] mb-2">ARCHITECT EDITION</div>
                                    <h2 className="text-6xl font-black text-slate-900 tracking-tighter leading-[0.9]">ANIME<br /><span className="text-indigo-600">STORYBOOK</span></h2>
                                    
                                    <button 
                                        onClick={syncAll}
                                        disabled={batchStatus.active || !db}
                                        className={`mt-6 px-6 py-3 rounded-2xl flex items-center gap-3 font-black text-sm transition-all shadow-lg
                                            ${batchStatus.active ? 'bg-indigo-100 text-indigo-400' : 'bg-indigo-600 text-white hover:bg-indigo-700 active:scale-95'}`}
                                    >
                                        <Icons.Cloud />
                                        {batchStatus.active ? `⌛ 正在同步中... ${Math.round(batchStatus.progress)}%` : "一鍵合成語音與插圖 (雲端偵測)"}
                                    </button>

                                    {batchStatus.active && (
                                        <div className="w-64 h-2 bg-slate-100 rounded-full overflow-hidden mt-2 mx-auto">
                                            <div className="h-full bg-indigo-500 transition-all duration-300" style={{ width: `${batchStatus.progress}%` }}></div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-2xl">
                                    <button onClick={() => { setView('story'); setCurrentPage(0); }} className="group bg-white p-12 rounded-[3rem] border border-slate-200 shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all flex flex-col items-center gap-6">
                                        <div className="bg-indigo-500 p-6 rounded-[2rem] shadow-lg group-hover:scale-110 group-hover:rotate-6 transition-all">
                                            <Icons.Play />
                                        </div>
                                        <span className="text-2xl font-black">READ STORY</span>
                                    </button>
                                    <button onClick={() => { setView('quiz'); setQuizIndex(0); setScore(0); setShowResult(false); }} className="group bg-white p-12 rounded-[3rem] border border-slate-200 shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all flex flex-col items-center gap-6">
                                        <div className="bg-pink-500 p-6 rounded-[2rem] shadow-lg group-hover:scale-110 group-hover:-rotate-6 transition-all">
                                            <Icons.HelpCircle />
                                        </div>
                                        <span className="text-2xl font-black">TAKE QUIZ</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'story' && (
                            <div className="space-y-8 animate-in slide-in-from-bottom duration-700">
                                <div className="relative aspect-video rounded-[3rem] overflow-hidden border-[10px] border-white shadow-2xl bg-slate-200">
                                    {images[storyPages[currentPage].id] ? (
                                        <img src={images[storyPages[currentPage].id]} className="w-full h-full object-cover" alt="Scene" />
                                    ) : (
                                        <div className="w-full h-full flex flex-col items-center justify-center text-indigo-400 bg-indigo-50/50">
                                            <Icons.RefreshCw className="animate-spin mb-6" />
                                            <p className="font-black tracking-[0.3em] uppercase text-[0.7rem]">Drawing Scene {currentPage+1}...</p>
                                        </div>
                                    )}
                                    <div className="absolute top-6 left-6 px-4 py-1 bg-black/30 backdrop-blur-md rounded-full text-[0.6rem] font-black text-white uppercase tracking-widest">Scene {currentPage + 1}</div>
                                </div>

                                <div className="bg-white/80 backdrop-blur-xl p-10 rounded-[3.5rem] shadow-xl border border-slate-100">
                                    <div className="flex justify-between items-center mb-8">
                                        <div className="flex items-center gap-2">
                                            <div className="w-1.5 h-6 bg-indigo-500 rounded-full"></div>
                                            <h3 className="text-[0.7rem] font-black tracking-[0.4em] text-slate-400 uppercase">Dialogue</h3>
                                            {audios[storyPages[currentPage].id] && <span className="text-[10px] text-green-500 font-bold ml-2">✅ 已快取</span>}
                                        </div>
                                        <button 
                                            onClick={() => handlePlayAudio(storyPages[currentPage].id, storyPages[currentPage].audio)} 
                                            disabled={isReading} 
                                            className={`p-4 rounded-[1.5rem] transition-all shadow-lg ${isReading ? 'bg-indigo-600 text-white animate-pulse' : 'bg-white text-indigo-600 hover:scale-110 active:scale-95 border border-slate-100'}`}
                                        >
                                            {isReading ? <div className="w-6 h-6 border-2 border-white border-t-transparent animate-spin rounded-full"></div> : <Icons.Volume2 />}
                                        </button>
                                    </div>
                                    <div className="space-y-2">
                                        {storyPages[currentPage].text.split('\n').map((line, i) => <Dialogue key={i} line={line} />)}
                                    </div>
                                </div>

                                <div className="flex justify-between items-center py-8">
                                    <button disabled={currentPage === 0} onClick={() => setCurrentPage(c => c - 1)} className="group px-8 py-5 rounded-full font-black flex items-center gap-3 transition-all bg-white text-indigo-600 border border-slate-200 hover:bg-slate-50 shadow-sm active:scale-95 disabled:opacity-0">
                                        <Icons.ChevronLeft /> PREV
                                    </button>
                                    <div className="flex gap-2.5">
                                        {storyPages.map((_, i) => <div key={i} className={`h-1.5 rounded-full transition-all duration-500 ${i === currentPage ? 'bg-indigo-600 w-12' : 'bg-slate-200 w-3'}`} />)}
                                    </div>
                                    {currentPage < storyPages.length - 1 ? (
                                        <button onClick={() => setCurrentPage(c => c + 1)} className="group px-10 py-5 bg-indigo-600 text-white rounded-full font-black shadow-xl hover:shadow-indigo-200 hover:translate-y-[-2px] active:scale-95 transition-all flex items-center gap-3">
                                            NEXT <Icons.ChevronRight />
                                        </button>
                                    ) : (
                                        <button onClick={() => setView('quiz')} className="group px-10 py-5 bg-pink-600 text-white rounded-full font-black shadow-xl hover:shadow-pink-200 active:scale-95 transition-all flex items-center gap-3">
                                            QUIZ <Icons.HelpCircle />
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'quiz' && !showResult && (
                            <div className="max-w-2xl mx-auto space-y-10 animate-in zoom-in duration-500">
                                <div className="text-center space-y-4">
                                    <h2 className="text-3xl font-black text-pink-600 italic tracking-tight uppercase">Challenge</h2>
                                    <div className="h-3 bg-slate-200 rounded-full overflow-hidden border border-white shadow-inner">
                                        <div className="h-full bg-pink-500 transition-all duration-700" style={{ width: `${((quizIndex + 1) / quizQuestions.length) * 100}%` }} />
                                    </div>
                                    <p className="text-[0.6rem] font-bold text-slate-400 uppercase tracking-widest">Q {quizIndex + 1} / {quizQuestions.length}</p>
                                </div>
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-50">
                                    <h3 className="text-2xl font-black mb-10 leading-snug text-center">{quizQuestions[quizIndex].q}</h3>
                                    <div className="space-y-4">
                                        {quizQuestions[quizIndex].a.map((opt, i) => (
                                            <button key={i} onClick={() => {
                                                if (i === quizQuestions[quizIndex].correct) setScore(s => s + 1);
                                                if (quizIndex < quizQuestions.length - 1) setQuizIndex(i => i + 1);
                                                else setShowResult(true);
                                            }} className="w-full text-left p-6 rounded-[2rem] border-2 border-slate-100 hover:border-pink-500 hover:bg-pink-50/50 transition-all flex items-center gap-5">
                                                <span className="w-12 h-12 flex items-center justify-center bg-slate-50 text-slate-400 rounded-2xl font-black">{String.fromCharCode(65+i)}</span>
                                                <span className="text-lg font-bold text-slate-700">{opt}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'quiz' && showResult && (
                            <div className="text-center space-y-12 py-12 animate-in fade-in duration-1000">
                                <div className="relative inline-block">
                                    <div className="absolute inset-0 bg-yellow-400 rounded-full blur-[80px] opacity-20 animate-pulse" />
                                    <div className="relative bg-white p-20 rounded-full shadow-2xl border-[16px] border-yellow-50">
                                        <Icons.Star />
                                        <div className="text-[5rem] font-black mt-4 tracking-tighter leading-none">{score}/{quizQuestions.length}</div>
                                    </div>
                                </div>
                                <h2 className="text-4xl font-black italic text-slate-900 uppercase">GOOD JOB!</h2>
                                <div className="flex flex-col gap-4 max-w-sm mx-auto">
                                    <button onClick={() => { setView('story'); setCurrentPage(0); }} className="bg-indigo-600 text-white px-10 py-6 rounded-full font-black text-xl shadow-xl transition-all">RE-READ</button>
                                    <button onClick={() => setView('menu')} className="bg-white text-slate-400 px-10 py-6 rounded-full font-black text-xl border border-slate-200 transition-all">MENU</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* DebugBar 固定底部 */}
                    <div className="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur text-white text-[10px] py-1.5 px-4 flex justify-between items-center z-[100] border-t border-white/10 debug-bar">
                        <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${user ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div>
                            <span className="font-mono tracking-tight opacity-80 uppercase">{debugMsg}</span>
                        </div>
                        <div className="opacity-50 font-bold tracking-tighter uppercase">ID: {user ? user.uid.substring(0,8) : 'DISCONNECTED'} • ARCH V2.0</div>
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
