<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海賊王：日常活動大冒險 - Tr. Mimi 專屬版</title>
    <!-- CDN 載入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0f172a] text-white overflow-x-hidden font-sans">
    <div id="root"></div>

    <!-- Firebase SDK (獨立 Module 載入) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React 應用程式邏輯 -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 設定與金鑰 ---
        const themeId = "one-piece-activities-v2";
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'one-piece-app';
        const apiKey = ""; // 由環境注入
        
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        const VOCABULARY = [
            { word: 'LISTEN TO MUSIC', hint: '戴上耳機聽音樂', speaker: '布魯克', avatar: '💀', prompt: 'A cool skeleton musician playing music with headphones, pirate style' },
            { word: 'GO HIKING', hint: '背起背包去健行/爬山', speaker: '索隆', avatar: '⚔️', prompt: 'A green haired swordsman hiking on a high mountain with a backpack, pirate theme' },
            { word: 'PLAY BASKETBALL', hint: '在球場上打籃球', speaker: '路飛', avatar: '👒', prompt: 'A boy with a straw hat playing basketball, pirate ship deck background' },
            { word: 'WATCH TV', hint: '坐在沙發上看電視', speaker: '烏索普', avatar: '👃', prompt: 'A long-nosed pirate watching a classic wooden TV, cozy pirate cabin' },
            { word: 'GO SWIMMING', hint: '穿上泳衣去游泳', speaker: '佛朗基', avatar: '🤖', prompt: 'A cyborg man swimming in the tropical ocean, blue water, sunny day' },
            { word: 'GO SHOPPING', hint: '到商場買東西/購物', speaker: '娜美', avatar: '🍊', prompt: 'A red haired pirate woman holding many shopping bags in a busy market' },
            { word: 'GO CAMPING', hint: '在戶外搭帳篷露營', speaker: '喬巴', avatar: '🦌', prompt: 'A cute reindeer camping with a tent and campfire in a forest at night' }
        ];

        // --- 核心工具函式 ---
        const safeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

        const pcmToWav = (pcmData, sampleRate = 24000) => {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            let offset = 44;
            for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        };

            const resizeImage = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxWidth = 512;
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = base64Str;
            });
        };

        const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (res.ok) return await res.json();
                    if (res.status === 403 && !apiKey) throw new Error("API_AUTH_ERROR");
                } catch (e) {
                    if (e.message === "API_AUTH_ERROR" || i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        };

        // --- UI 組件 ---
        // 修復 NotFoundError: 使用 Ref 容器隔離 Lucide DOM 操作
        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (window.lucide && spanRef.current) {
                    // 手動注入 i 標籤並觸發 Lucide 轉換，避免 React 追蹤其內部節點
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons();
                    const svg = spanRef.current.querySelector('svg');
                    if (svg) {
                        svg.style.width = `${size}px`;
                        svg.style.height = `${size}px`;
                        if (className) {
                            className.split(' ').filter(Boolean).forEach(cls => svg.classList.add(cls));
                        }
                    }
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center pointer-events-none"></span>;
        };

        const DebugBar = ({ msg }) => (
            <div className="fixed bottom-0 left-0 right-0 bg-black/80 text-[10px] p-1 font-mono flex gap-4 overflow-x-auto whitespace-nowrap z-[100] border-t border-white/10">
                <span className="text-yellow-400 font-bold">[SYSTEM]</span>
                <span className="text-white/80">{msg || "等待操作..."}</span>
            </div>
        );

        // --- 主程式 ---
        function App() {
            const [gameState, setGameState] = useState('start');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [inputValue, setInputValue] = useState('');
            const [feedback, setFeedback] = useState(null);
            const [shake, setShake] = useState(false);
            
            const [fbReady, setFbReady] = useState(false);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [debugMsg, setDebugMsg] = useState("");
            const [progress, setProgress] = useState(0);
            const [isSyncing, setIsSyncing] = useState(false);
            const [mediaStatus, setMediaStatus] = useState({});

            const currentTask = VOCABULARY[currentIndex];

            // 1. 初始化 Firebase 與 容錯登入邏輯
            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.FB) {
                        clearInterval(timer);
                        const app = window.FB.initializeApp(firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);

                        const initAuth = async () => {
                            try {
                                setDebugMsg("正在嘗試雲端認證...");
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    try {
                                        await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                                        setDebugMsg("✅ Token 認證成功");
                                    } catch (tokenErr) {
                                        setDebugMsg("⚠️ Token 不匹配，切換至匿名登入...");
                                        await window.FB.signInAnonymously(auth);
                                    }
                                } else {
                                    await window.FB.signInAnonymously(auth);
                                }
                            } catch (e) {
                                setDebugMsg("❌ 登入失敗: " + e.message);
                            }
                        };
                        initAuth();
                        window.FB.onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setFbReady(true);
                            if (u) setDebugMsg(`✅ 雲端已就緒 (UID: ${u.uid})`);
                        });
                    }
                }, 500);
                return () => clearInterval(timer);
            }, []);

            // 2. 預檢雲端快取狀態
            useEffect(() => {
                if (fbReady && db) checkAllCloudCache();
            }, [fbReady, db]);

            const checkAllCloudCache = async () => {
                const status = {};
                for (const item of VOCABULARY) {
                    const sid = safeId(item.word);
                    const aDoc = await window.FB.getDoc(window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'audio', sid));
                    const iDoc = await window.FB.getDoc(window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'image', sid));
                    status[item.word] = { audio: aDoc.exists(), image: iDoc.exists() };
                }
                setMediaStatus(status);
            };

            // 3. AI Media Generation
            const syncMedia = async () => {
                if (!fbReady || !user) {
                    setDebugMsg("⌛ 請等待雲端連線後再試");
                    return;
                }
                setIsSyncing(true);
                setProgress(0);
                
                try {
                    for (let i = 0; i < VOCABULARY.length; i++) {
                        const item = VOCABULARY[i];
                        const sid = safeId(item.word);
                        setDebugMsg(`正在同步: ${item.word}...`);

                        // Audio
                        if (!mediaStatus[item.word]?.audio) {
                            const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                                method: 'POST',
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: `Say clearly: ${item.word}` }] }],
                                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                                })
                            });
                            const pcmBase64 = res.candidates[0].content.parts[0].inlineData.data;
                            const binary = atob(pcmBase64);
                            const pcmArray = new Int16Array(binary.length / 2);
                            for (let j = 0; j < binary.length; j += 2) pcmArray[j / 2] = (binary.charCodeAt(j + 1) << 8) | binary.charCodeAt(j);
                            const wavBlob = pcmToWav(pcmArray);
                            const reader = new FileReader();
                            reader.readAsDataURL(wavBlob);
                            reader.onloadend = async () => {
                                await window.FB.setDoc(window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'audio', sid), { data: reader.result, ts: Date.now() });
                            };
                        }

                        // Image
                        if (!mediaStatus[item.word]?.image) {
                            const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                                method: 'POST',
                                body: JSON.stringify({ instances: { prompt: item.prompt }, parameters: { sampleCount: 1 } })
                            });
                            const rawB64 = `data:image/png;base64,${res.predictions[0].bytesBase64Encoded}`;
                            const compressed = await resizeImage(rawB64);
                            await window.FB.setDoc(window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'image', sid), { data: compressed, ts: Date.now() });
                        }

                        setProgress(Math.round(((i + 1) / VOCABULARY.length) * 100));
                    }
                    setDebugMsg("✅ 雲端同步成功！");
                    await checkAllCloudCache();
                } catch (e) {
                    setDebugMsg(`❌ 同步失敗: ${e.message === "API_AUTH_ERROR" ? "無 API 權限，請確認金鑰設定" : e.message}`);
                } finally {
                    setIsSyncing(false);
                }
            };

            const playAudio = async (word) => {
                if (!db) return;
                try {
                    setDebugMsg(`🔊 正在讀取 ${word}...`);
                    const sid = safeId(word);
                    const snap = await window.FB.getDoc(window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'audio', sid));
                    if (snap.exists()) {
                        new Audio(snap.data().data).play();
                    } else {
                        setDebugMsg("⚠️ 快取未就緒，使用系統備援...");
                        const utt = new SpeechSynthesisUtterance(word);
                        utt.lang = 'en-US';
                        window.speechSynthesis.speak(utt);
                    }
                } catch (e) {
                    setDebugMsg("語音讀取錯誤");
                }
            };

            const getCloudImage = async (word) => {
                if (!db) return null;
                const snap = await window.FB.getDoc(window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'image', safeId(word)));
                return snap.exists() ? snap.data().data : null;
            };

            const [currentImg, setCurrentImg] = useState(null);
            useEffect(() => {
                if (gameState === 'playing' && db) {
                    getCloudImage(currentTask.word).then(url => setCurrentImg(url));
                }
            }, [currentIndex, gameState, db]);

            // 4. 遊戲邏輯
            const handleStart = () => {
                setGameState('playing');
                setCurrentIndex(0);
                setInputValue('');
                setFeedback(null);
            };

            const handleAnswer = (e) => {
                e.preventDefault();
                const target = currentTask.word.toUpperCase().replace(/\s+/g, ' ');
                if (inputValue.toUpperCase().trim() === target) {
                    setFeedback('correct');
                    playAudio(currentTask.word);
                    setTimeout(() => {
                        if (currentIndex < VOCABULARY.length - 1) {
                            setCurrentIndex(currentIndex + 1);
                            setInputValue('');
                            setFeedback(null);
                        } else {
                            setGameState('won');
                        }
                    }, 1500);
                } else {
                    setFeedback('wrong');
                    setShake(true);
                    setTimeout(() => { setShake(false); setFeedback(null); }, 500);
                }
            };

            return (
                <div className="min-h-screen pb-12 flex flex-col">
                    <div className="max-w-4xl mx-auto px-4 py-8 flex-1 w-full">
                        {/* Header */}
                        <div className="text-center mb-8">
                            <h1 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 italic drop-shadow-md uppercase">
                                Activity Adventure
                            </h1>
                            <p className="text-blue-400 font-bold tracking-widest text-sm uppercase mt-1 italic">千陽號雲端休假計畫</p>
                        </div>

                        {gameState === 'start' && (
                            <div className="flex flex-col items-center bg-slate-800/50 p-10 rounded-3xl border-4 border-blue-500/20 backdrop-blur-md">
                                <Icon name="ship" size={80} className="text-yellow-500 mb-6 animate-bounce" />
                                <div className="bg-white text-slate-900 p-4 rounded-2xl mb-8 relative border-b-4 border-slate-300 max-w-sm">
                                    <p className="font-bold text-center">嘿夥伴們！我們必須解鎖雲端密碼，才能啟動千陽號！</p>
                                </div>
                                
                                <div className="flex flex-col gap-4 w-full max-w-xs">
                                    <button 
                                        onClick={handleStart}
                                        className="py-4 bg-red-600 hover:bg-red-500 rounded-xl font-black text-xl shadow-[0_4px_0_#991b1b] active:translate-y-1 active:shadow-none transition-all"
                                    >
                                        進入挑戰
                                    </button>
                                    
                                    <button 
                                        onClick={syncMedia}
                                        disabled={isSyncing || !fbReady}
                                        className={`py-3 rounded-xl font-bold flex items-center justify-center gap-2 border-2 ${isSyncing ? 'bg-slate-700 border-slate-600' : 'bg-blue-600/20 border-blue-500 text-blue-400 hover:bg-blue-600/30'} ${!fbReady && 'opacity-50 cursor-not-allowed'}`}
                                    >
                                        {isSyncing ? `⌛ 同步中 ${progress}%` : <><Icon name="cloud-lightning" size={18} /> 一鍵雲端預載</>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {gameState === 'playing' && (
                            <div className="space-y-6">
                                {/* Avatar */}
                                <div className="flex items-center gap-4">
                                    <div className="w-16 h-16 bg-yellow-400 rounded-full border-4 border-orange-600 flex items-center justify-center text-3xl shadow-lg relative shrink-0">
                                        {currentTask.avatar}
                                        <div className="absolute -bottom-1 -right-1 bg-red-600 text-[8px] px-1 rounded font-bold border border-white uppercase">{currentTask.speaker}</div>
                                    </div>
                                    <div className="bg-white text-slate-800 p-3 rounded-2xl rounded-tl-none shadow-md flex-1 text-sm font-bold border-2 border-orange-100 italic">
                                        {currentTask.story}
                                    </div>
                                </div>

                                {/* Progress */}
                                <div className="bg-slate-800 rounded-full h-4 p-1 border border-slate-700 flex items-center">
                                    <div className="bg-gradient-to-r from-yellow-400 to-orange-500 h-full rounded-full transition-all duration-500 shadow-[0_0_10px_yellow]" style={{ width: `${((currentIndex+1)/VOCABULARY.length)*100}%` }}></div>
                                    <Icon name="anchor" size={14} className="ml-2 text-yellow-400" />
                                </div>

                                {/* Card */}
                                <div className={`flex flex-col md:flex-row gap-8 items-center ${shake ? 'animate-shake' : ''}`}>
                                    <div className="w-full md:w-1/2 aspect-square bg-[#fdf2d9] rounded-2xl border-4 border-[#8b5e3c] overflow-hidden relative shadow-2xl flex items-center justify-center group">
                                        <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/handmade-paper.png')]"></div>
                                        {currentImg ? (
                                            <img src={currentImg} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Activity" />
                                        ) : (
                                            <div className="text-8xl select-none drop-shadow-lg">{currentTask.icon}</div>
                                        )}
                                        <div className="absolute bottom-4 left-4 bg-orange-600/90 text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-md">
                                            {mediaStatus[currentTask.word]?.image ? "✅ 已從雲端讀取" : "📡 使用預設圖示"}
                                        </div>
                                    </div>

                                    <div className="w-full md:w-1/2 space-y-4">
                                        <div className="bg-slate-800/80 p-6 rounded-3xl border-2 border-slate-700 shadow-xl backdrop-blur-md">
                                            <div className="flex justify-between items-center mb-4">
                                                <span className="text-yellow-400 font-black italic tracking-widest">UNLOCK CODE</span>
                                                <button 
                                                    onClick={() => playAudio(currentTask.word)}
                                                    className="p-3 bg-yellow-500 hover:bg-yellow-400 rounded-xl text-slate-900 shadow-lg active:scale-95 transition-all"
                                                >
                                                    <Icon name="volume-2" />
                                                </button>
                                            </div>
                                            <form onSubmit={handleAnswer}>
                                                <input 
                                                    autoFocus
                                                    type="text"
                                                    value={inputValue}
                                                    onChange={(e) => setInputValue(e.target.value)}
                                                    className={`w-full bg-slate-950 border-4 rounded-xl p-4 text-xl font-black uppercase outline-none transition-all tracking-widest
                                                        ${feedback === 'correct' ? 'border-green-500 text-green-400' : feedback === 'wrong' ? 'border-red-600 text-red-500' : 'border-slate-700 focus:border-yellow-500'}
                                                    `}
                                                    placeholder="輸入單字..."
                                                />
                                                <button className="w-full mt-4 py-4 bg-gradient-to-b from-orange-400 to-orange-600 rounded-xl font-black text-lg shadow-lg active:translate-y-1 transition-all border-b-4 border-orange-800">
                                                    確認密碼
                                                </button>
                                            </form>
                                            <p className="text-center mt-4 text-slate-400 text-xs font-bold italic tracking-wider">{currentTask.hint}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {gameState === 'won' && (
                            <div className="text-center bg-slate-800/80 p-12 rounded-3xl border-4 border-yellow-500 shadow-2xl relative overflow-hidden animate-in zoom-in duration-500">
                                <Icon name="trophy" size={100} className="text-yellow-500 mx-auto mb-6 drop-shadow-2xl" />
                                <h2 className="text-4xl font-black mb-4 uppercase italic">Mission Clear!</h2>
                                <p className="text-xl text-blue-200 mb-8 font-bold italic">「夥伴們！出航啦！」</p>
                                <button onClick={() => setGameState('start')} className="px-12 py-4 bg-white text-slate-950 font-black text-xl rounded-full hover:bg-yellow-400 transition-all shadow-xl">
                                    再次挑戰
                                </button>
                            </div>
                        )}
                    </div>

                    <DebugBar msg={debugMsg} />
                    <style>
                        {`
                        @keyframes shake {
                            0%, 100% { transform: translateX(0); }
                            25% { transform: translateX(-12px); }
                            75% { transform: translateX(12px); }
                        }
                        .animate-shake { animation: shake 0.12s ease-in-out 0s 4; }
                        `}
                    </style>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
