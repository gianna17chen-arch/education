<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Masters - Pro Enterprise Edition</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .progress-bar { transition: width 0.3s ease-in-out; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #0891b2; border-radius: 10px; }
        .neon-glow { text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 selection:bg-cyan-900 overflow-x-hidden">
    <div id="root"></div>

    <!-- Firebase SDK (Strict Rule 1) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React App (Strict Rule 1 & 2) -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, memo } = React;

        // --- Icon Components (Guardrail: All defined) ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const BookOpen = (p) => <IconWrapper {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"/></IconWrapper>;
        const Sparkles = (p) => <IconWrapper {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></IconWrapper>;
        const MessageSquare = (p) => <IconWrapper {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></IconWrapper>;
        const ChevronRight = (p) => <IconWrapper {...p}><path d="m9 18 6-6-6-6"/></IconWrapper>;
        const ChevronLeft = (p) => <IconWrapper {...p}><path d="m15 18-6-6 6-6"/></IconWrapper>;
        const Home = (p) => <IconWrapper {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
        const Volume2 = (p) => <IconWrapper {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconWrapper>;
        const Loader2 = (p) => <IconWrapper {...p} className={`${p.className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconWrapper>;
        const DownloadCloud = (p) => <IconWrapper {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></IconWrapper>;
        const Star = (p) => <IconWrapper {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
        const Zap = (p) => <IconWrapper {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconWrapper>;

        // --- WordCard Component ---
        const WordCard = ({ item, db, appId, safeIdFn, onPlay, isSpeaking }) => {
            const [localImg, setLocalImg] = useState(null);

            useEffect(() => {
                const load = async () => {
                    if (!db) return;
                    const sid = safeIdFn(item.text);
                    const iRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'image_cache', sid);
                    try {
                        const iDoc = await window.FB.getDoc(iRef);
                        if (iDoc.exists()) setLocalImg(`data:image/jpeg;base64,${iDoc.data().imgBase64}`);
                    } catch (e) { console.error("Image load failure:", e); }
                };
                load();
            }, [db, item.text]);

            return (
                <div className="bg-slate-900 border-2 border-slate-800 p-6 rounded-[2rem] hover:border-cyan-500 transition-all group relative flex flex-col items-center">
                    <button 
                        onClick={() => onPlay(item.text, item.text)}
                        className={`absolute top-6 right-6 p-4 rounded-2xl shadow-lg transition-all ${isSpeaking === item.text ? 'bg-cyan-500 text-white animate-pulse' : 'bg-slate-800 text-cyan-400 hover:bg-slate-700'}`}
                    >
                        {isSpeaking === item.text ? <Loader2 size={32} /> : <Volume2 size={32} />}
                    </button>
                    <div className="w-full aspect-square bg-slate-950 rounded-2xl overflow-hidden mb-6 flex items-center justify-center border border-slate-800 shadow-inner">
                        {localImg ? (
                            <img src={localImg} alt={item.text} className="w-full h-full object-cover fade-in grayscale-[0.1] group-hover:grayscale-0 transition-all duration-500" />
                        ) : (
                            <span className="text-8xl opacity-10">{item.icon}</span>
                        )}
                    </div>
                    <div className={`text-5xl font-black mb-2 text-cyan-400 tracking-tighter`}>{item.text}</div>
                    <div className="text-2xl text-slate-500 font-bold">{item.trans}</div>
                    {localImg && <div className="mt-4 text-[10px] text-cyan-500/30 font-black tracking-widest uppercase text-center">Cloud Sync Ready</div>}
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeGroup, setActiveGroup] = useState(null);
            const [step, setStep] = useState(0);
            const [isSpeaking, setIsSpeaking] = useState(null);
            const [debugMsg, setDebugMsg] = useState("🚀 Initializing Silent Masters Engine...");
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [syncProgress, setSyncProgress] = useState(0);
            const [isSyncing, setIsSyncing] = useState(false);

            const apiKey = ""; 
            const appId = "phonics-silent-masters-v10-robust"; 
            
            const firebaseConfig = {
                apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
                authDomain: "education-b38d5.firebaseapp.com",
                projectId: "education-b38d5",
                storageBucket: "education-b38d5.firebasestorage.app",
                messagingSenderId: "450320441540",
                appId: "1:450320441540:web:888014b1380a473a142991",
                measurementId: "G-70DQ70W0B8"
            };

            const phonicsData = {
                kn: {
                    title: "Silent K (kn)",
                    rule: "當 k 出現在 n 前面時，k 不發音。你只需要發 /n/ 的音。",
                    ruleHint: "想像 k 躲在 n 的影子里休息了！",
                    words: [
                        { text: "Knee", trans: "膝蓋", icon: "🦵", prompt: "A 3D stylized human knee with joint highlight, cybernetic blue neon aesthetic, white background." },
                        { text: "Knife", trans: "小刀", icon: "🔪", prompt: "A sleek, sharp professional chef knife, metallic silver 3D render, isolated on white." },
                        { text: "Knight", trans: "騎士", icon: "🛡️", prompt: "A medieval knight in full shining silver armor with a blue cape, 3D game style." },
                        { text: "Knot", trans: "繩結", icon: "🪢", prompt: "A thick rope tied into a complex knot, 3D hyper-realistic texture, white background." }
                    ],
                    comparisons: [
                        { id: 'kn1', pair: "Night vs. Knight", sentence: "The brave knight fought in the dark night.", trans: "勇敢的騎士在黑夜中戰鬥。" },
                        { id: 'kn2', pair: "Not vs. Knot", sentence: "Do not tie a knot in the rope.", trans: "不要在繩子上打結。" }
                    ]
                },
                wr: {
                    title: "Silent W (wr)",
                    rule: "當 w 出現在 r 前面時，w 不發音。你只需要發 /r/ 的音。",
                    ruleHint: "w 碰到 r 會變得害羞，完全不敢說話。",
                    words: [
                        { text: "Write", trans: "寫字", icon: "✍️", prompt: "A glowing blue futuristic fountain pen writing on glass, 3D digital art, white background." },
                        { text: "Wrist", trans: "手腕", icon: "⌚", prompt: "A human wrist wearing a sleek modern smartwatch, glowing blue screen, 3D style." },
                        { text: "Wrong", trans: "錯誤", icon: "❌", prompt: "A large 3D glowing red X mark with neon lighting, glass texture, white background." },
                        { text: "Wrap", trans: "包裝", icon: "🎁", prompt: "A square gift box wrapped in metallic cyan paper with silver bow, 3D render." }
                    ],
                    comparisons: [
                        { id: 'wr1', pair: "Right vs. Write", sentence: "Use your right hand to write your name.", trans: "用你的右手寫下你的名字。" },
                        { id: 'wr2', pair: "Ring vs. Wring", sentence: "Don't wring the towel over your ring.", trans: "不要在你的戒指上方擰乾濕毛巾。" }
                    ]
                },
                mb: {
                    title: "Silent B (mb)",
                    rule: "當 b 出現在 m 後面且位於字尾時，b 通常不發音。",
                    ruleHint: "m 的聲音太大了，把後面的 b 蓋過去了。",
                    words: [
                        { text: "Lamb", trans: "小羊", icon: "🐑", prompt: "A cute fluffy little lamb standing on green grass, 3D claymation style, white background." },
                        { text: "Climb", trans: "攀爬", icon: "🧗", prompt: "A person climbing a steep neon mountain ridge, silhouette 3D style, white background." },
                        { text: "Comb", trans: "梳子", icon: "🪮", prompt: "A sleek black 3D hair comb with fine teeth, isolated on white, modern design." },
                        { text: "Thumb", trans: "拇指", icon: "👍", prompt: "A 3D human hand giving a thumbs-up sign, realistic skin texture, white background." }
                    ],
                    comparisons: [
                        { id: 'mb1', pair: "Lamb vs. Lamp", sentence: "The little lamb stood under the lamp.", trans: "小羊站在燈下。" },
                        { id: 'mb2', pair: "Climb vs. Lime", sentence: "Did you climb the tree to get a lime?", trans: "你爬上樹是為了採青檸嗎？" }
                    ]
                }
            };

            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        try {
                            const app = window.FB.initializeApp(firebaseConfig);
                            const auth = window.FB.getAuth(app);
                            const firestore = window.FB.getFirestore(app);
                            await window.FB.signInAnonymously(auth);
                            window.FB.onAuthStateChanged(auth, (u) => {
                                setUser(u);
                                setDb(firestore);
                                setDebugMsg(`✅ Connected: ${u?.uid.slice(0, 8)}`);
                            });
                        } catch (err) { setDebugMsg(`❌ FB Error: ${err.message}`); }
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            const safeId = (text) => btoa(unescape(encodeURIComponent(text.trim()))).replace(/[/+=]/g, '_');
            
            const pcmToWav = (pcmBase64) => {
                if (!pcmBase64 || pcmBase64.length < 100) return null;
                try {
                    const binary = window.atob(pcmBase64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    const buffer = new ArrayBuffer(44 + bytes.length);
                    const view = new DataView(buffer);
                    const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
                    
                    writeString(0, 'RIFF');
                    view.setUint32(4, 36 + bytes.length, true);
                    writeString(8, 'WAVE');
                    writeString(12, 'fmt ');
                    view.setUint32(16, 16, true);
                    view.setUint16(20, 1, true);
                    view.setUint16(22, 1, true);
                    view.setUint32(24, 24000, true); 
                    view.setUint32(28, 48000, true);
                    view.setUint16(32, 2, true);
                    view.setUint16(34, 16, true);
                    writeString(36, 'data');
                    view.setUint32(40, bytes.length, true);
                    new Uint8Array(buffer, 44).set(bytes);
                    return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
                } catch (e) { return null; }
            };

            const fetchAudio = async (text, retries = 3) => {
                const speechText = text.replace(/\/n\//g, "the n sound").replace(/\/r\//g, "the r sound").replace(/\/b\//g, "the b sound");
                const prompt = /[\u4e00-\u9fa5]/.test(text) ? `請用台灣口音朗讀：${speechText}` : `Say clearly: ${speechText}`;
                
                for (let i = 0; i < retries; i++) {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                            })
                        });

                        if (res.status === 401 || res.status === 403) throw new Error(`AUTH_ERROR_${res.status}`);
                        if (!res.ok) throw new Error(`HTTP_${res.status}`);
                        
                        const json = await res.json();
                        const data = json.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                        if (data) return data;
                        
                        if (i < retries - 1) await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                    } catch (e) {
                        if (e.message.includes('AUTH_ERROR')) throw e;
                        if (i === retries - 1) throw e;
                        await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                    }
                }
                throw new Error("AUDIO_TIMEOUT");
            };

            const fetchImage = async (prompt) => {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: { prompt }, parameters: { sampleCount: 1 } })
                });
                
                if (res.status === 401 || res.status === 403) throw new Error("IMAGE_AUTH_FAIL");
                if (!res.ok) throw new Error(`IMAGE_HTTP_${res.status}`);
                
                const json = await res.json();
                const data = json.predictions?.[0]?.bytesBase64Encoded;
                if (!data) throw new Error("IMAGE_EMPTY");
                return data;
            };

            const compressImage = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = `data:image/png;base64,${base64}`;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 512;
                        canvas.height = img.height * (512 / img.width);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                    };
                });
            };

            const oneClickSync = async () => {
                if (!db || isSyncing) return;
                setIsSyncing(true);
                setSyncProgress(0);
                setDebugMsg("🔄 Initializing Robust Pipeline...");
                
                const tasks = [];
                Object.values(phonicsData).forEach(g => {
                    tasks.push({ type: 'audio', text: g.rule });
                    g.words.forEach(w => tasks.push({ type: 'both', text: w.text, prompt: w.prompt }));
                    g.comparisons.forEach(c => tasks.push({ type: 'audio', text: c.sentence }));
                });

                let done = 0;
                for (const task of tasks) {
                    try {
                        const sid = safeId(task.text);
                        const aRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'audio_cache', sid);
                        const aDoc = await window.FB.getDoc(aRef);
                        
                        // Priority 1: Audio
                        if (!aDoc.exists() || (aDoc.data()?.audioBase64?.length || 0) < 100) {
                            setDebugMsg(`🎙️ Syncing Audio: ${task.text.slice(0, 10)}...`);
                            const b64 = await fetchAudio(task.text).catch(err => {
                                if (err.message.includes('AUTH')) throw err;
                                return null; // Skip non-auth audio errors to proceed
                            });
                            if (b64) await window.FB.setDoc(aRef, { audioBase64: b64, text: task.text });
                        }
                        
                        // Priority 2: Image (Resilient)
                        if (task.type === 'both') {
                            const iRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'image_cache', sid);
                            const iDoc = await window.FB.getDoc(iRef);
                            if (!iDoc.exists()) {
                                setDebugMsg(`🎨 Syncing Image: ${task.text}...`);
                                try {
                                    const raw = await fetchImage(task.prompt);
                                    const compressed = await compressImage(raw);
                                    await window.FB.setDoc(iRef, { imgBase64: compressed, text: task.text });
                                } catch (imgErr) {
                                    console.warn("Image sync skipped due to permissions/error:", imgErr.message);
                                    setDebugMsg(`⚠️ Image Skipped (401/Limit)`);
                                }
                            }
                        }
                        done++;
                        setSyncProgress(Math.floor((done / tasks.length) * 100));
                    } catch (e) { 
                        if (e.message.includes('AUTH')) {
                            setDebugMsg(`❌ Auth Fail: Please check API permissions.`);
                            break; 
                        }
                        setDebugMsg(`⚠️ Skipping task: ${e.message.slice(0, 15)}`);
                    }
                }
                setIsSyncing(false);
                setDebugMsg("✅ Cloud Sync Finished (Resilient Mode)");
            };

            const handlePlay = async (text, id) => {
                if (!db || isSpeaking) return;
                setIsSpeaking(id);
                const sid = safeId(text);
                const aRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'audio_cache', sid);
                try {
                    const aDoc = await window.FB.getDoc(aRef);
                    let audioData = (aDoc.exists() && (aDoc.data().audioBase64?.length || 0) > 100) ? aDoc.data().audioBase64 : await fetchAudio(text);
                    if (!aDoc.exists() && audioData) await window.FB.setDoc(aRef, { audioBase64: audioData, text });
                    
                    const url = pcmToWav(audioData);
                    const audio = new Audio(url);
                    audio.onended = () => { setIsSpeaking(null); URL.revokeObjectURL(url); };
                    audio.onerror = () => {
                        const u = new SpeechSynthesisUtterance(text);
                        u.lang = /[\u4e00-\u9fa5]/.test(text) ? 'zh-TW' : 'en-US';
                        u.onend = () => setIsSpeaking(null);
                        window.speechSynthesis.speak(u);
                    };
                    await audio.play();
                } catch (e) { 
                    setDebugMsg(`⚠️ Audio Fallback: ${e.message.slice(0, 15)}`); 
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = /[\u4e00-\u9fa5]/.test(text) ? 'zh-TW' : 'en-US';
                    u.onend = () => setIsSpeaking(null);
                    window.speechSynthesis.speak(u);
                }
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-8 space-y-12">
                    <div className="text-center space-y-6">
                        <div className="flex justify-center gap-4 mb-2 neon-glow">
                            <Zap className="text-cyan-400 animate-pulse" size={48} />
                            <Star className="text-blue-400 animate-bounce-slow" size={64} />
                            <Zap className="text-cyan-400 animate-pulse" size={48} />
                        </div>
                        <h1 className="text-6xl md:text-9xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 neon-glow uppercase">Silent Masters</h1>
                        <p className="text-xl md:text-3xl text-slate-400 font-bold tracking-widest uppercase">High Grade Phonics Mission</p>
                    </div>
                    <div className="w-full max-w-xl bg-slate-900 border-2 border-slate-800 p-8 rounded-[2rem] shadow-2xl space-y-4">
                        <button onClick={oneClickSync} disabled={isSyncing} className={`w-full py-6 rounded-2xl flex items-center justify-center gap-4 text-2xl font-black text-white transition-all shadow-lg ${isSyncing ? 'bg-slate-700' : 'bg-gradient-to-r from-cyan-600 to-blue-700 hover:scale-105 hover:shadow-cyan-500/20'}`}>
                            {isSyncing ? <Loader2 size={32} /> : <DownloadCloud size={32} />}
                            {isSyncing ? `${syncProgress}% Syncing...` : '一鍵同步語音與插圖'}
                        </button>
                        {isSyncing && <div className="w-full h-2 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-cyan-500 progress-bar" style={{width: `${syncProgress}%`}}></div></div>}
                        <p className="text-center text-[10px] text-slate-500 uppercase font-black tracking-widest leading-relaxed">
                            Resilient sync: if images fail (401), audio will still finish.
                        </p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl px-4 text-center">
                        {Object.entries(phonicsData).map(([key, data]) => (
                            <button key={key} onClick={() => { setActiveGroup(key); setStep(0); setCurrentPage('lesson'); }} className="group bg-slate-900 border-2 border-slate-800 p-12 rounded-[3rem] transition-all hover:border-cyan-500 hover:scale-105 shadow-xl">
                                <div className="text-8xl mb-6 opacity-80 group-hover:opacity-100 transition-opacity">
                                    {key === 'kn' ? '🤫' : key === 'wr' ? '📝' : '🐑'}
                                </div>
                                <div className="text-5xl font-black mb-2 text-cyan-400 uppercase tracking-tighter">{key}</div>
                                <div className="text-lg text-slate-500 font-bold uppercase tracking-widest italic">Start Lesson</div>
                            </button>
                        ))}
                    </div>
                </div>
            );

            const renderLesson = () => {
                const data = phonicsData[activeGroup];
                if (!data) return null;
                return (
                    <div className="flex flex-col min-h-screen pb-24">
                        <div className="flex items-center justify-between p-6 bg-slate-950/80 border-b border-slate-800 backdrop-blur-md sticky top-0 z-50">
                            <button onClick={() => setCurrentPage('home')} className="flex items-center gap-2 text-xl font-black text-cyan-500 hover:text-cyan-300 transition-all"><Home size={32} /> EXIT</button>
                            <div className="text-3xl font-black text-white uppercase tracking-tighter neon-glow">{data.title}</div>
                        </div>
                        <div className="flex-1 flex flex-col items-center justify-center p-6 overflow-y-auto">
                            <div className="w-full max-w-6xl bg-slate-900 border-2 border-slate-800 p-8 md:p-16 rounded-[3rem] shadow-3xl relative overflow-hidden text-center">
                                {step === 0 && (
                                    <div className="space-y-12 animate-in zoom-in duration-500">
                                        <div className="bg-cyan-500 inline-block p-8 rounded-full text-slate-950 shadow-[0_0_50px_rgba(6,182,212,0.5)]"><BookOpen size={80} /></div>
                                        <h2 className="text-6xl md:text-8xl font-black text-white uppercase tracking-tighter neon-glow">規則說明</h2>
                                        <div className="space-y-8">
                                            <p className="text-4xl md:text-6xl font-bold text-slate-200">{data.rule}</p>
                                            <div className="bg-slate-950/50 p-10 rounded-[2rem] border border-cyan-900/50 inline-block shadow-inner">
                                                <p className="text-3xl md:text-4xl text-cyan-400 italic font-bold">💡 {data.ruleHint}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => handlePlay(data.rule, 'rule')} className="mt-8 flex items-center gap-4 mx-auto px-12 py-6 bg-slate-800 hover:bg-cyan-900 rounded-3xl text-2xl font-black transition-all border border-cyan-500/30 text-cyan-400">
                                            <Volume2 size={32} /> LISTEN TO RULE
                                        </button>
                                    </div>
                                )}
                                {step === 1 && (
                                    <div className="animate-in slide-in-from-right space-y-12 w-full">
                                        <h2 className="text-5xl md:text-7xl font-black text-white flex items-center justify-center gap-6"><Star size={64} className="text-cyan-500" /> MASTER WORDS</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 md:gap-12">
                                            {data.words.map((item, idx) => (
                                                <WordCard key={idx} item={item} db={db} appId={appId} safeIdFn={safeId} onPlay={handlePlay} isSpeaking={isSpeaking} />
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {step === 2 && (
                                    <div className="animate-in slide-in-from-bottom space-y-12 w-full">
                                        <h2 className="text-5xl md:text-7xl font-black text-white flex items-center justify-center gap-6"><MessageSquare size={64} className="text-cyan-500" /> MISSION TRAINING</h2>
                                        <div className="space-y-8">
                                            {data.comparisons.map((item, idx) => (
                                                <div key={idx} className="bg-slate-950/50 p-10 rounded-[3rem] border-2 border-slate-800 shadow-2xl relative group flex flex-col md:flex-row items-center gap-8 hover:border-cyan-500 transition-all">
                                                    <div className="flex-1 text-center md:text-left">
                                                        <div className="text-2xl font-black mb-4 uppercase tracking-widest text-cyan-500 underline decoration-cyan-500 decoration-4 underline-offset-8">{item.pair}</div>
                                                        <p className="text-4xl md:text-5xl font-black leading-snug mb-4 text-white">
                                                            {item.sentence.split(' ').map((word, i) => {
                                                                const targets = ['knee', 'knife', 'knight', 'knot', 'write', 'wrist', 'wrong', 'wrap', 'lamb', 'climb', 'comb', 'thumb'];
                                                                const isT = targets.includes(word.toLowerCase().replace(/[^a-z]/g, ''));
                                                                return <span key={i} className={isT ? "text-cyan-400 underline underline-offset-8 mx-1" : "mx-1"}>{word}</span>;
                                                            })}
                                                        </p>
                                                        <p className="text-2xl text-slate-500 font-bold italic">{item.trans}</p>
                                                    </div>
                                                    <button onClick={() => handlePlay(item.sentence, item.id)} className={`p-8 rounded-3xl transition-all shadow-2xl active:scale-95 ${isSpeaking === item.id ? 'bg-cyan-500 text-slate-950 animate-pulse' : 'bg-slate-800 text-cyan-400 hover:bg-slate-700'}`}>
                                                        {isSpeaking === item.id ? <Loader2 size={48} /> : <Volume2 size={48} />}
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="p-6 flex justify-between fixed bottom-12 w-full left-0 z-40 bg-slate-950/80 backdrop-blur-md border-t border-slate-800">
                            <button onClick={() => step > 0 ? setStep(step - 1) : setCurrentPage('home')} className="px-12 py-6 bg-slate-900 border-2 border-slate-800 rounded-3xl text-2xl font-black text-cyan-500 shadow-xl flex items-center gap-3 active:scale-95 transition-all hover:bg-slate-800"><ChevronLeft size={40} /> PREV</button>
                            <button onClick={() => step < 2 ? setStep(step + 1) : setCurrentPage('home')} className="px-16 py-6 bg-gradient-to-r from-cyan-600 to-blue-700 rounded-3xl text-2xl font-black text-white shadow-xl flex items-center gap-3 active:scale-95 transition-all">{step === 2 ? "FINISH" : "NEXT"} <ChevronRight size={40} /></button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    {currentPage === 'home' ? renderHome() : renderLesson()}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900/90 text-cyan-400 px-4 py-2 text-xs font-mono flex items-center justify-between z-[9999] border-t border-cyan-900/50 backdrop-blur-sm">
                        <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span> {debugMsg}</div>
                        <div className="text-xs opacity-50 uppercase tracking-tighter">Enterprise Mode V10 | AppID: {appId}</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
