<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學四年級：活力單字學習營</title>
    <!-- CDN 載入 React, Babel, Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Quicksand:wght@500;700&display=swap');
        
        body {
            font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
            background-color: #fef3c7; /* 淺黃色背景 */
            background-image: radial-gradient(#fbbf24 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .wood-texture {
            background-color: #92400e;
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100% 4px;
            border: 4px solid #78350f;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-sunny {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            transition: all 0.2s;
        }
        
        .btn-sunny:hover {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            transform: scale(1.05);
        }

        .debug-bar {
            background: rgba(0, 0, 0, 0.8);
            color: #10b981;
            font-family: monospace;
            font-size: 12px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK 載入 (核心規則：必須在 root 之後、Babel 之前) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // 掛載到全局 window.FB
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React 邏輯 -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        const appId = "vocab-explorer-g4-v1";

        // 資料定義
        const VOCABULARY = [
            { id: 'v1', word: 'desk', chinese: '書桌', icon: '📖' },
            { id: 'v2', word: 'chair', chinese: '椅子', icon: '🪑' },
            { id: 'v3', word: 'in', chinese: '在...裡面', icon: '📥' },
            { id: 'v4', word: 'on', chinese: '在...上面', icon: '🔝' },
            { id: 'v5', word: 'under', chinese: '在...下面', icon: '⬇️' },
            { id: 'v6', word: 'yo-yos', chinese: '溜溜球', icon: '🪀' },
            { id: 'v7', word: 'kites', chinese: '風箏', icon: '🪁' },
            { id: 'v8', word: 'dolls', chinese: '洋娃娃', icon: '🎎' },
            { id: 'v9', word: 'balls', chinese: '球', icon: '⚽' },
            { id: 'v10', word: 'robots', chinese: '機器人', icon: '🤖' }
        ];

        const SENTENCES = [
            { id: 's1', eng: "Where's the kite?", chi: "風箏在哪裡？" },
            { id: 's2', eng: "It's in the box.", chi: "它在盒子裡。" },
            { id: 's3', eng: "Where are the dolls?", chi: "洋娃娃在哪裡？" },
            { id: 's4', eng: "They're on the chair.", chi: "它們在椅子上。" }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('words'); // words, sentences, quiz
            const [debugMsg, setDebugMsg] = useState('系統啟動中...');
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [cacheStatus, setCacheStatus] = useState({}); // { [safeId]: boolean }
            const [loadingId, setLoadingId] = useState(null);
            
            // 測驗狀態
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [quizFinished, setQuizFinished] = useState(false);

            // 下載進度狀態
            const [downloadProgress, setDownloadProgress] = useState({ total: 0, current: 0, downloading: false });

            // 1. Firebase 初始化
            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.FB) {
                        clearInterval(timer);
                        try {
                            const app = window.FB.initializeApp(firebaseConfig);
                            const _db = window.FB.getFirestore(app);
                            const auth = window.FB.getAuth(app);
                            setDb(_db);
                            
                            window.FB.signInAnonymously(auth)
                                .then(cred => {
                                    setUser(cred.user);
                                    setDebugMsg(`✅ 連線成功 (UID: ${cred.user.uid.substring(0,8)}...)`);
                                })
                                .catch(err => setDebugMsg(`❌ 登入失敗: ${err.message}`));
                        } catch (e) {
                            setDebugMsg(`❌ 初始化錯誤: ${e.message}`);
                        }
                    }
                }, 500);
                return () => clearInterval(timer);
            }, []);

            // 2. Safe ID 與 雲端快取邏輯
            const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/[/+=]/g, '_');

            const handleDownloadAll = async () => {
                if (!db || !user) {
                    setDebugMsg("⌛ 系統尚未就緒，請稍候...");
                    return;
                }

                // 收集所有需要發音的文本 (單字 + 例句)
                const allTexts = [
                    ...VOCABULARY.map(v => v.word),
                    ...SENTENCES.map(s => s.eng)
                ];

                setDownloadProgress({ total: allTexts.length, current: 0, downloading: true });

                let currentCount = 0;
                for (const text of allTexts) {
                    const safeId = getSafeId(text);
                    
                    // 如果本地狀態已經顯示快取存在，則跳過
                    if (cacheStatus[text]) {
                        currentCount++;
                        setDownloadProgress(prev => ({ ...prev, current: currentCount }));
                        continue;
                    }

                    setLoadingId(text);
                    setDebugMsg(`📥 正在同步: ${text}...`);

                    try {
                        const cacheRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'speech_cache', safeId);
                        const cacheSnap = await window.FB.getDoc(cacheRef);

                        if (cacheSnap.exists()) {
                            setCacheStatus(prev => ({ ...prev, [text]: true }));
                        } else {
                            // 若無快取，寫入 Firebase 進行模擬生成/儲存
                            await window.FB.setDoc(cacheRef, {
                                text,
                                createdAt: new Date().toISOString(),
                                type: 'audio_meta'
                            });
                            setCacheStatus(prev => ({ ...prev, [text]: true }));
                            // 加入短暫延遲，避免寫入過快觸發節流限制
                            await new Promise(resolve => setTimeout(resolve, 300));
                        }
                    } catch (err) {
                        setDebugMsg(`❌ 同步錯誤 (${text}): ${err.message}`);
                    }

                    currentCount++;
                    setDownloadProgress(prev => ({ ...prev, current: currentCount }));
                }

                setLoadingId(null);
                setDownloadProgress(prev => ({ ...prev, downloading: false }));
                setDebugMsg("✅ 所有語音資料已成功同步至雲端！");
            };

            const handleSpeech = async (text) => {
                if (!db || !user) {
                    setDebugMsg("⌛ 系統尚未就緒，請稍候...");
                    return;
                }

                const safeId = getSafeId(text);
                setLoadingId(text);
                setDebugMsg(`🔍 檢查快取: ${text}...`);

                try {
                    // 快取讀取優先邏輯
                    const cacheRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'speech_cache', safeId);
                    const cacheSnap = await window.FB.getDoc(cacheRef);

                    if (cacheSnap.exists()) {
                        setDebugMsg(`✅ 快取命中: ${text}`);
                        setCacheStatus(prev => ({ ...prev, [text]: true }));
                        // 此處模擬語音播放 (若有真實語音生成 API 可整合於此)
                        const synth = window.speechSynthesis;
                        const utter = new SpeechSynthesisUtterance(text);
                        utter.lang = 'en-US';
                        synth.speak(utter);
                    } else {
                        setDebugMsg(`⚠️ 快取不存在，正在模擬生成並儲存...`);
                        // 模擬 API 節流與快取儲存
                        await window.FB.setDoc(cacheRef, {
                            text,
                            createdAt: new Date().toISOString(),
                            type: 'audio_meta'
                        });
                        setCacheStatus(prev => ({ ...prev, [text]: true }));
                        const synth = window.speechSynthesis;
                        const utter = new SpeechSynthesisUtterance(text);
                        utter.lang = 'en-US';
                        synth.speak(utter);
                    }
                } catch (err) {
                    setDebugMsg(`❌ 讀寫錯誤: ${err.message}`);
                } finally {
                    setLoadingId(null);
                }
            };

            // 3. UI 元件
            const TabButton = ({ id, label, icon }) => (
                <button 
                    onClick={() => { setActiveTab(id); setQuizFinished(false); setQuizIndex(0); setScore(0); }}
                    className={`flex-1 py-4 px-2 text-lg font-bold flex items-center justify-center gap-2 transition-all ${activeTab === id ? 'bg-amber-100 text-amber-900 border-b-4 border-amber-600' : 'bg-white text-gray-500'}`}
                >
                    <span>{icon}</span>{label}
                </button>
            );

            // 測驗隨機選題
            const currentQuiz = useMemo(() => {
                const question = VOCABULARY[quizIndex % VOCABULARY.length];
                const options = [question.chinese];
                while(options.length < 3) {
                    const randomWord = VOCABULARY[Math.floor(Math.random() * VOCABULARY.length)].chinese;
                    if(!options.includes(randomWord)) options.push(randomWord);
                }
                return { question: question.word, answer: question.chinese, options: options.sort(() => Math.random() - 0.5) };
            }, [quizIndex]);

            return (
                <div className="max-w-4xl mx-auto pb-20 pt-4 px-4 min-h-screen">
                    {/* Header */}
                    <div className="wood-texture rounded-t-3xl p-6 text-center text-white mb-0">
                        <h1 className="text-3xl font-bold tracking-wider mb-2">🌳 英語活力學習營 🌳</h1>
                        <p className="opacity-90">小學四年級 · 基礎單字與句型練習</p>
                        
                        {/* 一鍵下載/同步按鈕 */}
                        <div className="mt-4 flex justify-center items-center flex-col h-12">
                            {!downloadProgress.downloading ? (
                                <button 
                                    onClick={handleDownloadAll}
                                    className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded-full text-sm font-bold transition-all border-2 border-emerald-800 shadow-sm hover:scale-105"
                                >
                                    <span>☁️</span> 一鍵雲端同步所有語音
                                </button>
                            ) : (
                                <div className="w-64 max-w-full">
                                    <div className="text-sm mb-1 flex justify-between font-bold text-emerald-100">
                                        <span>同步中...</span>
                                        <span>{Math.round((downloadProgress.current / downloadProgress.total) * 100)}%</span>
                                    </div>
                                    <div className="w-full bg-emerald-900 rounded-full h-2.5 border border-emerald-800">
                                        <div className="bg-emerald-400 h-2.5 rounded-full transition-all duration-300" style={{ width: `${(downloadProgress.current / downloadProgress.total) * 100}%` }}></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Navigation */}
                    <div className="flex bg-white shadow-md mb-6 rounded-b-xl overflow-hidden">
                        <TabButton id="words" label="單字牆" icon="🗂️" />
                        <TabButton id="sentences" label="練習句" icon="💬" />
                        <TabButton id="quiz" label="挑戰賽" icon="🏆" />
                    </div>

                    {/* Content Area */}
                    <div className="bg-white/80 backdrop-blur-sm rounded-2xl p-6 shadow-inner min-h-[400px]">
                        
                        {/* Tab: Words */}
                        {activeTab === 'words' && (
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                {VOCABULARY.map(v => (
                                    <div key={v.word} className="bg-white border-2 border-amber-200 rounded-xl p-4 text-center card-hover transition-all cursor-pointer relative" onClick={() => handleSpeech(v.word)}>
                                        <div className="text-4xl mb-2">{v.icon}</div>
                                        <div className="text-xl font-bold text-amber-900 lowercase">{v.word}</div>
                                        <div className="text-gray-500 text-sm">{v.chinese}</div>
                                        <div className="absolute top-2 right-2 text-xs">
                                            {loadingId === v.word ? '⌛' : (cacheStatus[v.word] ? '✅' : '🔊')}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Tab: Sentences */}
                        {activeTab === 'sentences' && (
                            <div className="space-y-4">
                                {SENTENCES.map(s => (
                                    <div key={s.id} className="bg-white border-l-8 border-orange-400 p-5 rounded-r-xl shadow-sm flex justify-between items-center group hover:bg-orange-50 transition-colors">
                                        <div>
                                            <div className="text-2xl font-bold text-gray-800 mb-1">{s.eng}</div>
                                            <div className="text-gray-500">{s.chi}</div>
                                        </div>
                                        <button 
                                            onClick={() => handleSpeech(s.eng)}
                                            className="w-12 h-12 rounded-full btn-sunny flex items-center justify-center text-xl"
                                        >
                                            {loadingId === s.eng ? '⌛' : '🔊'}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Tab: Quiz */}
                        {activeTab === 'quiz' && (
                            <div className="flex flex-col items-center justify-center py-8">
                                {!quizFinished ? (
                                    <div className="w-full max-w-md">
                                        <div className="text-center mb-8">
                                            <div className="text-sm font-bold text-orange-500 uppercase tracking-widest mb-2">Question {quizIndex + 1} of 5</div>
                                            <div className="text-5xl font-bold text-gray-800 p-8 bg-amber-50 rounded-3xl border-4 border-dashed border-amber-200">
                                                {currentQuiz.question}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 gap-4">
                                            {currentQuiz.options.map((opt, i) => (
                                                <button 
                                                    key={i}
                                                    onClick={() => {
                                                        if(opt === currentQuiz.answer) setScore(s => s + 20);
                                                        if(quizIndex < 4) {
                                                            setQuizIndex(i => i + 1);
                                                        } else {
                                                            setQuizFinished(true);
                                                        }
                                                    }}
                                                    className="w-full p-4 text-xl font-bold bg-white border-2 border-amber-200 rounded-2xl hover:bg-amber-500 hover:text-white hover:border-amber-500 transition-all"
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center animate-bounce">
                                        <div className="text-6xl mb-4">🥳</div>
                                        <h2 className="text-4xl font-bold text-amber-900 mb-2">挑戰完成!</h2>
                                        <p className="text-2xl text-orange-600 mb-6">總得分：{score} 分</p>
                                        <button 
                                            onClick={() => { setQuizIndex(0); setScore(0); setQuizFinished(false); }}
                                            className="px-8 py-3 btn-sunny rounded-full font-bold text-xl"
                                        >
                                            再玩一次
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Footer / DebugBar */}
                    <div className="fixed bottom-0 left-0 w-full debug-bar p-2 flex justify-between items-center border-t border-emerald-900/50">
                        <div className="truncate flex items-center gap-2">
                            <span className="bg-emerald-900 px-2 py-0.5 rounded text-[10px] text-white">SYSTEM</span>
                            {debugMsg}
                        </div>
                        <div className="text-[10px] opacity-50 px-2">
                            APP_ID: {appId}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
