<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海賊王：職業句型大挑戰 - Tr. Mimi 專屬版</title>
    <!-- CDN 載入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .parchment { background-color: #f5e6be; background-image: radial-gradient(#f5e6be 70%, #e2d1a3 100%); }
        .one-piece-blue { background-color: #01579b; }
        .debug-bar { height: 30px; font-size: 12px; z-index: 9999; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="one-piece-blue min-h-screen flex items-center justify-center p-4">

    <div id="root"></div>

    <!-- Firebase SDK 核心載入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // 掛載到 window.FB
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, getDoc, setDoc, collection, onSnapshot };
    </script>

    <!-- React 邏輯 -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        const APP_ID = "one-piece-vocab-challenge-mimi";
        const API_KEY = ""; // 核心規則：保持為空字串，環境會自動注入

        function App() {
            const [isReady, setIsReady] = useState(false);
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [debugMsg, setDebugMsg] = useState("⌛ 正在連線至海軍本部 (Firebase)...");
            const [view, setView] = useState('home');
            const [currentStep, setCurrentStep] = useState(0);
            const [learned, setLearned] = useState(new Set());
            const [displayWord, setDisplayWord] = useState(null);
            const [scrambleResult, setScrambleResult] = useState([]);
            const [dictInput, setDictInput] = useState("");
            const [cacheStatus, setCacheStatus] = useState({});

            // Firebase 初始化與容錯登入
            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        try {
                            const app = window.FB.initializeApp(firebaseConfig);
                            const auth = window.FB.getAuth(app);
                            const firestore = window.FB.getFirestore(app);
                            setDb(firestore);

                            const performAuth = async () => {
                                try {
                                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                        setDebugMsg("⌛ 嘗試 Custom Token 登入...");
                                        await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                                    } else {
                                        await window.FB.signInAnonymously(auth);
                                    }
                                } catch (authErr) {
                                    console.warn("Auth Failover:", authErr.message);
                                    setDebugMsg("⚠️ Token 不匹配，切換至匿名模式...");
                                    await window.FB.signInAnonymously(auth);
                                }
                            };

                            await performAuth();

                            window.FB.onAuthStateChanged(auth, (u) => {
                                if (u) {
                                    setUser(u);
                                    setIsReady(true);
                                    setDebugMsg(`✅ 航道已開啟 | UID: ${u.uid}`);
                                }
                            });
                        } catch (err) {
                            setDebugMsg(`❌ 連線失敗: ${err.message}`);
                        }
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            // 輔助工具：Safe ID 編碼
            const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/[/+=]/g, '_');

            // 輔助工具：PCM to WAV 轉換
            const pcmToWav = (pcmBase64, sampleRate) => {
                const pcmData = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0));
                const header = new ArrayBuffer(44);
                const view = new DataView(header);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + pcmData.length, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); // PCM
                view.setUint16(22, 1, true); // Mono
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, pcmData.length, true);
                const blob = new Blob([header, pcmData], { type: 'audio/wav' });
                return URL.createObjectURL(blob);
            };

            // API 呼叫 (帶指數退避重試)
            const callTtsApiWithRetry = async (text, retries = 5) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${API_KEY}`, {
                            method: 'POST',
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Say clearly: ${text}` }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                                },
                                model: "gemini-2.5-flash-preview-tts"
                            })
                        });
                        if (response.ok) return await response.json();
                    } catch (e) {
                        if (i === retries - 1) throw e;
                    }
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            };

            // 雲端快取與語音播報
            const speakWithCache = async (text) => {
                if (!isReady || !db) return;
                const safeId = getSafeId(text);
                const cachePath = window.FB.doc(db, 'artifacts', APP_ID, 'public', 'data', 'speech_cache', safeId);
                
                try {
                    const cacheDoc = await window.FB.getDoc(cachePath);
                    if (cacheDoc.exists()) {
                        setDebugMsg(`✅ 雲端快取命中: ${text.substring(0, 15)}...`);
                        const { audioData, sampleRate } = cacheDoc.data();
                        const audioUrl = pcmToWav(audioData, sampleRate);
                        new Audio(audioUrl).play();
                        setCacheStatus(prev => ({...prev, [text]: 'cached'}));
                        return;
                    }

                    // 移除 !API_KEY 檢查，因為環境會自動處理
                    setDebugMsg(`⌛ 正在生成新語音 (Gemini)...`);
                    const result = await callTtsApiWithRetry(text);
                    const inlineData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                    
                    if (!inlineData) {
                        setDebugMsg("❌ 語音生成失敗");
                        return;
                    }

                    const sampleRate = parseInt(inlineData.mimeType.match(/rate=(\d+)/)?.[1] || "24000");
                    const audioData = inlineData.data;

                    // 存入雲端快取
                    await window.FB.setDoc(cachePath, { audioData, sampleRate, text, createdAt: Date.now() });
                    setDebugMsg(`✅ 語音已存入雲端快取`);

                    const audioUrl = pcmToWav(audioData, sampleRate);
                    new Audio(audioUrl).play();
                    setCacheStatus(prev => ({...prev, [text]: 'cached'}));

                } catch (err) {
                    setDebugMsg(`❌ 語音錯誤: ${err.message}`);
                }
            };

            const gameSteps = [
                {
                    type: 'map',
                    title: 'Clue 1: 尋找航道',
                    question: '點擊世界地圖上的「the USA (美國)」！',
                    markers: [{ n: 'USA', x: '18%', y: '35%' }, { n: 'Spain', x: '46%', y: '34%' }, { n: 'Taiwan', x: '83%', y: '45%' }],
                    correct: 'USA'
                },
                {
                    type: 'dialogue',
                    char: '魯夫 (Luffy)',
                    q: 'What do you want to be?',
                    ans: 'I want to be a police officer.',
                    hint: '👮 Police Officer',
                    options: ['I want to be a police officer.', 'I want to be a farmer.', 'I want to be a singer.']
                },
                {
                    type: 'dialogue',
                    char: '索隆 (Zoro)',
                    q: 'Do you want to be a writer?',
                    ans: 'Yes, I do.',
                    hint: '✍️ Writer',
                    options: ['Yes, I do.', "No, I don't. I want to be a dentist."]
                },
                {
                    type: 'dialogue',
                    char: '香吉士 (Sanji)',
                    q: 'Do you want to be a bus driver?',
                    ans: "No, I don't. I want to be a basketball player.",
                    hint: '🏀 Basketball Player',
                    options: ['Yes, I do.', "No, I don't. I want to be a basketball player."]
                },
                {
                    type: 'dialogue',
                    char: '羅賓 (Robin)',
                    q: 'What do you want to be?',
                    ans: 'I want to be a singer.',
                    hint: '🎤 Singer',
                    options: ['I want to be a singer.', 'I want to be an artist.', 'I want to be a bus driver.']
                },
                {
                    type: 'dialogue',
                    char: '喬巴 (Chopper)',
                    q: 'Do you want to be a farmer?',
                    ans: 'Yes, I do.',
                    hint: '👩‍🌾 Farmer',
                    options: ['Yes, I do.', "No, I don't. I want to be a writer."]
                },
                {
                    type: 'scramble',
                    char: '娜美 (Nami)',
                    q: '請幫我拼出正確回答：',
                    words: ['I', 'want', 'to', 'be', 'a', 'writer.'],
                    correct: 'I want to be a writer.'
                },
                {
                    type: 'scramble',
                    char: '烏索普 (Usopp)',
                    q: '請幫我拼出正確回答：',
                    words: ['Do', 'you', 'want', 'to', 'be', 'a', 'singer?'],
                    correct: 'Do you want to be a singer?'
                },
                {
                    type: 'dictation',
                    char: '布魯克 (Brook)',
                    q: '聽聽布魯克想要成為什麼職業？請輸入答案：',
                    voice: 'I want to be a bus driver.',
                    correct: 'bus driver'
                }
            ];

            const handleNext = () => {
                if (currentStep < gameSteps.length - 1) {
                    setCurrentStep(s => s + 1);
                    setScrambleResult([]);
                    setDictInput("");
                } else {
                    setView('success');
                }
            };

            const renderView = () => {
                switch(view) {
                    case 'home':
                        return (
                            <div className="flex flex-col items-center animate-fadeIn">
                                <h1 className="text-4xl font-bold text-amber-900 mb-8">⚓ 職業句型大挑戰 ⚓</h1>
                                <div className="text-8xl mb-8">🚢</div>
                                <p className="text-xl text-amber-800 mb-8 px-4 text-center">Tr. Mimi, Ready to set sail for the Grand Line?</p>
                                <button onClick={() => setView('learning')} className="bg-orange-500 hover:bg-orange-600 text-white px-10 py-4 rounded-full text-2xl font-bold shadow-lg transition-all transform hover:scale-110">
                                    進入練習室
                                </button>
                            </div>
                        );
                    case 'learning':
                        const vocabs = [
                            {w: 'police officer', i: '👮'}, {w: 'basketball player', i: '🏀'},
                            {w: 'artist', i: '🎨'}, {w: 'dentist', i: '🦷'},
                            {w: 'bus driver', i: '🚌'}, {w: 'farmer', i: '👩‍🌾'},
                            {w: 'singer', i: '🎤'}, {w: 'writer', i: '✍️'}
                        ];
                        return (
                            <div className="animate-fadeIn w-full">
                                <h2 className="text-3xl font-bold text-amber-900 mb-6">📦 職業對話練習</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                    {vocabs.map(v => (
                                        <div key={v.w} onClick={() => {
                                            setDisplayWord(v);
                                            speakWithCache(`${v.w}. I want to be a ${v.w}.`);
                                            setLearned(prev => new Set(prev).add(v.w));
                                        }} className="chest p-4 parchment border-2 border-dashed border-amber-900 rounded-xl cursor-pointer hover:bg-amber-100 flex flex-col items-center group relative">
                                            <span className="text-3xl group-hover:scale-125 transition-transform">📦</span>
                                            <span className="text-[10px] font-bold mt-1 uppercase text-center leading-tight">{v.w}</span>
                                            {cacheStatus[v.w] === 'cached' && <span className="absolute top-1 right-1 text-[10px] text-green-600">✅</span>}
                                        </div>
                                    ))}
                                </div>
                                {displayWord && (
                                    <div className="bg-white p-6 rounded-2xl shadow-inner mb-8 text-center border-2 border-amber-200 animate-fadeIn">
                                        <div className="text-6xl mb-4">{displayWord.i}</div>
                                        <div className="text-3xl font-bold text-blue-800 mb-2 uppercase">{displayWord.w}</div>
                                        <div className="text-xl italic text-amber-700">"I want to be a {displayWord.w}."</div>
                                    </div>
                                )}
                                <div className="flex justify-center">
                                    <button onClick={() => setView('game')} className="bg-stone-700 text-white px-10 py-3 rounded-full font-bold hover:bg-stone-800 transition-colors shadow-lg">
                                        準備好了，開始冒險！
                                    </button>
                                </div>
                            </div>
                        );
                    case 'game':
                        const step = gameSteps[currentStep];
                        return (
                            <div className="w-full animate-fadeIn">
                                <div className="flex justify-between items-center mb-6 border-b-2 border-amber-900 pb-2">
                                    <span className="font-bold text-amber-900 text-lg uppercase tracking-wider">{step.title || `考驗 ${currentStep + 1}`}</span>
                                    <span className="text-amber-800 font-bold">{currentStep + 1} / {gameSteps.length}</span>
                                </div>
                                {renderGameContent(step)}
                            </div>
                        );
                    case 'success':
                        return (
                            <div className="flex flex-col items-center text-center py-10 animate-fadeIn">
                                <h1 className="text-4xl font-bold text-amber-900 mb-6">✨ 恭喜完成冒險！ ✨</h1>
                                <div className="text-9xl mb-8">🦁</div>
                                <p className="text-xl mb-10 text-amber-800">你已經成為偉大航道的英文大師！</p>
                                <button onClick={() => window.location.reload()} className="bg-orange-500 text-white px-10 py-4 rounded-full text-xl font-bold shadow-xl hover:bg-orange-600 transition-all">重新啟航</button>
                            </div>
                        );
                }
            };

            const renderGameContent = (step) => {
                if (step.type === 'map') {
                    return (
                        <div className="flex flex-col items-center">
                            <p className="text-lg mb-4 font-bold text-amber-900">{step.question}</p>
                            <div className="map-container relative w-full rounded-xl overflow-hidden shadow-lg h-[350px] bg-sky-200 border-4 border-amber-900">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/World_Map_Blank.svg/1200px-World_Map_Blank.svg.png" className="w-full h-full object-cover opacity-60" />
                                {step.markers.map(m => (
                                    <div key={m.n} onClick={() => {
                                        if(m.n === step.correct) {
                                            setDebugMsg("✅ Correct! To the USA!");
                                            handleNext();
                                        } else {
                                            setDebugMsg(`❌ That's ${m.n}, try again!`);
                                        }
                                    }} style={{left: m.x, top: m.y}} className="map-marker absolute cursor-pointer hover:scale-125 transition-transform z-10">
                                        <div className="bg-orange-500 w-8 h-8 rounded-full flex items-center justify-center text-white text-xs rotate-45 border-2 border-white shadow-md"><span>?</span></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                
                if (step.type === 'dialogue') {
                    return (
                        <div className="bg-white p-8 rounded-3xl shadow-lg border-4 border-amber-900 relative">
                            <div className="absolute -top-4 left-6 bg-yellow-400 px-4 py-1 rounded-lg font-bold border-2 border-amber-900 text-amber-900 shadow-sm">{step.char}</div>
                            <div className="flex justify-between items-center mb-6 pt-2">
                                <button onClick={() => speakWithCache(`${step.q}. ${step.ans}`)} className="bg-stone-100 px-4 py-2 rounded-lg border border-stone-300 hover:bg-stone-200 transition-colors flex items-center gap-2">
                                    <span>🔊</span> 聽題目與提示
                                </button>
                            </div>
                            <p className="text-2xl font-bold text-amber-900 mb-6">"{step.q}"</p>
                            <div className="bg-amber-50 p-6 rounded-xl border-2 border-dashed border-amber-200 mb-8 text-4xl text-center">
                                {step.hint}
                            </div>
                            <div className="grid gap-3">
                                {step.options.map(opt => (
                                    <button key={opt} onClick={() => {
                                        if(opt === step.ans) {
                                            speakWithCache(opt);
                                            setDebugMsg("✅ Correct Answer!");
                                            handleNext();
                                        } else {
                                            setDebugMsg("❌ Try again, pirate!");
                                        }
                                    }} className="w-full text-left p-4 rounded-xl border-2 border-amber-900 hover:bg-yellow-50 font-bold text-amber-900 transition-all active:translate-y-1">
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                }

                if (step.type === 'scramble') {
                    return (
                        <div className="bg-white p-8 rounded-3xl shadow-lg border-4 border-amber-900 relative">
                            <div className="absolute -top-4 left-6 bg-yellow-400 px-4 py-1 rounded-lg font-bold border-2 border-amber-900 text-amber-900">{step.char}</div>
                            <p className="text-xl font-bold text-amber-900 mb-4">{step.q}</p>
                            <div className="bg-amber-50 min-h-[70px] p-4 rounded-xl mb-6 flex flex-wrap gap-2 border-2 border-amber-200 shadow-inner">
                                {scrambleResult.map((w, i) => (
                                    <span key={i} className="text-2xl font-bold text-blue-800 bg-white px-3 py-1 rounded border border-blue-200">{w}</span>
                                ))}
                            </div>
                            <div className="flex flex-wrap gap-2 justify-center mb-8">
                                {step.words.map(w => (
                                    <button key={w} 
                                        disabled={scrambleResult.includes(w)}
                                        onClick={() => setScrambleResult([...scrambleResult, w])} 
                                        className={`px-4 py-2 rounded-lg font-bold transition-all ${scrambleResult.includes(w) ? 'bg-stone-200 text-stone-400 opacity-50' : 'bg-amber-900 text-white hover:bg-amber-700 shadow-md'}`}>
                                        {w}
                                    </button>
                                ))}
                            </div>
                            <div className="flex justify-center gap-4">
                                <button onClick={() => {
                                    if(scrambleResult.join(' ') === step.correct) {
                                        speakWithCache(step.correct);
                                        handleNext();
                                    } else {
                                        setDebugMsg("❌ Order is wrong!");
                                    }
                                }} className="bg-green-600 text-white px-8 py-2 rounded-full font-bold shadow-lg hover:bg-green-700">檢查句子</button>
                                <button onClick={() => setScrambleResult([])} className="bg-stone-400 text-white px-8 py-2 rounded-full font-bold shadow-lg hover:bg-stone-500">重設</button>
                            </div>
                        </div>
                    );
                }

                if (step.type === 'dictation') {
                    return (
                        <div className="bg-white p-8 rounded-3xl shadow-lg border-4 border-amber-900 relative">
                            <div className="absolute -top-4 left-6 bg-yellow-400 px-4 py-1 rounded-lg font-bold border-2 border-amber-900 text-amber-900">{step.char}</div>
                            <p className="text-xl font-bold text-amber-900 mb-6">{step.q}</p>
                            <div className="flex justify-center mb-10">
                                <button onClick={() => speakWithCache(step.voice)} className="text-7xl p-8 bg-amber-100 rounded-full hover:scale-110 transition-transform shadow-inner border border-amber-200">🔊</button>
                            </div>
                            <input 
                                type="text" 
                                value={dictInput}
                                onChange={(e) => setDictInput(e.target.value)}
                                className="w-full p-4 border-4 border-amber-900 rounded-xl text-center text-3xl mb-8 focus:outline-none focus:ring-4 focus:ring-yellow-200"
                                placeholder="聽聽看，寫下來..."
                            />
                            <div className="flex justify-center">
                                <button onClick={() => {
                                    const input = dictInput.trim().toLowerCase().replace(/\.$/, "");
                                    if(input === step.correct || input === step.voice.toLowerCase().replace(/\.$/, "")) {
                                        setDebugMsg("✅ Perfect spelling!");
                                        handleNext();
                                    } else {
                                        setDebugMsg("❌ Keep listening and try again!");
                                    }
                                }} className="bg-green-600 text-white px-12 py-4 rounded-full font-bold text-2xl shadow-xl hover:bg-green-700 active:scale-95 transition-all">提交答案</button>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div id="app-container" className="w-full max-w-4xl parchment border-[12px] border-stone-800 rounded-[2.5rem] shadow-2xl min-h-[650px] flex flex-col items-center justify-center p-8 relative overflow-hidden">
                    {/* UI 點綴 */}
                    <div className="absolute top-4 right-8 text-4xl opacity-20 rotate-12">🧭</div>
                    <div className="absolute bottom-4 left-8 text-4xl opacity-20 -rotate-12">⚓</div>
                    
                    {renderView()}
                    
                    {/* Debug Bar */}
                    <div className="debug-bar fixed bottom-0 left-0 right-0 bg-stone-900 text-stone-300 px-4 flex items-center justify-between opacity-90 border-t border-stone-700">
                        <div className="flex items-center gap-2">
                            <span className={isReady ? "text-green-400" : "text-yellow-400"}>●</span>
                            <span>{debugMsg}</span>
                        </div>
                        <div className="hidden sm:block">
                            <span className="opacity-50">AppID:</span> {APP_ID}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
