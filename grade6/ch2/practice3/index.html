<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空文法大冒險：Like 的雙重身分</title>
    <!-- Load Dependencies via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap');
        body {
            font-family: 'Lexend', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            color: white;
            min-height: 100vh;
        }
        .macaron-pink { background-color: #fce7f3; color: #9d174d; }
        .macaron-blue { background-color: #e0f2fe; color: #075985; }
        .macaron-green { background-color: #f0fdf4; color: #166534; }
        .macaron-yellow { background-color: #fefce8; color: #854d0e; }
        .macaron-purple { background-color: #f5f3ff; color: #5b21b6; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Implementation (Standard Modular Script) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Export to window.FB as per instructions
        window.FB = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, doc, getDoc, setDoc, collection 
        };
    </script>

    <!-- React Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Configuration
        const themeId = "grade5-grammar-like-space";
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const apiKey = ""; // Managed by environment
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        // --- Utility Icons ---
        const VolumeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        );
        const RocketIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3"></path><path d="M12 15v5s3.03-.55 5-2c2.2-1.62 3-5 3-5"></path></svg>
        );

        // --- Core Data ---
        const LESSON_DATA = [
            { id: 'v1', type: 'verb', en: 'I like apples.', zh: '我喜歡蘋果。', keyword: 'apple' },
            { id: 'v2', type: 'verb', en: 'She likes singing.', zh: '她喜歡唱歌。', keyword: 'singing child' },
            { id: 'p1', type: 'prep', en: 'He is like a star.', zh: '他像一顆星星。', keyword: 'shining star' },
            { id: 'p2', type: 'prep', en: 'It looks like a cat.', zh: '它看起來像一隻貓。', keyword: 'cat shape cloud' }
        ];

        const QUIZ_DATA = [
            { q: 'I ____ pizza.', options: ['like', 'am like'], correct: 'like' },
            { q: 'The moon is ____ a giant ball.', options: ['like', 'likes'], correct: 'like' },
            { q: 'He ____ playing basketball.', options: ['likes', 'is like'], correct: 'likes' },
            { q: 'Your hair looks ____ gold.', options: ['like', 'likes'], correct: 'like' }
        ];

        const App = () => {
            const [fbReady, setFbReady] = useState(false);
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [debugMsg, setDebugMsg] = useState("正在初始化星際連線...");
            const [currentTab, setCurrentTab] = useState('lesson');
            const [batchLoading, setBatchLoading] = useState(false);
            const [progress, setProgress] = useState(0);
            const [mediaCache, setMediaCache] = useState({});
            const [playingId, setPlayingId] = useState(null);
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [gameItems, setGameItems] = useState([]);

            // --- 1. Firebase Initialization (Optimized Auth Logic) ---
            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, signInWithCustomToken } = window.FB;
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const firestore = getFirestore(app);
                        setDb(firestore);

                        const initAuth = async () => {
                            try {
                                // Try Custom Token First
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    try {
                                        await signInWithCustomToken(auth, __initial_auth_token);
                                        setDebugMsg("✅ 星際通訊已就緒 (Token 登入)");
                                        return;
                                    } catch (tokenErr) {
                                        console.warn("Token 匹配失敗，嘗試匿名備援...");
                                    }
                                }
                                // Fallback to Anonymous
                                await signInAnonymously(auth);
                                setDebugMsg("✅ 星際通訊已就緒 (匿名登入)");
                            } catch (err) {
                                setDebugMsg("🔴 連線失敗: " + err.message);
                            }
                        };
                        
                        initAuth();
                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setFbReady(true);
                            }
                        });
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            // --- 2. Safe ID & Cache Helpers ---
            const getSafeId = (text) => {
                return btoa(unescape(encodeURIComponent(text))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            };

            const checkCache = async (type, id) => {
                if (!db || !user) return null;
                const safeId = getSafeId(id);
                const docRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', type, safeId);
                try {
                    const snap = await window.FB.getDoc(docRef);
                    return snap.exists() ? snap.data().value : null;
                } catch (e) { return null; }
            };

            const saveToCache = async (type, id, value) => {
                if (!db || !user) return;
                const safeId = getSafeId(id);
                const docRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', type, safeId);
                try {
                    await window.FB.setDoc(docRef, { value, updatedAt: Date.now() });
                } catch (e) { setDebugMsg(`儲存失敗: ${e.message}`); }
            };

            // --- 3. Media Pipeline: Image ---
            const compressImage = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 512;
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                });
            };

            const generateImage = async (prompt) => {
                const fullPrompt = `children's picture book style, whimsical, warm and cheerful, storytelling illustrations, ${prompt}`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ instances: { prompt: fullPrompt }, parameters: { sampleCount: 1 } })
                    });
                    const result = await response.json();
                    if (result.predictions?.[0]?.bytesBase64Encoded) {
                        const rawBase64 = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                        return await compressImage(rawBase64);
                    }
                    throw new Error("生成失敗");
                } catch (e) {
                    setDebugMsg("圖片生成錯誤: " + e.message);
                    return null;
                }
            };

            // --- 4. Media Pipeline: TTS ---
            const pcmToWav = (pcmBase64) => {
                const binaryString = atob(pcmBase64);
                const len = binaryString.length;
                const buffer = new ArrayBuffer(44 + len);
                const view = new DataView(buffer);
                const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + len, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, 24000, true);
                view.setUint32(28, 24000 * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, len, true);
                for (let i = 0; i < len; i++) view.setUint8(44 + i, binaryString.charCodeAt(i));
                return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
            };

            const generateTTS = async (text) => {
                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Say naturally at normal speed: ${text}` }] }],
                                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } }
                            })
                        });
                        if (!res.ok) throw new Error(res.status);
                        return await res.json();
                    } catch (e) {
                        if (retries > 0) {
                            await new Promise(r => setTimeout(r, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        }
                        throw e;
                    }
                };
                try {
                    const result = await fetchWithRetry();
                    return result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                } catch (e) { return null; }
            };

            // --- 5. Batch Generation Logic ---
            const handleBatchGeneration = async () => {
                if (!fbReady || !user) return;
                setBatchLoading(true);
                setProgress(0);
                setDebugMsg("🚀 開始同步星際資源...");
                const total = LESSON_DATA.length * 2;
                let finished = 0;
                const newCache = { ...mediaCache };
                for (const item of LESSON_DATA) {
                    let audioData = await checkCache('audio', item.id);
                    if (!audioData) {
                        audioData = await generateTTS(item.en);
                        if (audioData) await saveToCache('audio', item.id, audioData);
                    }
                    newCache[`audio_${item.id}`] = audioData;
                    finished++;
                    setProgress(Math.round((finished / total) * 100));
                    let imageData = await checkCache('image', item.id);
                    if (!imageData) {
                        imageData = await generateImage(item.keyword);
                        if (imageData) await saveToCache('image', item.id, imageData);
                    }
                    newCache[`image_${item.id}`] = imageData;
                    finished++;
                    setProgress(Math.round((finished / total) * 100));
                }
                setMediaCache(newCache);
                setBatchLoading(false);
                setDebugMsg("✅ 資源同步完成！");
            };

            const playAudio = async (id, text) => {
                setPlayingId(id);
                const cacheKey = `audio_${id}`;
                let base64 = mediaCache[cacheKey] || await checkCache('audio', id);
                if (!base64) {
                    base64 = await generateTTS(text);
                    if (base64) {
                        await saveToCache('audio', id, base64);
                        setMediaCache(prev => ({ ...prev, [cacheKey]: base64 }));
                    }
                }
                if (base64 && base64.length > 100) {
                    const audio = new Audio(pcmToWav(base64));
                    audio.onended = () => setPlayingId(null);
                    audio.play();
                } else {
                    const ut = new SpeechSynthesisUtterance(text);
                    ut.lang = 'en-US';
                    ut.onend = () => setPlayingId(null);
                    window.speechSynthesis.speak(ut);
                }
            };

            // --- 6. Mini Games Logic ---
            const initGame = () => {
                setGameItems(LESSON_DATA.map(d => ({ ...d, status: 'pending' })).sort(() => Math.random() - 0.5));
                setScore(0);
            };
            useEffect(() => { if (currentTab === 'game') initGame(); }, [currentTab]);

            // --- Render ---
            const LessonCard = ({ item }) => (
                <div className="glass-card rounded-2xl overflow-hidden flex flex-col transition-transform hover:scale-[1.02]">
                    <div className="h-48 bg-indigo-900/50 relative flex items-center justify-center">
                        {mediaCache[`image_${item.id}`] ? (
                            <img src={mediaCache[`image_${item.id}`]} alt={item.keyword} className="w-full h-full object-cover" />
                        ) : (
                            <div className="text-gray-400 text-sm italic">等待圖像同步...</div>
                        )}
                        <div className={`absolute top-2 right-2 px-3 py-1 rounded-full text-xs font-bold ${item.type === 'verb' ? 'macaron-purple' : 'macaron-yellow'}`}>
                            {item.type === 'verb' ? '動詞 (Verb)' : '介係詞 (Prep)'}
                        </div>
                    </div>
                    <div className="p-5 flex-grow">
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="text-xl font-bold text-blue-200">{item.en}</h3>
                            <button 
                                onClick={() => playAudio(item.id, item.en)}
                                className={`p-2 rounded-full transition-colors ${playingId === item.id ? 'bg-pink-500 text-white animate-pulse' : 'bg-white/10 text-white hover:bg-white/20'}`}
                            >
                                <VolumeIcon />
                            </button>
                        </div>
                        <p className="text-indigo-200 text-sm font-medium">{item.zh}</p>
                    </div>
                </div>
            );

            return (
                <div className="max-w-5xl mx-auto p-4 pb-24">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 pt-6">
                        <div className="flex items-center gap-3">
                            <div className="bg-pink-500 p-3 rounded-2xl shadow-lg animate-bounce"><RocketIcon /></div>
                            <div>
                                <h1 className="text-3xl font-black tracking-tight text-white drop-shadow-md">星際文法冒險</h1>
                                <p className="text-indigo-300 font-medium">小學五年級：Like 的奇妙之旅</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button 
                                onClick={handleBatchGeneration}
                                disabled={batchLoading || !fbReady}
                                className="px-6 py-3 bg-gradient-to-r from-pink-500 to-purple-500 rounded-xl font-bold shadow-lg hover:shadow-pink-500/20 disabled:opacity-50 transition-all flex items-center gap-2"
                            >
                                {batchLoading ? `🛰️ 同步中 ${progress}%` : "✨ 一鍵同步 AI 插圖與語音"}
                            </button>
                        </div>
                    </header>

                    <nav className="flex bg-white/10 p-1 rounded-2xl mb-8">
                        {['lesson', 'quiz', 'game'].map(tab => (
                            <button key={tab} onClick={() => setCurrentTab(tab)} className={`flex-1 py-3 rounded-xl font-bold transition-all ${currentTab === tab ? 'bg-white text-indigo-900 shadow-md' : 'text-indigo-200 hover:text-white'}`}>
                                {tab === 'lesson' ? '🪐 探索課程' : tab === 'quiz' ? '🧪 能量測試' : '👾 分類大作戰'}
                            </button>
                        ))}
                    </nav>

                    <main className="min-h-[400px]">
                        {currentTab === 'lesson' && <div className="grid grid-cols-1 md:grid-cols-2 gap-6">{LESSON_DATA.map(item => <LessonCard key={item.id} item={item} />)}</div>}
                        {currentTab === 'quiz' && (
                            <div className="max-w-xl mx-auto glass-card p-8 rounded-3xl text-center">
                                <div className="mb-6 flex justify-between items-center">
                                    <span className="text-xs font-bold text-indigo-300 uppercase tracking-widest">Question {quizIndex + 1}/{QUIZ_DATA.length}</span>
                                    <span className="text-pink-400 font-bold">Score: {score}</span>
                                </div>
                                <h2 className="text-3xl font-bold mb-8 text-white">{QUIZ_DATA[quizIndex].q.replace('____', '______')}</h2>
                                <div className="space-y-4">
                                    {QUIZ_DATA[quizIndex].options.map(opt => (
                                        <button key={opt} onClick={() => {
                                            if (opt === QUIZ_DATA[quizIndex].correct) setScore(s => s + 10);
                                            if (quizIndex < QUIZ_DATA.length - 1) setQuizIndex(i => i + 1);
                                            else { setQuizIndex(0); setCurrentTab('lesson'); }
                                        }} className="w-full py-4 rounded-2xl bg-white/10 hover:bg-white/20 border-2 border-transparent hover:border-pink-400/50 font-bold transition-all text-lg">{opt}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                        {currentTab === 'game' && (
                            <div className="text-center">
                                <p className="mb-6 text-indigo-200">將單字分類到正確星雲！</p>
                                <div className="grid grid-cols-2 gap-8 mb-8">
                                    <div className="glass-card p-6 rounded-3xl border-2 border-purple-500/30"><div className="text-3xl mb-2">🟣</div><h3 className="font-bold text-purple-300">動詞星雲 (喜歡)</h3></div>
                                    <div className="glass-card p-6 rounded-3xl border-2 border-yellow-500/30"><div className="text-3xl mb-2">🟡</div><h3 className="font-bold text-yellow-300">介係詞星雲 (像)</h3></div>
                                </div>
                                <div className="flex flex-wrap justify-center gap-4">
                                    {gameItems.map((item, idx) => (
                                        <div key={idx} className={`p-4 rounded-2xl cursor-pointer shadow-lg transition-all transform hover:-translate-y-1 ${item.status === 'correct' ? 'bg-green-500/50 opacity-50 scale-90' : 'bg-indigo-600 hover:bg-indigo-500'}`}>
                                            <div className="font-bold text-lg mb-1">{item.en}</div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { if(item.type === 'verb') { const n = [...gameItems]; n[idx].status = 'correct'; setGameItems(n); setScore(s => s + 5); } }} className="px-3 py-1 bg-purple-500 rounded-lg text-xs">動詞</button>
                                                <button onClick={() => { if(item.type === 'prep') { const n = [...gameItems]; n[idx].status = 'correct'; setGameItems(n); setScore(s => s + 5); } }} className="px-3 py-1 bg-yellow-500 rounded-lg text-xs text-indigo-900">介係詞</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-0 left-0 w-full bg-black/80 backdrop-blur-md border-t border-white/10 p-2 text-[10px] font-mono text-gray-400 flex justify-between px-6 z-50">
                        <div className="flex items-center gap-4">
                            <span className="flex items-center gap-1"><span className={`w-2 h-2 rounded-full ${fbReady ? 'bg-green-500' : 'bg-red-500'}`}></span>Firebase: {fbReady ? 'Online' : 'Connecting'}</span>
                            <span className="text-indigo-400">Status: {debugMsg}</span>
                        </div>
                        <div>User: {user ? user.uid : 'Guest'}</div>
                    </div>

                    {batchLoading && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100]">
                            <div className="bg-indigo-900 p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border border-indigo-400/30">
                                <div className="text-5xl mb-4 animate-spin inline-block">🚀</div>
                                <h2 className="text-2xl font-bold mb-2">星際引擎發動中...</h2>
                                <div className="w-full bg-indigo-950 h-3 rounded-full overflow-hidden mt-6"><div className="bg-pink-500 h-full progress-bar" style={{ width: `${progress}%` }}></div></div>
                                <div className="mt-2 text-pink-400 font-bold">{progress}%</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
