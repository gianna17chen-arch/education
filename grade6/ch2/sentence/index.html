<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夢想職業大挑戰 - Pro AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f5f3ff; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 24px; box-shadow: 0 8px 32px rgba(139, 92, 246, 0.15); border: 2px solid #ddd6fe; }
        .btn-primary { background: linear-gradient(135deg, #8b5cf6, #a78bfa); transition: all 0.3s; color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(139, 92, 246, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .debug-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; color: #10b981; font-family: monospace; font-size: 10px; padding: 4px 12px; z-index: 9999; display: flex; justify-content: space-between; border-top: 1px solid #334155; }
        .en-text-large { font-size: 2.8rem; line-height: 1.2; font-weight: 700; }
        .pulse-purple { animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); } }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #8b5cf6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="root"></div>

    <!-- Firebase SDK Implementation -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const themeId = "dream-job-adventure-pro";
        const apiKey = ""; // Runtime provides this

        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        const questions = [
            { id: "q1", type: 'fill', q: "What ___ you want to be?", a: "do", audio: "What do you want to be?", tip: "do_match", prompt: "A friendly police officer pointing to a dream bubble" },
            { id: "q2", type: 'fill', q: "What ___ she want to be?", a: "does", audio: "What does she want to be?", tip: "does_match", prompt: "A girl thinking about being a doctor" },
            { id: "q3", type: 'fill', q: "I want ___ be a singer. (🎤)", a: "to", audio: "I want to be a singer.", tip: "to_be", prompt: "A pop star singing on stage with a microphone" },
            { id: "q4", type: 'fill', q: "He ___ to be a farmer. (👨‍🌾)", a: "wants", audio: "He wants to be a farmer.", tip: "wants_s", prompt: "A happy farmer in a green field with a tractor" },
            { id: "q5", type: 'fill', q: "___ she want to be a writer? (✍️)", a: "Does", audio: "Does she want to be a writer?", tip: "does_match", prompt: "A woman writing a book in a cozy library" },
            { id: "q6", type: 'fill', q: "No, I ___. (❌)", a: "don't", audio: "No, I don't.", tip: "short_ans_do", prompt: "A person shaking their head no" },
            { id: "q7", type: 'fill', q: "Yes, she ___. (✅)", a: "does", audio: "Yes, she does.", tip: "short_ans_does", prompt: "A person nodding yes" },
            { id: "q8", type: 'fill', q: "I want to be ___ artist. (🎨)", a: "an", audio: "I want to be an artist.", tip: "a_an", prompt: "An artist painting a colorful landscape" },
            { id: "q9", type: 'mcq', q: "What ___ Lily want to be?", options: ["do", "does"], a: 1, audio: "What does Lily want to be?", tip: "does_match", prompt: "A little girl named Lily holding a stethoscope" },
            { id: "q10", type: 'mcq', q: "I ___ to be a police officer. (👮)", options: ["want", "wants"], a: 0, audio: "I want to be a police officer.", tip: "do_match", prompt: "A police officer in a blue uniform" },
            { id: "q11", type: 'mcq', q: "Do you want to be a basketball player? (🏀)", options: ["No, I don't.", "No, I'm not."], a: 0, audio: "Do you want to be a basketball player? No, I don't.", tip: "short_ans_do", prompt: "A professional basketball player dribbling a ball" },
            { id: "q12", type: 'mcq', q: "She wants ___ a dentist. (🦷)", options: ["be", "to be"], a: 1, audio: "She wants to be a dentist.", tip: "to_be", prompt: "A dentist checking teeth in a clinic" },
            { id: "q13", type: 'mcq', q: "___ they want to be singers?", options: ["Do", "Does"], a: 0, audio: "Do they want to be singers?", tip: "do_match", prompt: "A group of children performing on stage" },
            { id: "q14", type: 'mcq', q: "He wants to be a ___ driver. (🚌)", options: ["bus", "writer"], a: 0, audio: "He wants to be a bus driver.", tip: "to_be", prompt: "A yellow school bus with a smiling driver" },
            { id: "q15", type: 'mcq', q: "Does Tom want to be a farmer?", options: ["Yes, he does.", "Yes, he is."], a: 0, audio: "Does Tom want to be a farmer? Yes, he does.", tip: "short_ans_does", prompt: "A boy named Tom holding a pitchfork" },
            { id: "q16", type: 'mcq', q: "We ___ to be police officers.", options: ["want", "wants"], a: 0, audio: "We want to be police officers.", tip: "do_match", prompt: "Two children dressed as police officers" }
        ];

        const GRAMMAR_TIPS = {
            do_match: "主詞是 I, You, We, They 時，助動詞要用 'do'。",
            does_match: "主詞是 He, She, It 或單一人名時，助動詞要用 'does'。",
            wants_s: "在肯定句中，如果主詞是 He/She/單數人名，動詞 want 要加 s 變成 'wants'。",
            to_be: "動詞 want 後面要加上 'to be' 才能接職業名稱喔！",
            short_ans_do: "用 Do 問，肯定回答 Yes, I do. 否定回答 No, I don't。",
            short_ans_does: "用 Does 問，回答要用 does 或 doesn't。",
            a_an: "注意：artist 開頭是母音，前面要用 'an' artist。"
        };

        // --- Utils ---
        const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

        const fetchWithRetry = async (url, options, maxRetries = 5) => {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status === 403 && !apiKey) throw new Error("AUTH_FAIL");
                    if (response.status === 429 || response.status >= 500) {
                        const delay = Math.pow(2, i) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        continue;
                    }
                    return response;
                } catch (err) {
                    if (err.message === "AUTH_FAIL") throw err;
                    if (i === maxRetries - 1) throw err;
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                }
            }
        };

        // --- App Component ---
        function App() {
            const [view, setView] = useState('welcome');
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [debugMsg, setDebugMsg] = useState("Initializing system...");
            const [batchProgress, setBatchProgress] = useState(null);
            const [assets, setAssets] = useState({ images: {}, audio: {} });
            const [loadingMap, setLoadingMap] = useState({});
            const [score, setScore] = useState(0);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isCorrecting, setIsCorrecting] = useState(false);
            const [userInput, setUserInput] = useState("");
            const [feedback, setFeedback] = useState(null);
            const [mcqState, setMcqState] = useState(null);

            // Firebase Polling & Init
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.FB) {
                        clearInterval(interval);
                        const app = window.FB.initializeApp(firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        window.FB.signInAnonymously(auth).catch(e => setDebugMsg(`Auth Error: ${e.message}`));
                        window.FB.onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setDebugMsg(`Ready. User: ${u.uid}`);
                            }
                        });
                    }
                }, 500);
                return () => clearInterval(interval);
            }, []);

            // --- Media Pipeline ---
            const compressImage = async (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 512;
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = base64;
                });
            };

            const pcmToWav = (pcmData, sampleRate = 24000) => {
                const header = new ArrayBuffer(44);
                const d = new DataView(header);
                d.setUint32(0, 0x52494646); d.setUint32(4, 36 + pcmData.byteLength, true); d.setUint32(8, 0x57415645);
                d.setUint32(12, 0x666d7420); d.setUint32(16, 16, true); d.setUint16(20, 1, true); d.setUint16(22, 1, true);
                d.setUint32(24, sampleRate, true); d.setUint32(28, sampleRate * 2, true); d.setUint16(32, 2, true);
                d.setUint16(34, 16, true); d.setUint32(36, 0x64617461); d.setUint32(40, pcmData.byteLength, true);
                const wav = new Uint8Array(header.byteLength + pcmData.byteLength);
                wav.set(new Uint8Array(header), 0); wav.set(new Uint8Array(pcmData), 44);
                return wav;
            };

            const getCloudAsset = async (type, id) => {
                if (!db || !user) return null;
                try {
                    const docRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', type, id);
                    const snap = await window.FB.getDoc(docRef);
                    return snap.exists() ? snap.data().blob : null;
                } catch (e) {
                    setDebugMsg(`Cache Check Error: ${e.message}`);
                    return null;
                }
            };

            const saveCloudAsset = async (type, id, blob) => {
                if (!db || !user) return;
                try {
                    const docRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', type, id);
                    await window.FB.setDoc(docRef, { blob, timestamp: Date.now() });
                } catch (e) {
                    setDebugMsg(`Save Cache Error: ${e.message}`);
                }
            };

            const processAsset = async (question) => {
                if (loadingMap[question.id]) return;
                setLoadingMap(prev => ({ ...prev, [question.id]: true }));

                const imgId = getSafeId(question.prompt);
                const audId = getSafeId(question.audio);

                let imgBlob = await getCloudAsset('images', imgId);
                let audBlob = await getCloudAsset('audio', audId);

                // Image Logic
                if (!imgBlob) {
                    setDebugMsg(`Generating Image for ${question.id}...`);
                    try {
                        const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                            method: 'POST',
                            body: JSON.stringify({ instances: { prompt: question.prompt }, parameters: { sampleCount: 1 } })
                        });
                        const data = await res.json();
                        const rawBase64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                        imgBlob = await compressImage(rawBase64);
                        await saveCloudAsset('images', imgId, imgBlob);
                        setDebugMsg(`Image Generated & Cached for ${question.id}`);
                    } catch (e) {
                        setDebugMsg(e.message === "AUTH_FAIL" ? "Image Auth Fail" : `Image Error: ${e.message}`);
                    }
                }

                // Audio Logic
                if (!audBlob) {
                    setDebugMsg(`Generating Audio for ${question.id}...`);
                    try {
                        const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Say clearly: ${question.audio}` }] }],
                                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                            })
                        });
                        const data = await res.json();
                        const pcmBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        if (pcmBase64) {
                            const bin = atob(pcmBase64);
                            const buf = new Uint8Array(bin.length);
                            for(let i=0; i<bin.length; i++) buf[i] = bin.charCodeAt(i);
                            const wav = pcmToWav(buf.buffer);
                            const reader = new FileReader();
                            audBlob = await new Promise(r => {
                                reader.onload = () => r(reader.result);
                                reader.readAsDataURL(new Blob([wav], { type: 'audio/wav' }));
                            });
                            await saveCloudAsset('audio', audId, audBlob);
                            setDebugMsg(`Audio Generated & Cached for ${question.id}`);
                        }
                    } catch (e) {
                        setDebugMsg(e.message === "AUTH_FAIL" ? "Audio Auth Fail" : `Audio Error: ${e.message}`);
                    }
                }

                setAssets(prev => ({
                    images: { ...prev.images, [question.id]: imgBlob },
                    audio: { ...prev.audio, [question.id]: audBlob }
                }));
                setLoadingMap(prev => ({ ...prev, [question.id]: false }));
            };

            const runBatch = async () => {
                if (!db || !user) {
                    setDebugMsg("Please wait for Firebase connection...");
                    return;
                }
                setBatchProgress(0);
                for (let i = 0; i < questions.length; i++) {
                    await processAsset(questions[i]);
                    setBatchProgress(Math.round(((i + 1) / questions.length) * 100));
                }
                setTimeout(() => setBatchProgress(null), 2000);
            };

            const playAudio = (id, fallbackText) => {
                const blob = assets.audio[id];
                if (blob && blob.length > 100) {
                    const audio = new Audio(blob);
                    audio.play().catch(() => {
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance(fallbackText));
                    });
                } else {
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(fallbackText));
                }
            };

            // --- Quiz Logic ---
            const currentQ = questions[currentIndex];

            const checkAnswer = (val) => {
                if (isCorrecting) return;
                const isCorrect = currentQ.type === 'fill' 
                    ? val.trim().toLowerCase() === currentQ.a.toLowerCase()
                    : val === currentQ.a;

                if (isCorrect) {
                    setScore(s => s + 5);
                    setFeedback({ type: 'success', text: "答對了！ Correct! +5" });
                    playAudio(currentQ.id, "Excellent!");
                } else {
                    setFeedback({ type: 'error', text: "加油！再試試看！" });
                    playAudio(currentQ.id, "Try again!");
                }
                setIsCorrecting(true);
            };

            const nextStep = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(i => i + 1);
                    setUserInput("");
                    setFeedback(null);
                    setMcqState(null);
                    setIsCorrecting(false);
                    processAsset(questions[currentIndex + 1]);
                } else {
                    setView('result');
                }
            };

            // --- View Components ---
            const Welcome = () => (
                <div className="glass-card p-10 max-w-2xl w-full text-center">
                    <div className="animal-icon">🦊</div>
                    <h2 className="text-3xl font-bold mt-4 mb-2">狐狸老師的英語任務</h2>
                    <p className="mb-8 text-gray-600 text-lg">Hi Tr. Mimi! 準備好帶孩子們探索未來了嗎？</p>
                    
                    <div className="space-y-4 mb-10">
                        <button onClick={() => setView('learn')} className="btn-secondary font-bold py-5 px-10 rounded-2xl text-2xl shadow-md border-2 w-full flex items-center justify-center gap-4">
                            📝 1. 文法小教室 Learn
                        </button>
                        <button onClick={() => { setView('quiz'); processAsset(questions[0]); }} className="btn-primary font-bold py-5 px-10 rounded-2xl text-2xl shadow-md w-full flex items-center justify-center gap-4">
                            🚀 2. 開始挑戰 Challenge
                        </button>
                    </div>

                    <button 
                        onClick={runBatch} 
                        disabled={batchProgress !== null || !user}
                        className="w-full bg-emerald-50 text-emerald-600 border-2 border-emerald-200 rounded-xl py-3 font-bold hover:bg-emerald-100 transition-all flex items-center justify-center gap-2"
                    >
                        {batchProgress !== null ? (
                            <>⏳ 預載中 {batchProgress}%</>
                        ) : (
                            <>☁️ 一鍵生成雲端資源 (AI Preload)</>
                        )}
                    </button>
                </div>
            );

            const Learning = () => (
                <div className="glass-card p-10 max-w-4xl w-full">
                    <div className="flex justify-between items-center mb-8">
                        <h3 className="text-3xl font-bold text-[#7c3aed]">文法重點 Grammar Focus</h3>
                        <button onClick={() => setView('welcome')} className="bg-gray-100 px-4 py-2 rounded-lg font-bold">🏠 返回首頁</button>
                    </div>
                    <div className="space-y-6">
                        <div className="bg-purple-50 p-6 rounded-3xl border-l-8 border-purple-400">
                            <h4 className="font-bold text-xl mb-4">重點 1: Do vs Does</h4>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-4 rounded-xl shadow-sm"><b>Do:</b> I / You / We / They</div>
                                <div className="bg-white p-4 rounded-xl shadow-sm"><b>Does:</b> He / She / Tom</div>
                            </div>
                        </div>
                        <div className="bg-indigo-50 p-6 rounded-3xl border-l-8 border-indigo-400">
                            <h4 className="font-bold text-xl mb-4">重點 2: want to be</h4>
                            <div className="bg-white p-4 rounded-xl mb-2 en-subtext-large">I <b>want</b> to be a singer.</div>
                            <div className="bg-white p-4 rounded-xl en-subtext-large">He <b>wants</b> to be a farmer.</div>
                        </div>
                    </div>
                    <button onClick={() => { setView('quiz'); processAsset(questions[0]); }} className="btn-primary w-full mt-8 py-4 rounded-full text-2xl font-bold">開始測驗吧！</button>
                </div>
            );

            const Quiz = () => (
                <div className="glass-card p-8 max-w-3xl w-full relative">
                    <div className="flex justify-between items-center mb-6">
                        <div className="w-2/3 bg-gray-200 rounded-full h-3">
                            <div className="bg-purple-500 h-3 rounded-full transition-all" style={{width: `${(currentIndex/questions.length)*100}%`}}></div>
                        </div>
                        <span className="text-purple-600 font-bold">Q {currentIndex+1}/{questions.length}</span>
                    </div>

                    <div className="flex flex-col items-center gap-6 mb-8 text-center">
                        <div className="w-full h-48 rounded-2xl bg-purple-50 flex items-center justify-center overflow-hidden border-2 border-purple-100">
                            {assets.images[currentQ.id] ? (
                                <img src={assets.images[currentQ.id]} alt="AI Dream" className="w-full h-full object-cover" />
                            ) : (
                                <div className="flex flex-col items-center gap-2">
                                    <div className="loading-spinner"></div>
                                    <p className="text-xs text-purple-400">AI Rendering...</p>
                                </div>
                            )}
                        </div>

                        <div className="w-full">
                            <h4 className="en-text-large flex flex-col items-center gap-4">
                                <span>{currentQ.q}</span>
                                <button 
                                    onClick={() => playAudio(currentQ.id, currentQ.audio)}
                                    className="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center text-3xl pulse-purple shadow-inner"
                                >
                                    {loadingMap[currentQ.id] ? "⌛" : (assets.audio[currentQ.id] ? "🔊" : "🗣️")}
                                </button>
                            </h4>
                        </div>
                    </div>

                    {currentQ.type === 'fill' ? (
                        <input 
                            type="text" 
                            value={userInput}
                            onChange={(e) => setUserInput(e.target.value)}
                            disabled={isCorrecting}
                            placeholder="Type here..."
                            className="w-full p-6 border-4 border-purple-100 rounded-3xl text-4xl font-bold text-center outline-none focus:border-purple-400"
                        />
                    ) : (
                        <div className="grid gap-4">
                            {currentQ.options.map((opt, i) => (
                                <button 
                                    key={i}
                                    onClick={() => { setMcqState(i); checkAnswer(i); }}
                                    disabled={isCorrecting}
                                    className={`p-6 rounded-3xl border-4 text-3xl font-bold transition-all ${
                                        isCorrecting && i === currentQ.a ? "bg-green-100 border-green-500 text-green-700" :
                                        isCorrecting && i === mcqState ? "bg-red-100 border-red-500 text-red-600" :
                                        "border-purple-100 hover:border-purple-400"
                                    }`}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                    )}

                    {feedback && (
                        <div className={`mt-6 p-6 rounded-2xl border-l-8 ${feedback.type === 'success' ? 'bg-green-50 border-green-400' : 'bg-red-50 border-red-400'}`}>
                            <p className="font-bold text-lg">{feedback.text}</p>
                            {feedback.type === 'error' && <p className="text-blue-600 mt-2">💡 {GRAMMAR_TIPS[currentQ.tip]}</p>}
                            <button onClick={nextStep} className="btn-primary w-full mt-4 py-3 rounded-xl text-xl font-bold">
                                {currentIndex < questions.length - 1 ? "下一題 Next →" : "看總分 Result →"}
                            </button>
                        </div>
                    )}

                    {!feedback && currentQ.type === 'fill' && (
                        <button onClick={() => checkAnswer(userInput)} className="btn-primary w-full mt-4 py-4 rounded-full text-2xl font-bold">送出 Submit</button>
                    )}
                </div>
            );

            const Result = () => (
                <div className="glass-card p-10 max-w-2xl w-full text-center">
                    <div className="text-8xl mb-6">{score >= 70 ? "🏆" : "🦊"}</div>
                    <h2 className="text-4xl font-bold mb-4">任務完成！</h2>
                    <p className="text-2xl text-gray-500 mb-8">你的總分 Your Score: <span className="text-purple-600 font-bold text-6xl">{score}</span> / 80</p>
                    <button onClick={() => location.reload()} className="btn-primary py-4 px-12 rounded-full text-2xl font-bold">再玩一次 Replay</button>
                </div>
            );

            return (
                <div className="min-h-screen pb-16 flex flex-col items-center justify-center p-4">
                    {view === 'welcome' && <Welcome />}
                    {view === 'learn' && <Learning />}
                    {view === 'quiz' && <Quiz />}
                    {view === 'result' && <Result />}

                    <div className="debug-bar">
                        <span>[System Status]: {debugMsg}</span>
                        <span>Theme: {themeId} | Firebase: {db ? "Connected" : "Disconnected"}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
