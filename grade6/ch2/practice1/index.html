<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未來夢想大冒險 - 雲端優化版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
        .scale-in { animation: scaleIn 0.3s ease-out forwards; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .emerald-glow { filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.2)); }
        .progress-bar { transition: width 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-emerald-50/30">
    <div id="root"></div>

    <!-- Firebase SDK (核心規則：掛載至 window.FB) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.FB = { auth, db, signInAnonymously, onAuthStateChanged, doc, getDoc, setDoc, collection };
    </script>

    <!-- React Application -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const apiKey = ""; 
        const appId = "future-dreams-cloud-tablet"; 

        const CHARS = {
            STYLE: "High-quality Japanese anime art style, 2D, vibrant colors, cinematic school classroom lighting, Makoto Shinkai inspired background.",
            LEO: "Leo (a 7-year-old boy, slightly messy brown hair, wearing a green striped sweater, looking thoughtful)",
            TOBY: "Toby (a 7-year-old boy, wearing a blue police-style cap, brave smile, blue jacket)",
            KEN: "Ken (a 7-year-old boy, wearing a red basketball jersey number 10, holding a basketball)",
            SARA: "Sara (a 6-year-old girl, wearing glasses, black hair in a ponytail, holding a small notebook)",
            MR_LIN: "Mr. Lin (a kind male teacher in his 30s, wearing glasses, neat white shirt with a tie, gentle smile)"
        };

        const storyPages = [
            { text: "Math is so hard.", hint: "翻譯：數學真的好難。", prompt: `${CHARS.STYLE} ${CHARS.LEO} sitting at a classroom desk, confused at math.` },
            { text: "I want to be a police officer. Do you want to be a police officer, too?", hint: "提示：警察是 Police officer。", prompt: `${CHARS.STYLE} ${CHARS.TOBY} in a police cap, looking brave.` },
            { text: "I’m not sure.", hint: "翻譯：我不確定。", prompt: `${CHARS.STYLE} ${CHARS.LEO} looking out the window, daydreaming.` },
            { text: "I want to be a basketball player. What do you want to be?", hint: "單字：Basketball player (籃球員)。", prompt: `${CHARS.STYLE} ${CHARS.KEN} spinning a basketball on his finger.` },
            { text: "I want to be a writer.", hint: "單字：Writer (作家)。", prompt: `${CHARS.STYLE} ${CHARS.SARA} showing her creative notebook.` },
            { text: "I want to be a police officer, a basketball player, or maybe a writer.", hint: "提示：Or maybe (或者也許)。", prompt: `${CHARS.STYLE} ${CHARS.LEO} thinking of various future roles.` },
            { text: "Mr. Lin is coming.", hint: "翻譯：林老師來了。", prompt: `${CHARS.STYLE} ${CHARS.SARA} pointing to the door.` },
            { text: "I know! I want to be a nice teacher just like you, Mr. Lin.", hint: "文法：Just like you (就像你一樣)。", prompt: `${CHARS.STYLE} ${CHARS.MR_LIN} enters, ${CHARS.LEO} is inspired.` }
        ];

        const quizData = [
            { question: "What subject is hard for Leo?", options: ["English", "Math", "Science"], correct: 1 },
            { question: "Who wants to be a police officer?", options: ["Leo", "Ken", "Toby"], correct: 2 },
            { question: "What does Sara want to be?", options: ["A writer", "A teacher", "A doctor"], correct: 0 }
        ];

        const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/[/+=]/g, '_');

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [user, setUser] = useState(null);
            const [debugMsg, setDebugMsg] = useState("正在啟動雲端連線...");
            
            const [images, setImages] = useState({});
            const [loadingImg, setLoadingImg] = useState({});
            const [audioLoading, setAudioLoading] = useState(false);
            const [batchMode, setBatchMode] = useState(false);
            const [batchProgress, setBatchProgress] = useState(0);
            const [hasInteracted, setHasInteracted] = useState(false);
            const [currentPage, setCurrentPage] = useState(0);
            const [mode, setMode] = useState('story');
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showResult, setShowResult] = useState(false);
            
            const audioRef = useRef(null);

            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.FB) {
                        clearInterval(timer);
                        window.FB.onAuthStateChanged(window.FB.auth, (u) => {
                            if (u) { setUser(u); setFbReady(true); setDebugMsg("✅ 雲端快取已啟動 (平板畫質優化模式)"); }
                            else { window.FB.signInAnonymously(window.FB.auth); }
                        });
                    }
                }, 500);
                return () => clearInterval(timer);
            }, []);

            const fetchWithRetry = async (url, body) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < 5; i++) {
                    try {
                        const resp = await fetch(url, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body) 
                        });
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        return await resp.json();
                    } catch (e) {
                        if (i === 4) throw e;
                        await new Promise(r => setTimeout(r, delays[i]));
                    }
                }
            };

            const compressImage = (base64Str) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 512; 
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height = (MAX_WIDTH / width) * height;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                });
            };

            const getCache = async (type, text) => {
                if (!window.FB.db) return null;
                const safeId = getSafeId(text);
                const docRef = window.FB.doc(window.FB.db, 'artifacts', appId, 'public', 'data', type, safeId);
                const snap = await window.FB.getDoc(docRef);
                return snap.exists() ? snap.data().content : null;
            };

            const setCache = async (type, text, content) => {
                if (!window.FB.db || !user) return;
                const safeId = getSafeId(text);
                const docRef = window.FB.doc(window.FB.db, 'artifacts', appId, 'public', 'data', type, safeId);
                await window.FB.setDoc(docRef, { content, timestamp: Date.now(), creator: user.uid });
            };

            const generateImage = async (index) => {
                if (images[index] || loadingImg[index]) return;
                setLoadingImg(prev => ({ ...prev, [index]: true }));
                
                try {
                    const text = storyPages[index].text;
                    const cached = await getCache('images', text);
                    if (cached) {
                        setImages(prev => ({ ...prev, [index]: cached }));
                        return;
                    }

                    setDebugMsg(`🎨 正在生成第 ${index + 1} 頁插圖...`);
                    const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        instances: { prompt: storyPages[index].prompt },
                        parameters: { sampleCount: 1 }
                    });
                    const b64 = res.predictions?.[0]?.bytesBase64Encoded;
                    if (b64) {
                        const rawData = `data:image/png;base64,${b64}`;
                        const compressedData = await compressImage(rawData);
                        setImages(prev => ({ ...prev, [index]: compressedData }));
                        await setCache('images', text, compressedData);
                    }
                } catch (err) { setDebugMsg(`❌ 圖片失敗: ${err.message}`); }
                finally { setLoadingImg(prev => ({ ...prev, [index]: false })); }
            };

            const synthAudio = async (text) => {
                const cached = await getCache('audio', text);
                if (cached) return cached;

                setDebugMsg(`🎙️ 正在合成語音: ${text.substring(0, 15)}...`);
                // 必須使用 gemini-2.5-flash-preview-tts 模型
                const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    contents: [{ parts: [{ text: `Say in a cheerful teacher's voice: ${text}` }] }],
                    generationConfig: { 
                        responseModalities: ["AUDIO"], 
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } 
                    },
                    model: "gemini-2.5-flash-preview-tts"
                });
                const data = res.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (data) {
                    await setCache('audio', text, data);
                    return data;
                }
                return null;
            };

            const playAudio = async (index) => {
                if (!hasInteracted || audioLoading) return;
                setAudioLoading(true);
                try {
                    const text = storyPages[index].text;
                    const data = await synthAudio(text);
                    if (data && audioRef.current) {
                        const binary = atob(data);
                        const pcm = new Int16Array(binary.length / 2);
                        // PCM L16 數據轉換
                        for (let j = 0; j < pcm.length; j++) {
                            pcm[j] = (binary.charCodeAt(j * 2) & 0xFF) | (binary.charCodeAt(j * 2 + 1) << 8);
                        }
                        const wavBlob = pcmToWav(pcm, 24000);
                        audioRef.current.src = URL.createObjectURL(wavBlob);
                        audioRef.current.play().catch(e => setDebugMsg(`🔊 播放中斷: ${e.message}`));
                        setDebugMsg(`✅ 正在播放音訊...`);
                    }
                } catch (err) { 
                    setDebugMsg(`❌ 語音播放失敗: ${err.message}`); 
                } finally { 
                    setAudioLoading(false); 
                }
            };

            const pcmToWav = (pcmData, sampleRate) => {
                const buffer = new ArrayBuffer(44 + pcmData.length * 2);
                const view = new DataView(buffer);
                const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
                writeString(0, 'RIFF'); 
                view.setUint32(4, 32 + pcmData.length * 2, true);
                writeString(8, 'WAVE'); 
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true); 
                view.setUint16(20, 1, true); 
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true); 
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true); 
                view.setUint16(34, 16, true);
                writeString(36, 'data'); 
                view.setUint32(40, pcmData.length * 2, true);
                let offset = 44;
                for (let i = 0; i < pcmData.length; i++, offset += 2) view.setInt16(offset, pcmData[i], true);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            const handleBatchGenerate = async () => {
                if (batchMode || !fbReady) return;
                setBatchMode(true);
                setBatchProgress(0);
                setDebugMsg("🚀 開始一鍵合成所有資源並優化畫質...");
                for (let i = 0; i < storyPages.length; i++) {
                    try {
                        await synthAudio(storyPages[i].text);
                        await generateImage(i);
                        setBatchProgress(Math.round(((i + 1) / storyPages.length) * 100));
                    } catch (e) {
                        setDebugMsg(`⚠️ 第 ${i+1} 頁處理失敗: ${e.message}`);
                    }
                }
                setDebugMsg("✅ 雲端快取完成！畫質已針對平板進行輕量化。");
                setBatchMode(false);
            };

            useEffect(() => {
                if (hasInteracted && fbReady && mode === 'story') {
                    generateImage(currentPage);
                    playAudio(currentPage);
                }
            }, [currentPage, hasInteracted, fbReady, mode]);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-emerald-50/10">
                    <audio ref={audioRef} className="hidden" />

                    {!hasInteracted && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-emerald-900/60 backdrop-blur-md p-4 text-center">
                            <div className="bg-white p-10 rounded-[3.5rem] shadow-2xl max-w-sm w-full space-y-8 scale-in border-4 border-emerald-100">
                                <div className="text-7xl emerald-glow">☁️</div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tight">雲端優化電子書</h1>
                                <div className="space-y-4">
                                    <button onClick={handleBatchGenerate} disabled={batchMode || !fbReady} className={`w-full py-5 rounded-3xl font-black flex flex-col items-center justify-center transition-all shadow-xl ${batchMode ? 'bg-slate-100 text-slate-400' : 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200'}`}>
                                        <span>{batchMode ? '正在優化中...' : '一鍵預載並優化資源'}</span>
                                        {batchMode && (
                                            <div className="w-4/5 bg-white/50 h-1.5 rounded-full mt-2 overflow-hidden">
                                                <div className="bg-emerald-500 h-full progress-bar" style={{width: `${batchProgress}%`}}></div>
                                            </div>
                                        )}
                                    </button>
                                    <button onClick={() => setHasInteracted(true)} className="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black text-xl hover:bg-emerald-700 shadow-xl transition-all">
                                        直接開始學習
                                    </button>
                                </div>
                                <p className="text-sm text-slate-400 font-bold italic">資源將自動存入雲端，並針對平板進行輕量化處理。</p>
                            </div>
                        </div>
                    )}

                    <div className="max-w-6xl w-full bg-white rounded-[4rem] shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[650px] border-8 border-white mb-12 relative">
                        <div className="w-full md:w-1/2 bg-slate-100 relative overflow-hidden flex items-center justify-center">
                            {mode === 'story' ? (
                                loadingImg[currentPage] ? (
                                    <div className="flex flex-col items-center gap-4 animate-pulse">
                                        <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                                        <p className="text-emerald-600 font-black text-xs">生成中...</p>
                                    </div>
                                ) : images[currentPage] ? (
                                    <img src={images[currentPage]} className="w-full h-full object-cover animate-in fade-in duration-1000" alt="Anime Scene" />
                                ) : (
                                    <div className="text-slate-300 text-8xl opacity-50 italic">Art</div>
                                )
                            ) : (
                                <div className="w-full h-full bg-emerald-600 flex items-center justify-center text-white text-6xl font-black">QUIZ</div>
                            )}
                            <div className="absolute top-8 left-8 bg-white/90 px-6 py-2 rounded-full text-xs font-black text-emerald-600 shadow-xl">
                                PAGE {currentPage + 1}
                            </div>
                        </div>

                        <div className="w-full md:w-1/2 p-12 md:p-16 flex flex-col justify-between bg-white">
                            {mode === 'story' ? (
                                <>
                                    <div className="space-y-12">
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-8 bg-emerald-500 rounded-full"></div>
                                                <span className="text-emerald-500 font-black text-xs uppercase tracking-widest tracking-tighter">Cloud Tablet Optimized</span>
                                            </div>
                                            <button 
                                                onClick={() => playAudio(currentPage)} 
                                                disabled={audioLoading}
                                                className={`w-16 h-16 rounded-3xl shadow-xl transition-all flex items-center justify-center text-2xl ${audioLoading ? 'bg-slate-100 text-slate-300 animate-pulse' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100 hover:scale-105 active:scale-95'}`}
                                            >
                                                {audioLoading ? '⌛' : '🔊'}
                                            </button>
                                        </div>
                                        <h2 className="text-3xl md:text-5xl font-black text-slate-800 leading-[1.2] tracking-tight">"{storyPages[currentPage].text}"</h2>
                                        <div className="p-10 bg-emerald-50/50 rounded-[3rem] border-2 border-dashed border-emerald-200 italic text-slate-500 text-lg relative">
                                            <span className="absolute -top-4 left-6 bg-emerald-200 text-emerald-700 text-[10px] px-3 py-1 rounded-full font-black">💡 提示</span>
                                            {storyPages[currentPage].hint}
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between mt-12">
                                        <button onClick={() => setCurrentPage(c => Math.max(0, c-1))} disabled={currentPage === 0} className="w-16 h-16 rounded-2xl bg-slate-50 text-slate-400 hover:bg-emerald-50 disabled:opacity-20 transition-all font-black text-2xl">◀</button>
                                        <div className="flex gap-3">
                                            {storyPages.map((_, i) => <div key={i} className={`h-3 rounded-full transition-all duration-500 ${i === currentPage ? 'w-12 bg-emerald-400' : 'w-3 bg-slate-200'}`} />)}
                                        </div>
                                        <button onClick={() => currentPage === storyPages.length - 1 ? setMode('quiz') : setCurrentPage(c => c+1)} className="w-16 h-16 rounded-2xl bg-emerald-600 text-white shadow-xl hover:bg-emerald-700 hover:scale-105 transition-all font-black text-2xl">▶</button>
                                    </div>
                                </>
                            ) : (
                                <div className="h-full flex flex-col justify-center space-y-10">
                                    {!showResult ? (
                                        <>
                                            <h3 className="text-4xl font-black text-slate-800">問題 {quizIndex + 1}</h3>
                                            <p className="text-2xl font-bold text-slate-600">{quizData[quizIndex].question}</p>
                                            <div className="space-y-4">
                                                {quizData[quizIndex].options.map((opt, idx) => (
                                                    <button key={idx} onClick={() => {
                                                        if (selectedOption !== null) return;
                                                        setSelectedOption(idx);
                                                        if (idx === quizData[quizIndex].correct) setScore(s => s + 1);
                                                        setTimeout(() => {
                                                            if (quizIndex < quizData.length - 1) { setQuizIndex(q => q + 1); setSelectedOption(null); }
                                                            else setShowResult(true);
                                                        }, 1500);
                                                    }} className={`w-full text-left p-8 rounded-[2.5rem] border-4 font-black text-xl transition-all shadow-sm ${selectedOption === null ? 'border-slate-100 hover:border-emerald-500 hover:bg-emerald-50 text-slate-600' : idx === quizData[quizIndex].correct ? 'border-emerald-500 bg-emerald-50 text-emerald-700 scale-105 shadow-xl' : 'opacity-40 border-slate-50'}`}>{opt}</button>
                                                ))}
                                            </div>
                                        </>
                                    ) : (
                                        <div className="text-center space-y-10">
                                            <div className="text-8xl animate-bounce">🏆</div>
                                            <h2 className="text-5xl font-black text-slate-800">精彩！得分：{score} / {quizData.length}</h2>
                                            <button onClick={() => window.location.reload()} className="px-16 py-6 bg-slate-900 text-white rounded-[3rem] font-black text-2xl shadow-2xl hover:scale-105 active:scale-95 transition-all">重新開始</button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-3 text-[10px] font-mono flex items-center gap-4 z-50">
                        <span className="bg-emerald-600 px-3 py-1 rounded-full font-black tracking-widest uppercase">Cloud Optimizer v6.0</span>
                        <span className="opacity-80 flex-1 truncate font-bold">{debugMsg}</span>
                        <span className="opacity-30">APP_ID: {appId}</span>
                        <span className="opacity-30">{fbReady ? "Connected to Cloud" : "Connecting..."}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
