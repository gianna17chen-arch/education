<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics [f] Adventure - 小六自然發音學習</title>
    <!-- CDN 加載 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fdf6f0;
        }
        .font-kids {
            font-family: 'ZCOOL KuaiLe', cursive;
        }
        .macaron-pink { background-color: #FFD1DC; }
        .macaron-blue { background-color: #AEC6CF; }
        .macaron-green { background-color: #B2E2D2; }
        .macaron-yellow { background-color: #FDFD96; }
        .macaron-lavender { background-color: #C3B1E1; }
        
        .card-shadow {
            box-shadow: 8px 8px 0px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .card-shadow:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.08);
        }
        
        /* 滾動條樣式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #FFD1DC; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (核心規則: 放置在 root 之後) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React 邏輯 -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 設定與常數 ---
        const themeId = "grade6-phonics-f-sound-v3";
        const apiKey = ""; // 由環境自動注入
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        // --- 教學內容數據 (已增加中文翻譯) ---
        const PHONICS_DATA = [
            { id: "word1", word: "fish", pattern: "f", ipa: "/fɪʃ/", sentence: "The colorful fish is swimming in the tank.", translation: "這隻色彩繽紛的魚正在魚缸裡游泳。", confusable: "dish", category: "f" },
            { id: "word2", word: "flower", pattern: "f", ipa: "/ˈflaʊər/", sentence: "She picked a beautiful flower for her mom.", translation: "她為媽媽採了一朵漂亮的花。", confusable: "tower", category: "f" },
            { id: "word3", word: "phone", pattern: "ph", ipa: "/foʊn/", sentence: "My phone is ringing on the table.", translation: "我的電話正在桌上響著。", confusable: "bone", category: "ph" },
            { id: "word4", word: "photo", pattern: "ph", ipa: "/ˈfoʊtoʊ/", sentence: "Let's take a group photo together!", translation: "讓我們一起拍張團體合照吧！", confusable: "potato", category: "ph" },
            { id: "word5", word: "elephant", pattern: "ph", ipa: "/ˈɛləfənt/", sentence: "The elephant has a very long trunk.", translation: "大象有一個很長的大鼻子。", confusable: "excellent", category: "ph" },
            { id: "word6", word: "dolphin", pattern: "ph", ipa: "/ˈdɔːlfɪn/", sentence: "The dolphin jumped out of the blue sea.", translation: "海豚從藍色的大海中跳了出來。", confusable: "pumpkin", category: "ph" },
            { id: "word7", word: "laugh", pattern: "gh", ipa: "/læf/", sentence: "The funny joke made everyone laugh loudly.", translation: "那個有趣的笑話讓每個人都放聲大笑。", confusable: "tough", category: "gh" },
            { id: "word8", word: "enough", pattern: "gh", ipa: "/ɪˈnʌf/", sentence: "I have had enough cake for today.", translation: "我今天已經吃夠蛋糕了。", confusable: "rough", category: "gh" }
        ];

        // --- Utility Functions ---
        const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

        const fetchWithRetry = async (url, options, retries = 5) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status === 403 && !apiKey) throw new Error("AUTH_ERROR");
                    if (response.status === 429 || response.status >= 500) {
                        const delay = Math.pow(2, i) * 1000;
                        await new Promise(r => setTimeout(r, delay));
                        continue;
                    }
                    throw new Error(`HTTP ${response.status}`);
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
            }
        };

        const pcmToWav = (pcmData, sampleRate = 24000) => {
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length, true);
            const pcmView = new Uint8Array(pcmData);
            new Uint8Array(buffer, 44).set(pcmView);
            return new Blob([buffer], { type: 'audio/wav' });
        };

        // --- Icons ---
        const IconPlay = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>;
        const IconSpeaker = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>;
        const IconCheck = () => <svg className="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>;
        const IconCloud = () => <svg className="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>;
        const IconLoading = () => <svg className="w-4 h-4 animate-spin" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>;

        // --- Main App Component ---
        function App() {
            const [view, setView] = useState('lesson'); // lesson, quiz
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [debugMsg, setDebugMsg] = useState("正在初始化系統...");
            const [isBatching, setIsBatching] = useState(false);
            const [batchProgress, setBatchProgress] = useState(0);
            const [cacheStatus, setCacheStatus] = useState({}); // { wordId: { img: bool, audio: bool, sentence: bool } }
            const [mediaData, setMediaData] = useState({}); // { wordId: { imgUrl, audioUrl, sentenceAudioUrl } }
            
            // Quiz State
            const [quizIndex, setQuizIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [quizFinished, setQuizFinished] = useState(false);

            // 1. Firebase 初始化
            useEffect(() => {
                const checkFB = setInterval(async () => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        try {
                            const app = window.FB.initializeApp(firebaseConfig);
                            const auth = window.FB.getAuth(app);
                            const firestore = window.FB.getFirestore(app);
                            setDb(firestore);
                            
                            window.FB.onAuthStateChanged(auth, (u) => {
                                if (u) {
                                    setUser(u);
                                    setDebugMsg("✅ 系統已就緒，雲端連線成功。");
                                }
                            });

                            const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                            if (initialToken) {
                                try {
                                    await window.FB.signInWithCustomToken(auth, initialToken);
                                } catch (tokenErr) {
                                    await window.FB.signInAnonymously(auth);
                                }
                            } else {
                                await window.FB.signInAnonymously(auth);
                            }
                            
                        } catch (err) {
                            setDebugMsg(`❌ 初始化失敗: ${err.message}`);
                        }
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            // 2. 媒體處理邏輯 (Image Compression)
            const compressImage = (base64) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const maxSide = 512;
                        if (width > height) {
                            if (width > maxSide) { height *= maxSide / width; width = maxSide; }
                        } else {
                            if (height > maxSide) { width *= maxSide / height; height = maxSide; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = base64;
                });
            };

            // 3. API 生成與快取邏輯
            const getOrGenerateMedia = async (item, force = false) => {
                if (!db || !user) return;
                
                const safeId = getSafeId(item.word);
                const safeSentenceId = getSafeId(item.sentence);
                const imgDocRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'image', safeId);
                const audioDocRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'audio', safeId);
                const sentenceDocRef = window.FB.doc(db, 'artifacts', themeId, 'public', 'data', 'sentence_audio', safeSentenceId);

                let currentImg = null;
                let currentAudio = null;
                let currentSentenceAudio = null;

                // Check Cache
                try {
                    const [imgSnap, audioSnap, sentenceSnap] = await Promise.all([
                        window.FB.getDoc(imgDocRef),
                        window.FB.getDoc(audioDocRef),
                        window.FB.getDoc(sentenceDocRef)
                    ]);
                    if (imgSnap.exists()) currentImg = imgSnap.data().url;
                    if (audioSnap.exists()) currentAudio = audioSnap.data().url;
                    if (sentenceSnap.exists()) currentSentenceAudio = sentenceSnap.data().url;
                } catch (e) { console.error("Cache check failed", e); }

                // Generate Image
                if (!currentImg || force) {
                    try {
                        const prompt = `children's picture book style, whimsical, warm and cheerful, storytelling illustrations of a ${item.word}`;
                        const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                            method: 'POST',
                            body: JSON.stringify({ instances: [{ prompt }], parameters: { sampleCount: 1 } })
                        });
                        const data = await response.json();
                        const rawBase64 = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                        currentImg = await compressImage(rawBase64);
                        await window.FB.setDoc(imgDocRef, { url: currentImg, createdAt: Date.now() });
                    } catch (e) { setDebugMsg(`❌ 圖片生成失敗: ${e.message}`); }
                }

                // Generate Word Audio
                if (!currentAudio || force) {
                    try {
                        const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Say clearly: ${item.word}` }] }],
                                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } } }
                            })
                        });
                        const data = await response.json();
                        const pcmBase64 = data.candidates[0].content.parts[0].inlineData.data;
                        const pcmBuffer = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0));
                        const wavBlob = pcmToWav(pcmBuffer);
                        currentAudio = await new Promise(r => {
                            const reader = new FileReader();
                            reader.onloadend = () => r(reader.result);
                            reader.readAsDataURL(wavBlob);
                        });
                        await window.FB.setDoc(audioDocRef, { url: currentAudio, createdAt: Date.now() });
                    } catch (e) { setDebugMsg(`⚠️ 單字語音備援: ${e.message}`); }
                }

                // Generate Sentence Audio
                if (!currentSentenceAudio || force) {
                    try {
                        const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Read slowly: ${item.sentence}` }] }],
                                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                            })
                        });
                        const data = await response.json();
                        const pcmBase64 = data.candidates[0].content.parts[0].inlineData.data;
                        const pcmBuffer = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0));
                        const wavBlob = pcmToWav(pcmBuffer);
                        currentSentenceAudio = await new Promise(r => {
                            const reader = new FileReader();
                            reader.onloadend = () => r(reader.result);
                            reader.readAsDataURL(wavBlob);
                        });
                        await window.FB.setDoc(sentenceDocRef, { url: currentSentenceAudio, createdAt: Date.now() });
                    } catch (e) { setDebugMsg(`⚠️ 例句語音備援: ${e.message}`); }
                }

                setMediaData(prev => ({ 
                    ...prev, 
                    [item.id]: { imgUrl: currentImg, audioUrl: currentAudio, sentenceAudioUrl: currentSentenceAudio } 
                }));
                setCacheStatus(prev => ({ 
                    ...prev, 
                    [item.id]: { img: !!currentImg, audio: !!currentAudio, sentence: !!currentSentenceAudio } 
                }));
            };

            const runBatchProcess = async () => {
                if (isBatching) return;
                setIsBatching(true);
                setBatchProgress(0);
                setDebugMsg("⌛ 正在同步雲端語音與圖片...");
                
                for (let i = 0; i < PHONICS_DATA.length; i++) {
                    await getOrGenerateMedia(PHONICS_DATA[i]);
                    setBatchProgress(Math.round(((i + 1) / PHONICS_DATA.length) * 100));
                }
                
                setIsBatching(false);
                setDebugMsg("✅ 雲端同步完成！您可以聆聽單字與例句了。");
            };

            const playAudio = (itemId, type = 'word') => {
                const data = mediaData[itemId];
                const item = PHONICS_DATA.find(i => i.id === itemId);
                const targetUrl = type === 'word' ? data?.audioUrl : data?.sentenceAudioUrl;
                const targetText = type === 'word' ? item.word : item.sentence;

                if (targetUrl) {
                    const audio = new Audio(targetUrl);
                    audio.play();
                } else {
                    const utterance = new SpeechSynthesisUtterance(targetText);
                    utterance.lang = 'en-US';
                    utterance.rate = type === 'word' ? 1.0 : 0.8;
                    window.speechSynthesis.speak(utterance);
                }
            };

            // --- Quiz Logic ---
            const currentQuestion = useMemo(() => {
                const item = PHONICS_DATA[quizIndex];
                const options = [item.word, item.confusable, ...PHONICS_DATA.filter(i => i.word !== item.word && i.word !== item.confusable).map(i => i.word).slice(0, 2)];
                return {
                    correct: item.word,
                    options: options.sort(() => Math.random() - 0.5),
                    ipa: item.ipa
                };
            }, [quizIndex]);

            const handleAnswer = (ans) => {
                if (ans === currentQuestion.correct) setScore(s => s + 1);
                if (quizIndex < PHONICS_DATA.length - 1) {
                    setQuizIndex(quizIndex + 1);
                } else {
                    setQuizFinished(true);
                }
            };

            return (
                <div className="min-h-screen pb-24 p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center bg-white rounded-3xl p-6 border-b-4 border-pink-200">
                        <div>
                            <h1 className="text-4xl font-kids text-pink-500 mb-2">Phonics [f] Adventure</h1>
                            <p className="text-gray-500">Master f, ph, and gh sounds with full sentence reading!</p>
                        </div>
                        <div className="flex gap-4 mt-4 md:mt-0">
                            <button 
                                onClick={() => setView('lesson')}
                                className={`px-6 py-2 rounded-full font-bold transition ${view === 'lesson' ? 'macaron-pink text-white shadow-lg' : 'bg-gray-100 text-gray-400'}`}
                            >
                                📖 學習單字
                            </button>
                            <button 
                                onClick={() => setView('quiz')}
                                className={`px-6 py-2 rounded-full font-bold transition ${view === 'quiz' ? 'macaron-blue text-white shadow-lg' : 'bg-gray-100 text-gray-400'}`}
                            >
                                🎯 互動測驗
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto">
                        {view === 'lesson' ? (
                            <section>
                                <div className="mb-6 flex justify-between items-center">
                                    <h2 className="text-2xl font-bold text-gray-700">單字教學區 (含例句朗讀)</h2>
                                    <button 
                                        onClick={runBatchProcess}
                                        disabled={isBatching}
                                        className="flex items-center gap-2 bg-white px-4 py-2 rounded-xl border-2 border-pink-300 text-pink-500 hover:bg-pink-50 disabled:opacity-50"
                                    >
                                        {isBatching ? <IconLoading /> : <IconCloud />}
                                        {isBatching ? `資源同步中 ${batchProgress}%` : '一鍵預載全站語音與插圖'}
                                    </button>
                                </div>
                                
                                {isBatching && (
                                    <div className="w-full bg-gray-200 rounded-full h-2.5 mb-6">
                                        <div className="bg-pink-400 h-2.5 rounded-full transition-all duration-300" style={{ width: `${batchProgress}%` }}></div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {PHONICS_DATA.map((item) => (
                                        <div key={item.id} className="bg-white rounded-3xl overflow-hidden card-shadow border border-pink-100 flex flex-col">
                                            <div className="h-48 bg-pink-50 relative flex items-center justify-center overflow-hidden">
                                                {mediaData[item.id]?.imgUrl ? (
                                                    <img src={mediaData[item.id].imgUrl} className="w-full h-full object-cover" alt={item.word} />
                                                ) : (
                                                    <div className="flex flex-col items-center text-pink-200">
                                                        <svg className="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"></path></svg>
                                                        <span className="text-xs mt-2 font-bold uppercase tracking-widest">Awaiting AI</span>
                                                    </div>
                                                )}
                                                <div className="absolute top-2 right-2 flex gap-1">
                                                    {cacheStatus[item.id]?.img && <span title="圖片已快取" className="bg-white/90 p-1 rounded-full"><IconCheck /></span>}
                                                    {cacheStatus[item.id]?.audio && cacheStatus[item.id]?.sentence && <span title="語音已快取" className="bg-white/90 p-1 rounded-full text-blue-500 font-bold text-[10px] flex items-center justify-center w-6 h-6">HQ</span>}
                                                </div>
                                            </div>
                                            
                                            <div className="p-5 flex-1 flex flex-col">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <span className="text-[10px] font-bold text-pink-400 bg-pink-50 px-2 py-0.5 rounded-full uppercase tracking-widest">[{item.pattern}] Sound</span>
                                                        <h3 className="text-2xl font-kids text-gray-800 mt-1">{item.word}</h3>
                                                        <p className="text-sm text-gray-400 italic font-mono">{item.ipa}</p>
                                                    </div>
                                                    <button 
                                                        onClick={() => playAudio(item.id, 'word')}
                                                        className="p-3 bg-pink-400 text-white rounded-2xl shadow-md hover:bg-pink-500 transition hover:scale-105"
                                                        title="播放單字"
                                                    >
                                                        <IconPlay />
                                                    </button>
                                                </div>
                                                
                                                {/* 例句區塊：已加入中文翻譯顯示 */}
                                                <div className="mt-4 p-4 bg-gray-50 rounded-2xl text-sm text-gray-600 italic relative group">
                                                    <span className="block pr-6 leading-relaxed">"{item.sentence}"</span>
                                                    <span className="block text-xs text-gray-400 mt-1 not-italic font-sans">{item.translation}</span>
                                                    <button 
                                                        onClick={() => playAudio(item.id, 'sentence')}
                                                        className="absolute bottom-2 right-2 p-1.5 bg-blue-100 text-blue-500 rounded-lg hover:bg-blue-200 transition"
                                                        title="播放例句"
                                                    >
                                                        <IconSpeaker />
                                                    </button>
                                                </div>
                                                
                                                <div className="mt-4 flex items-center gap-2 text-[11px] text-orange-400 bg-orange-50 p-2 rounded-xl border border-orange-100">
                                                    <span className="font-bold">Focus:</span>
                                                    <span>Don't mix up with <strong className="underline">{item.confusable}</strong></span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ) : (
                            <section className="max-w-2xl mx-auto bg-white rounded-3xl p-8 card-shadow border border-blue-100">
                                {!quizFinished ? (
                                    <>
                                        <div className="flex justify-between items-center mb-8">
                                            <span className="text-blue-500 font-bold px-4 py-1 bg-blue-50 rounded-full">Question {quizIndex + 1} / {PHONICS_DATA.length}</span>
                                            <span className="bg-yellow-100 text-yellow-600 px-4 py-1 rounded-full font-bold">Score: {score}</span>
                                        </div>
                                        
                                        <div className="text-center mb-10">
                                            <p className="text-gray-500 mb-4">Listen carefully and pick the correct word:</p>
                                            <button 
                                                onClick={() => playAudio(PHONICS_DATA[quizIndex].id, 'word')}
                                                className="mx-auto w-24 h-24 bg-blue-400 text-white rounded-full flex items-center justify-center shadow-xl hover:scale-110 active:scale-95 transition"
                                            >
                                                <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                                            </button>
                                            <p className="mt-4 text-blue-300 font-bold tracking-widest text-lg">{currentQuestion.ipa}</p>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {currentQuestion.options.map((opt, i) => (
                                                <button 
                                                    key={i}
                                                    onClick={() => handleAnswer(opt)}
                                                    className="p-5 rounded-3xl border-2 border-gray-100 hover:border-blue-300 hover:bg-blue-50 text-2xl font-kids text-gray-700 transition transform hover:-translate-y-1 shadow-sm"
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-10">
                                        <h2 className="text-5xl font-kids text-blue-500 mb-6">Great Job!</h2>
                                        <div className="text-8xl mb-8 transform hover:rotate-12 transition">🎉</div>
                                        <p className="text-3xl mb-10 text-gray-600 font-bold">Your Score: <span className="text-blue-500 underline">{score} / {PHONICS_DATA.length}</span></p>
                                        <button 
                                            onClick={() => { setQuizIndex(0); setScore(0); setQuizFinished(false); }}
                                            className="bg-blue-500 text-white px-12 py-4 rounded-full font-bold text-xl hover:bg-blue-600 transition shadow-lg"
                                        >
                                            Play Again
                                        </button>
                                    </div>
                                )}
                            </section>
                        )}
                    </main>

                    {/* Debug Bar */}
                    <div className="fixed bottom-0 left-0 right-0 bg-gray-900 text-white px-6 py-2 text-xs flex justify-between items-center opacity-95 z-50 shadow-2xl border-t border-gray-700">
                        <div className="flex items-center gap-3">
                            <div className="relative flex h-3 w-3">
                                <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${user ? 'bg-green-400' : 'bg-red-400'}`}></span>
                                <span className={`relative inline-flex rounded-full h-3 w-3 ${user ? 'bg-green-500' : 'bg-red-500'}`}></span>
                            </div>
                            <span className="font-mono">{debugMsg}</span>
                        </div>
                        <div className="hidden lg:flex items-center gap-4 text-gray-400 italic">
                            <span>ID: {themeId}</span>
                            <span className="bg-gray-700 px-2 py-0.5 rounded text-blue-300">{user ? user.uid : 'Authenticating...'}</span>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Render App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
