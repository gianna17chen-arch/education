<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tr. Mimi's Phonics Lab - /f/ Sound Trio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons (via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-from-right { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes zoom-in { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
        .animate-slide-in { animation: slide-in-from-right 0.5s ease-out forwards; }
        .animate-zoom-in { animation: zoom-in 0.5s ease-out forwards; }
        .animate-shake { animation: shake 0.3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <!-- Firebase SDK (Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 掛載到全域變數 FB
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        const APP_ID = "phonics-f-ph-gh-tr-mimi-v1";
        const API_KEY = ""; // Gemini API Key

        const PHONICS_DATA = {
            f: [
                { word: 'fish', image: '🐟', audioText: 'F, f, fish' },
                { word: 'fan', image: '🌬️', audioText: 'F, f, fan' },
                { word: 'frog', image: '🐸', audioText: 'F, f, frog' },
                { word: 'leaf', image: '🍃', audioText: 'Leaf' },
            ],
            ph: [
                { word: 'phone', image: '📱', audioText: 'P, H, phone' },
                { word: 'dolphin', image: '🐬', audioText: 'Dolphin' },
                { word: 'elephant', image: '🐘', audioText: 'Elephant' },
                { word: 'photo', image: '📸', audioText: 'Photo' },
            ],
            gh: [
                { word: 'laugh', image: '😂', audioText: 'Laugh' },
                { word: 'cough', image: '😫', audioText: 'Cough' },
                { word: 'rough', image: '🧱', audioText: 'Rough' },
                { word: 'tough', image: '💪', audioText: 'Tough' },
            ]
        };

        const App = () => {
            const [currentStep, setCurrentStep] = useState('welcome');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [gameFeedback, setGameFeedback] = useState(null);
            const [currentGameIndex, setCurrentGameIndex] = useState(0);
            const [shuffledGameWords, setShuffledGameWords] = useState([]);
            
            // Firebase & System State
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [debugMsg, setDebugMsg] = useState("正在啟動系統...");
            const [isAudioLoading, setIsAudioLoading] = useState(null); // word string

            // --- 1. Firebase Initialization (Polling) ---
            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.FB) {
                        clearInterval(checkFB);
                        initFirebase();
                    }
                }, 500);
                return () => clearInterval(checkFB);
            }, []);

            const initFirebase = async () => {
                try {
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.FB;
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const firestore = getFirestore(app);
                    setDb(firestore);

                    onAuthStateChanged(auth, (u) => {
                        if (u) {
                            setUser(u);
                            setDebugMsg(`✅ 雲端連線成功: ${u.uid}`);
                        } else {
                            signInAnonymously(auth);
                        }
                    });
                } catch (err) {
                    setDebugMsg(`❌ Firebase 初始化失敗: ${err.message}`);
                }
            };

            // --- 2. Helper: Safe ID Encoding ---
            const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/[/+=]/g, '_');

            // --- 3. Audio Logic (Cache-First) ---
            const playAudio = async (text) => {
                if (!db || !user) {
                    setDebugMsg("⌛ 請等待雲端系統連線...");
                    return;
                }

                setIsAudioLoading(text);
                const safeId = getSafeId(text);
                const docRef = window.FB.doc(db, 'artifacts', APP_ID, 'public', 'data', 'audio_cache', safeId);

                try {
                    // (A) Check Cache
                    setDebugMsg(`🔍 正在檢查快取: ${text}`);
                    const cacheSnap = await window.FB.getDoc(docRef);
                    
                    let pcmBase64 = "";

                    if (cacheSnap.exists()) {
                        setDebugMsg(`✅ 命中快取: ${text}`);
                        pcmBase64 = cacheSnap.data().pcmData;
                    } else {
                        // (B) Generate via API if Cache Missing
                        if (!API_KEY) {
                            setDebugMsg("❌ 快取不存在且無 API Key，請先生成語音。");
                            setIsAudioLoading(null);
                            return;
                        }

                        setDebugMsg(`🔊 正在從 API 生成語音: ${text}`);
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${API_KEY}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Say clearly: ${text}` }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                                },
                                model: "gemini-2.5-flash-preview-tts"
                            })
                        });

                        const result = await response.json();
                        pcmBase64 = result.candidates[0].content.parts[0].inlineData.data;

                        // (C) Save to Cache
                        await window.FB.setDoc(docRef, {
                            word: text,
                            pcmData: pcmBase64,
                            createdAt: new Date().toISOString()
                        });
                        setDebugMsg(`💾 已儲存快取: ${text}`);
                    }

                    // Play Audio
                    const audioBlob = pcmToWav(pcmBase64, 24000);
                    const url = URL.createObjectURL(audioBlob);
                    const audio = new Audio(url);
                    audio.onended = () => setIsAudioLoading(null);
                    audio.play();

                } catch (err) {
                    setDebugMsg(`❌ 語音播放錯誤: ${err.message}`);
                    setIsAudioLoading(null);
                }
            };

            const pcmToWav = (base64Pcm, sampleRate) => {
                const binaryString = window.atob(base64Pcm);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
                const buffer = new ArrayBuffer(44 + bytes.length);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + bytes.length, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, bytes.length, true);
                const pcmData = new Uint8Array(buffer, 44);
                pcmData.set(bytes);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            // --- 4. Game Logic ---
            const startMixedGame = () => {
                const all = [
                    ...PHONICS_DATA.f.map(w => ({...w, type: 'f'})),
                    ...PHONICS_DATA.ph.map(w => ({...w, type: 'ph'})),
                    ...PHONICS_DATA.gh.map(w => ({...w, type: 'gh'}))
                ];
                setShuffledGameWords(all.sort(() => Math.random() - 0.5));
                setScore(0);
                setCurrentGameIndex(0);
                setCurrentStep('game');
                playAudio("Let's start the challenge!");
            };

            const handleGameChoice = (type) => {
                const current = shuffledGameWords[currentGameIndex];
                if (type === current.type) {
                    setScore(prev => prev + 10);
                    setGameFeedback('correct');
                    playAudio("Correct!");
                } else {
                    setGameFeedback('wrong');
                    playAudio("Try again!");
                }

                setTimeout(() => {
                    setGameFeedback(null);
                    if (currentGameIndex < shuffledGameWords.length - 1) {
                        setCurrentGameIndex(prev => prev + 1);
                    } else {
                        setCurrentStep('summary');
                        playAudio(`Your final score is ${score + (type === current.type ? 10 : 0)}`);
                    }
                }, 1500);
            };

            // --- UI Screens ---

            const WelcomeScreen = () => (
                <div className="flex flex-col items-center justify-center space-y-8 animate-fade-in py-12">
                    <div className="text-8xl mb-4">🎨</div>
                    <h1 className="text-5xl md:text-7xl font-black text-blue-600 text-center">
                        The /f/ Phonics Lab
                    </h1>
                    <p className="text-xl text-slate-500 text-center max-w-lg">
                        Learn 3 ways to spell the /f/ sound with Tr. Mimi!
                    </p>
                    <button 
                        onClick={() => { setCurrentStep('menu'); playAudio("Choose a letter to start!"); }}
                        className="px-12 py-5 bg-blue-500 text-white rounded-full text-2xl font-bold hover:bg-blue-600 transition-all shadow-xl hover:-translate-y-1"
                    >
                        Enter Lab 🚀
                    </button>
                </div>
            );

            const MenuScreen = () => (
                <div className="w-full max-w-4xl mx-auto p-4 animate-zoom-in">
                    <h2 className="text-4xl font-black text-center text-slate-800 mb-12 flex items-center justify-center gap-3">
                        <i className="lucide-layout-grid text-blue-500"></i> Lesson Directory
                    </h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                        {['f', 'ph', 'gh'].map((type) => (
                            <button
                                key={type}
                                onClick={() => {
                                    setSelectedCategory(type);
                                    setCurrentStep('list');
                                    playAudio(`The letters ${type} make the f sound.`);
                                }}
                                className="group bg-white p-10 rounded-3xl shadow-lg border-4 border-transparent hover:border-blue-400 transition-all transform hover:-translate-y-2 flex flex-col items-center"
                            >
                                <div className={`text-7xl font-black mb-4 group-hover:scale-110 transition-transform ${
                                    type === 'f' ? 'text-orange-500' : type === 'ph' ? 'text-purple-500' : 'text-green-500'
                                }`}>{type}</div>
                                <div className="text-slate-400 font-bold uppercase tracking-widest text-sm">Pattern</div>
                            </button>
                        ))}
                    </div>

                    <div className="flex justify-center">
                        <button 
                            onClick={startMixedGame}
                            className="px-12 py-5 bg-green-500 text-white rounded-full text-2xl font-bold hover:bg-green-600 flex items-center gap-3 shadow-lg transform hover:scale-105 transition-all animate-pulse"
                        >
                            <i className="lucide-gamepad-2"></i> Mixed Challenge!
                        </button>
                    </div>
                </div>
            );

            const WordListScreen = () => {
                const data = PHONICS_DATA[selectedCategory];
                return (
                    <div className="w-full max-w-4xl mx-auto p-4 animate-fade-in">
                        <div className="flex items-center justify-between mb-8">
                            <button onClick={() => setCurrentStep('menu')} className="flex items-center gap-2 text-blue-600 font-bold hover:underline">
                                <i className="lucide-arrow-left"></i> Back
                            </button>
                            <div className={`px-6 py-2 rounded-full font-black text-white text-xl ${
                                selectedCategory === 'f' ? 'bg-orange-500' : selectedCategory === 'ph' ? 'bg-purple-500' : 'bg-green-500'
                            }`}>
                                {selectedCategory.toUpperCase()} Word Bank
                            </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
                            {data.map((item, idx) => (
                                <div 
                                    key={idx} 
                                    className="bg-white p-8 rounded-3xl shadow-md border-2 border-slate-100 flex flex-col items-center hover:scale-105 transition-transform cursor-pointer group"
                                    onClick={() => playAudio(item.word)}
                                >
                                    <div className="text-6xl mb-4 group-hover:rotate-12 transition-transform">{item.image}</div>
                                    <div className="text-2xl font-black text-slate-800 capitalize">{item.word}</div>
                                    {isAudioLoading === item.word && <span className="text-xs text-blue-400 mt-2 animate-pulse">🔊 Playing...</span>}
                                </div>
                            ))}
                        </div>

                        <div className="flex justify-center">
                            <button 
                                onClick={() => { setCurrentCardIndex(0); setCurrentStep('study'); }}
                                className="px-10 py-5 bg-blue-500 text-white rounded-2xl text-xl font-bold hover:bg-blue-600 flex items-center gap-2 shadow-lg"
                            >
                                Practice Flashcards <i className="lucide-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                );
            };

            const StudyScreen = () => {
                const data = PHONICS_DATA[selectedCategory];
                const card = data[currentCardIndex];
                return (
                    <div className="w-full max-w-4xl mx-auto p-4 animate-slide-in">
                        <div className="flex items-center justify-between mb-8">
                            <button onClick={() => setCurrentStep('list')} className="text-blue-600 font-bold hover:underline flex items-center gap-2">
                                <i className="lucide-list"></i> Word Bank
                            </button>
                            <div className="text-slate-400 font-bold">{currentCardIndex + 1} / {data.length}</div>
                        </div>

                        <div className="bg-white rounded-[40px] shadow-2xl p-16 flex flex-col items-center justify-center min-h-[500px] border-b-8 border-slate-200">
                            <div className="text-9xl mb-12 transform hover:scale-110 transition-transform cursor-pointer" onClick={() => playAudio(card.word)}>
                                {card.image}
                            </div>
                            <div className="text-8xl font-black tracking-widest mb-8 uppercase">
                                {card.word.split('').map((char, idx) => {
                                    const word = card.word.toLowerCase();
                                    const type = selectedCategory;
                                    const startIdx = word.indexOf(type);
                                    const isHighlight = startIdx !== -1 && idx >= startIdx && idx < startIdx + type.length;
                                    return (
                                        <span key={idx} className={isHighlight ? 'text-red-500 underline decoration-4 underline-offset-8' : 'text-slate-800'}>
                                            {char}
                                        </span>
                                    );
                                })}
                            </div>
                            <button 
                                onClick={() => playAudio(card.audioText)}
                                className={`p-8 rounded-full transition-all shadow-inner ${isAudioLoading === card.audioText ? 'bg-blue-200 animate-pulse' : 'bg-blue-50 hover:bg-blue-100'}`}
                            >
                                <i className={`lucide-volume-2 text-blue-600 ${isAudioLoading === card.audioText ? 'animate-bounce' : ''}`} style={{width: 48, height: 48}}></i>
                            </button>
                        </div>

                        <div className="flex justify-between mt-10">
                            <button 
                                disabled={currentCardIndex === 0}
                                onClick={() => setCurrentCardIndex(prev => prev - 1)}
                                className="px-8 py-4 rounded-2xl bg-white border-2 border-slate-200 font-bold disabled:opacity-30 flex items-center gap-2"
                            >
                                <i className="lucide-chevron-left"></i> Previous
                            </button>
                            {currentCardIndex < data.length - 1 ? (
                                <button onClick={() => setCurrentCardIndex(prev => prev + 1)} className="px-8 py-4 rounded-2xl bg-blue-500 text-white font-bold flex items-center gap-2">
                                    Next <i className="lucide-chevron-right"></i>
                                </button>
                            ) : (
                                <button onClick={() => setCurrentStep('menu')} className="px-8 py-4 rounded-2xl bg-green-500 text-white font-bold flex items-center gap-2">
                                    Finish <i className="lucide-check"></i>
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const GameScreen = () => {
                if (shuffledGameWords.length === 0) return null;
                const word = shuffledGameWords[currentGameIndex];
                return (
                    <div className="w-full max-w-4xl mx-auto p-4 text-center animate-zoom-in">
                        <div className="flex justify-between items-center mb-10">
                            <div className="bg-yellow-100 px-6 py-2 rounded-full font-bold text-yellow-700 flex items-center gap-2 border-2 border-yellow-200 shadow-sm">
                                <i className="lucide-star fill-current text-yellow-500"></i> Score: {score}
                            </div>
                            <div className="text-slate-400 font-bold">Progress: {currentGameIndex + 1}/{shuffledGameWords.length}</div>
                        </div>

                        <div className={`relative bg-white rounded-[40px] shadow-xl p-20 mb-12 border-4 transition-all duration-300 ${
                            gameFeedback === 'correct' ? 'border-green-400 bg-green-50' : 
                            gameFeedback === 'wrong' ? 'border-red-400 bg-red-50' : 'border-slate-100'
                        }`}>
                            <div className="text-9xl mb-8">{word.image}</div>
                            <div className="text-7xl font-black text-slate-800 tracking-[0.5em] uppercase pl-4">
                                {word.word.toLowerCase().replace(word.type, ' _ ')}
                            </div>
                            
                            {gameFeedback === 'correct' && <div className="absolute top-8 right-8 text-7xl animate-bounce">✅</div>}
                            {gameFeedback === 'wrong' && <div className="absolute top-8 right-8 text-7xl animate-shake">❌</div>}
                        </div>

                        <div className="grid grid-cols-3 gap-8">
                            {['f', 'ph', 'gh'].map((type) => (
                                <button
                                    key={type}
                                    onClick={() => handleGameChoice(type)}
                                    disabled={!!gameFeedback}
                                    className={`py-10 rounded-3xl text-5xl font-black shadow-lg transition-all transform hover:-translate-y-2 active:scale-95 ${
                                        type === 'f' ? 'bg-orange-100 text-orange-600 hover:bg-orange-200' :
                                        type === 'ph' ? 'bg-purple-100 text-purple-600 hover:bg-purple-200' :
                                        'bg-green-100 text-green-600 hover:bg-green-200'
                                    }`}
                                >
                                    {type}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };

            const SummaryScreen = () => (
                <div className="flex flex-col items-center justify-center space-y-10 animate-zoom-in py-12">
                    <div className="text-9xl animate-bounce">🏆</div>
                    <h1 className="text-6xl font-black text-blue-600 text-center">Fantastic!</h1>
                    <p className="text-3xl font-bold text-slate-600">Final Score: {score} / 120</p>
                    <button 
                        onClick={() => setCurrentStep('menu')}
                        className="px-12 py-5 bg-blue-500 text-white rounded-full text-2xl font-bold hover:bg-blue-600 flex items-center gap-3 shadow-xl transform hover:scale-105 transition-all"
                    >
                        <i className="lucide-refresh-cw"></i> Try Again
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <nav className="fixed top-0 left-0 w-full p-6 bg-white/90 backdrop-blur-md border-b-2 border-slate-100 z-50 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3 font-black text-2xl text-blue-600 cursor-pointer" onClick={() => setCurrentStep('welcome')}>
                            <div className="bg-blue-600 text-white p-2 rounded-lg">
                                <i className="lucide-graduation-cap"></i>
                            </div>
                            <span>TR. MIMI'S LAB</span>
                        </div>
                        <div className="flex gap-2">
                            {user ? <span className="text-xs font-bold text-green-500 bg-green-50 px-3 py-1 rounded-full border border-green-200">● Cloud Connected</span> : <span className="text-xs font-bold text-slate-400">● Offline</span>}
                        </div>
                    </nav>

                    <main className="mt-28 flex flex-col items-center">
                        {currentStep === 'welcome' && <WelcomeScreen />}
                        {currentStep === 'menu' && <MenuScreen />}
                        {currentStep === 'list' && <WordListScreen />}
                        {currentStep === 'study' && <StudyScreen />}
                        {currentStep === 'game' && <GameScreen />}
                        {currentStep === 'summary' && <SummaryScreen />}
                    </main>

                    {/* Debug Bar */}
                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 text-slate-300 text-[10px] px-4 py-1 flex justify-between items-center font-mono opacity-80 hover:opacity-100 transition-opacity z-[100]">
                        <div className="flex gap-4">
                            <span>ID: {APP_ID}</span>
                            <span className={debugMsg.includes('❌') ? 'text-red-400 font-bold' : ''}>{debugMsg}</span>
                        </div>
                        <div className="flex gap-2">
                            <span>UID: {user?.uid || 'guest'}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
