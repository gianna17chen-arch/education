<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tr. Mimi's Phonics Lab - /f/ Sound Trio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in-from-right { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes zoom-in { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
        .animate-slide-in { animation: slide-in-from-right 0.5s ease-out forwards; }
        .animate-zoom-in { animation: zoom-in 0.5s ease-out forwards; }
        .animate-shake { animation: shake 0.3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <!-- Firebase SDK (Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, getDoc, setDoc, collection };
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBnjfbh1ow4j6gXBP9XeBQkCt_cs7Uv3ds",
            authDomain: "education-b38d5.firebaseapp.com",
            projectId: "education-b38d5",
            storageBucket: "education-b38d5.firebasestorage.app",
            messagingSenderId: "450320441540",
            appId: "1:450320441540:web:888014b1380a473a142991",
            measurementId: "G-70DQ70W0B8"
        };

        const APP_ID = "phonics-f-ph-gh-tr-mimi-v1";
        const apiKey = ""; // The environment provides the key at runtime

        const PHONICS_DATA = {
            f: [
                { word: 'fish', image: '🐟', audioText: 'F, f, fish' },
                { word: 'fan', image: '🪭', audioText: 'F, f, fan' },
                { word: 'frog', image: '🐸', audioText: 'F, f, frog' },
                { word: 'leaf', image: '🍃', audioText: 'Leaf' },
            ],
            ph: [
                { word: 'phone', image: '📱', audioText: 'P, H, phone' },
                { word: 'dolphin', image: '🐬', audioText: 'Dolphin' },
                { word: 'elephant', image: '🐘', audioText: 'Elephant' },
                { word: 'photo', image: '📸', audioText: 'Photo' },
            ],
            gh: [
                { word: 'laugh', image: '😂', audioText: 'Laugh' },
                { word: 'cough', image: '😫', audioText: 'Cough' },
                { word: 'rough', image: '🧱', audioText: 'Rough' },
                { word: 'tough', image: '💪', audioText: 'Tough' },
            ]
        };

        const App = () => {
            const [currentStep, setCurrentStep] = useState('welcome');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [gameFeedback, setGameFeedback] = useState(null);
            const [currentGameIndex, setCurrentGameIndex] = useState(0);
            const [shuffledGameWords, setShuffledGameWords] = useState([]);
            
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [debugMsg, setDebugMsg] = useState("系統初始化中...");
            const [isAudioLoading, setIsAudioLoading] = useState(null);

            // --- 1. Firebase Initialization ---
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.FB) {
                        clearInterval(interval);
                        initFirebase();
                    }
                }, 500);
                return () => clearInterval(interval);
            }, []);

            const initFirebase = async () => {
                try {
                    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, signInWithCustomToken } = window.FB;
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const firestore = getFirestore(app);
                    setDb(firestore);

                    // Robust Auth Flow: Try Custom Token, then Anonymous
                    const attemptLogin = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                setDebugMsg("🔑 嘗試使用 Token 登入...");
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }
                        } catch (e) {
                            console.warn("Auth token error, switching to anonymous:", e.message);
                            setDebugMsg("⚠️ Token 不匹配，切換至匿名模式...");
                            await signInAnonymously(auth);
                        }
                    };

                    await attemptLogin();

                    onAuthStateChanged(auth, (u) => {
                        if (u) {
                            setUser(u);
                            setDebugMsg(`✅ 已連線: ${u.uid}`);
                        }
                    });
                } catch (err) {
                    setDebugMsg(`❌ 初始化錯誤: ${err.message}`);
                }
            };

            const getSafeId = (text) => btoa(unescape(encodeURIComponent(text))).replace(/[/+=]/g, '_');

            // --- 2. Audio Service ---
            const playAudio = async (text, retryCount = 0) => {
                if (!db || !user) {
                    setDebugMsg("⌛ 等待雲端連線中...");
                    return;
                }

                setIsAudioLoading(text);
                const safeId = getSafeId(text);
                const docRef = window.FB.doc(db, 'artifacts', APP_ID, 'public', 'data', 'audio_cache', safeId);

                try {
                    setDebugMsg(`🔍 檢查快取: ${text}`);
                    const cacheSnap = await window.FB.getDoc(docRef);
                    
                    let pcmBase64 = "";

                    if (cacheSnap.exists()) {
                        setDebugMsg(`✅ 命中快取: ${text}`);
                        pcmBase64 = cacheSnap.data().pcmData;
                    } else {
                        setDebugMsg(`🔊 生成新語音: ${text}`);
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Say in a clear, teacher-like voice: ${text}` }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                                },
                                model: "gemini-2.5-flash-preview-tts"
                            })
                        });

                        if (!response.ok) {
                            if (retryCount < 5) {
                                const delay = Math.pow(2, retryCount) * 1000;
                                setTimeout(() => playAudio(text, retryCount + 1), delay);
                                return;
                            }
                            throw new Error("API 忙碌中");
                        }

                        const result = await response.json();
                        pcmBase64 = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;

                        if (pcmBase64) {
                            await window.FB.setDoc(docRef, {
                                word: text,
                                pcmData: pcmBase64,
                                createdAt: new Date().toISOString()
                            });
                            setDebugMsg(`💾 已快取新語音: ${text}`);
                        }
                    }

                    if (pcmBase64) {
                        const audioBlob = pcmToWav(pcmBase64, 24000);
                        const url = URL.createObjectURL(audioBlob);
                        const audio = new Audio(url);
                        audio.onended = () => setIsAudioLoading(null);
                        audio.play();
                    }

                } catch (err) {
                    setDebugMsg(`❌ 錯誤: ${err.message}`);
                    setIsAudioLoading(null);
                }
            };

            const pcmToWav = (base64Pcm, sampleRate) => {
                const binaryString = window.atob(base64Pcm);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                const buffer = new ArrayBuffer(44 + bytes.length);
                const view = new DataView(buffer);
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
                };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + bytes.length, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, bytes.length, true);
                new Uint8Array(buffer, 44).set(bytes);
                return new Blob([buffer], { type: 'audio/wav' });
            };

            // --- 3. View Logic ---
            const startMixedGame = () => {
                const all = [
                    ...PHONICS_DATA.f.map(w => ({...w, type: 'f'})),
                    ...PHONICS_DATA.ph.map(w => ({...w, type: 'ph'})),
                    ...PHONICS_DATA.gh.map(w => ({...w, type: 'gh'}))
                ];
                setShuffledGameWords(all.sort(() => Math.random() - 0.5));
                setScore(0);
                setCurrentGameIndex(0);
                setCurrentStep('game');
                playAudio("Ready? Go!");
            };

            // --- UI Screens ---
            const WelcomeScreen = () => (
                <div className="flex flex-col items-center justify-center space-y-8 animate-fade-in py-12">
                    <div className="text-8xl mb-4">🏫</div>
                    <h1 className="text-5xl md:text-7xl font-black text-blue-600 text-center uppercase tracking-tight">
                        Phonics Trio
                    </h1>
                    <p className="text-xl text-slate-500 text-center font-medium">
                        Master the <span className="text-red-500 font-bold">/f/</span> sound with Tr. Mimi
                    </p>
                    <button 
                        onClick={() => { setCurrentStep('menu'); playAudio("Welcome to class!"); }}
                        className="px-14 py-6 bg-blue-500 text-white rounded-full text-2xl font-bold hover:bg-blue-600 transition-all shadow-xl hover:-translate-y-1 active:scale-95"
                    >
                        Start Learning 🚀
                    </button>
                </div>
            );

            const MenuScreen = () => (
                <div className="w-full max-w-4xl mx-auto p-4 animate-zoom-in">
                    <h2 className="text-4xl font-black text-center text-slate-800 mb-12 uppercase tracking-widest">
                        Choose a Pattern
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                        {['f', 'ph', 'gh'].map((type) => (
                            <button
                                key={type}
                                onClick={() => {
                                    setSelectedCategory(type);
                                    setCurrentStep('list');
                                    playAudio(`The letter pattern ${type}.`);
                                }}
                                className="group bg-white p-12 rounded-[40px] shadow-lg border-4 border-transparent hover:border-blue-400 transition-all flex flex-col items-center"
                            >
                                <div className={`text-8xl font-black mb-4 group-hover:scale-110 transition-transform ${
                                    type === 'f' ? 'text-orange-500' : type === 'ph' ? 'text-purple-500' : 'text-green-500'
                                }`}>{type}</div>
                                <div className="text-slate-400 font-bold tracking-widest text-xs">PRACTICE</div>
                            </button>
                        ))}
                    </div>
                    <div className="flex justify-center">
                        <button onClick={startMixedGame} className="px-12 py-5 bg-green-500 text-white rounded-full text-2xl font-bold hover:bg-green-600 flex items-center gap-3 shadow-lg animate-pulse">
                            <i className="lucide-gamepad-2"></i> Play Mixed Game
                        </button>
                    </div>
                </div>
            );

            const WordListScreen = () => (
                <div className="w-full max-w-5xl mx-auto p-4 animate-fade-in">
                    <div className="flex items-center justify-between mb-8">
                        <button onClick={() => setCurrentStep('menu')} className="flex items-center gap-2 text-blue-600 font-bold hover:underline">
                            <i className="lucide-arrow-left"></i> Back to Menu
                        </button>
                        <div className={`px-8 py-3 rounded-full font-black text-white text-2xl shadow-lg ${
                            selectedCategory === 'f' ? 'bg-orange-500' : selectedCategory === 'ph' ? 'bg-purple-500' : 'bg-green-500'
                        }`}>
                            {selectedCategory?.toUpperCase()} Bank
                        </div>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-8 mb-12">
                        {PHONICS_DATA[selectedCategory].map((item, idx) => (
                            <div key={idx} className="bg-white p-10 rounded-3xl shadow-sm border-2 border-slate-100 flex flex-col items-center hover:shadow-xl transition-all cursor-pointer group" onClick={() => playAudio(item.word)}>
                                <div className="text-7xl mb-4 group-hover:scale-110 transition-transform">{item.image}</div>
                                <div className="text-3xl font-black text-slate-800 capitalize">{item.word}</div>
                                {isAudioLoading === item.word && <div className="w-4 h-4 bg-blue-500 rounded-full animate-ping mt-2"></div>}
                            </div>
                        ))}
                    </div>
                    <div className="flex justify-center">
                        <button onClick={() => { setCurrentCardIndex(0); setCurrentStep('study'); }} className="px-12 py-5 bg-blue-500 text-white rounded-2xl text-xl font-bold hover:bg-blue-600 shadow-xl flex items-center gap-2">
                            Step-by-Step Practice <i className="lucide-chevron-right"></i>
                        </button>
                    </div>
                </div>
            );

            const StudyScreen = () => {
                const card = PHONICS_DATA[selectedCategory][currentCardIndex];
                return (
                    <div className="w-full max-w-4xl mx-auto p-4 animate-slide-in">
                        <div className="flex items-center justify-between mb-8">
                            <button onClick={() => setCurrentStep('list')} className="text-blue-600 font-bold flex items-center gap-2 hover:underline">
                                <i className="lucide-grid"></i> Word Bank
                            </button>
                            <span className="font-bold text-slate-400">Word {currentCardIndex + 1} of 4</span>
                        </div>
                        <div className="bg-white rounded-[60px] shadow-2xl p-20 flex flex-col items-center justify-center min-h-[550px] border-b-[12px] border-slate-200">
                            <div className="text-[10rem] mb-12 transform hover:rotate-6 transition-transform cursor-pointer" onClick={() => playAudio(card.word)}>
                                {card.image}
                            </div>
                            <div className="text-[7rem] font-black tracking-widest mb-10 uppercase flex flex-wrap justify-center">
                                {card.word.split('').map((char, idx) => {
                                    const word = card.word.toLowerCase();
                                    const type = selectedCategory;
                                    const startIdx = word.indexOf(type);
                                    const isHighlight = startIdx !== -1 && idx >= startIdx && idx < startIdx + type.length;
                                    return (
                                        <span key={idx} className={isHighlight ? 'text-red-500 underline underline-offset-[16px] decoration-8' : 'text-slate-800'}>
                                            {char}
                                        </span>
                                    );
                                })}
                            </div>
                            <button onClick={() => playAudio(card.audioText)} className={`p-10 rounded-full shadow-inner transition-all ${isAudioLoading === card.audioText ? 'bg-blue-200 animate-pulse' : 'bg-blue-50 hover:bg-blue-100'}`}>
                                <i className="lucide-volume-2 text-blue-600" style={{width: 64, height: 64}}></i>
                            </button>
                        </div>
                        <div className="flex justify-between mt-12">
                            <button disabled={currentCardIndex === 0} onClick={() => setCurrentCardIndex(prev => prev - 1)} className="px-10 py-5 rounded-2xl bg-white border-2 border-slate-200 font-bold disabled:opacity-20 flex items-center gap-2">
                                <i className="lucide-chevron-left"></i> Previous
                            </button>
                            {currentCardIndex < 3 ? (
                                <button onClick={() => setCurrentCardIndex(prev => prev + 1)} className="px-10 py-5 bg-blue-500 text-white rounded-2xl font-bold flex items-center gap-2 shadow-lg">
                                    Next Word <i className="lucide-chevron-right"></i>
                                </button>
                            ) : (
                                <button onClick={() => setCurrentStep('menu')} className="px-10 py-5 bg-green-500 text-white rounded-2xl font-bold flex items-center gap-2 shadow-lg">
                                    Finish Set <i className="lucide-check"></i>
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const GameScreen = () => {
                const word = shuffledGameWords[currentGameIndex];
                if (!word) return null;
                return (
                    <div className="w-full max-w-4xl mx-auto p-4 text-center animate-zoom-in">
                        <div className="flex justify-between items-center mb-10">
                            <div className="bg-yellow-100 px-8 py-3 rounded-full font-black text-yellow-700 flex items-center gap-3 border-2 border-yellow-200 shadow-md">
                                <i className="lucide-star fill-current"></i> Score: {score}
                            </div>
                            <div className="text-slate-400 font-bold text-xl uppercase tracking-widest">{currentGameIndex + 1} / 12</div>
                        </div>
                        <div className={`relative bg-white rounded-[60px] shadow-2xl p-24 mb-12 border-4 transition-all duration-300 ${
                            gameFeedback === 'correct' ? 'border-green-400 bg-green-50' : 
                            gameFeedback === 'wrong' ? 'border-red-400 bg-red-50' : 'border-slate-100'
                        }`}>
                            <div className="text-[9rem] mb-10">{word.image}</div>
                            <div className="text-8xl font-black text-slate-800 tracking-[0.4em] uppercase pl-8">
                                {word.word.toLowerCase().replace(word.type, ' _ ')}
                            </div>
                            {gameFeedback === 'correct' && <div className="absolute top-10 right-10 text-[6rem] animate-bounce">🏆</div>}
                            {gameFeedback === 'wrong' && <div className="absolute top-10 right-10 text-[6rem] animate-shake">💥</div>}
                        </div>
                        <div className="grid grid-cols-3 gap-10">
                            {['f', 'ph', 'gh'].map((type) => (
                                <button
                                    key={type}
                                    onClick={() => {
                                        const current = shuffledGameWords[currentGameIndex];
                                        const isCorrect = type === current.type;
                                        setScore(prev => isCorrect ? prev + 10 : prev);
                                        setGameFeedback(isCorrect ? 'correct' : 'wrong');
                                        playAudio(isCorrect ? "Correct!" : "Try again!");
                                        setTimeout(() => {
                                            setGameFeedback(null);
                                            if (currentGameIndex < 11) setCurrentGameIndex(prev => prev + 1);
                                            else setCurrentStep('summary');
                                        }, 1500);
                                    }}
                                    disabled={!!gameFeedback}
                                    className={`py-12 rounded-[40px] text-7xl font-black shadow-xl transition-all transform hover:-translate-y-2 active:scale-95 ${
                                        type === 'f' ? 'bg-orange-100 text-orange-600' :
                                        type === 'ph' ? 'bg-purple-100 text-purple-600' :
                                        'bg-green-100 text-green-600'
                                    }`}
                                >
                                    {type}
                                </button>
                            ))}
                        </div>
                    </div>
                );
            };

            const SummaryScreen = () => (
                <div className="flex flex-col items-center justify-center space-y-12 animate-zoom-in py-12">
                    <div className="text-[12rem] animate-bounce">🌟</div>
                    <h1 className="text-7xl font-black text-blue-600 text-center uppercase tracking-tighter italic">Wonderful!</h1>
                    <div className="text-4xl font-bold text-slate-500 bg-white px-10 py-5 rounded-full shadow-lg">
                        Final Score: {score} / 120
                    </div>
                    <button onClick={() => setCurrentStep('menu')} className="px-16 py-7 bg-blue-500 text-white rounded-full text-3xl font-bold hover:bg-blue-600 transition-all shadow-2xl flex items-center gap-4">
                        <i className="lucide-refresh-ccw"></i> Play Again
                    </button>
                </div>
            );

            return (
                <div className="min-h-screen pb-24">
                    <nav className="fixed top-0 left-0 w-full p-8 bg-white/90 backdrop-blur-xl border-b-2 border-slate-100 z-50 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-4 font-black text-3xl text-blue-600 cursor-pointer" onClick={() => setCurrentStep('welcome')}>
                            <div className="bg-blue-600 text-white p-3 rounded-2xl shadow-lg">
                                <i className="lucide-graduation-cap"></i>
                            </div>
                            <span className="tracking-tighter">PHONICS LAB</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className={`w-3 h-3 rounded-full ${user ? 'bg-green-500 animate-pulse' : 'bg-slate-300'}`}></span>
                            <span className="text-sm font-black text-slate-400 uppercase tracking-widest">{user ? 'Online' : 'Connecting'}</span>
                        </div>
                    </nav>

                    <main className="mt-36 flex flex-col items-center px-6">
                        {currentStep === 'welcome' && <WelcomeScreen />}
                        {currentStep === 'menu' && <MenuScreen />}
                        {currentStep === 'list' && <WordListScreen />}
                        {currentStep === 'study' && <StudyScreen />}
                        {currentStep === 'game' && <GameScreen />}
                        {currentStep === 'summary' && <SummaryScreen />}
                    </main>

                    <div className="fixed bottom-0 left-0 w-full bg-slate-900 text-slate-400 text-[11px] px-6 py-2 flex justify-between items-center font-mono opacity-90 z-[100] border-t border-slate-800">
                        <div className="flex gap-6 uppercase">
                            <span className="text-blue-400 font-bold">App: {APP_ID}</span>
                            <span className={debugMsg.includes('❌') ? 'text-red-500 font-bold' : 'text-slate-300'}>{debugMsg}</span>
                        </div>
                        <div className="hidden md:block">User: {user?.uid || 'anonymous'}</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
